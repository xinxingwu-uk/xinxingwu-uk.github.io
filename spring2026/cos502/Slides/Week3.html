<div id="shadebox">

### Example code (bad <spanRED>?</spanRED> vs good)

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <string>
using namespace std;

int main() {
    int day = 5; // what is 5?
    if (day == 6 || day == 7) cout << "Weekend\n";

    string grade = "A ";
    if (grade == "A") cout << "Excellent\n";

    return 0;
}

```

</div>



<div class="definition-shakeflash-container">
  <div class="definition-shakeflash-title">“Magic numbers” problem</div>
  <div class="definition-shakeflash-shadebox">

In C++, magic numbers are hard-coded numeric literals in your code whose meaning is <spanGREEN>not</spanGREEN> obvious from the number itself.

<hr style="border: none; border-top: 2px dashed orange;">

```
int day = 5;
if (day == 6 || day == 7) {
    cout << "Weekend\n";
}
```

<hr style="border: none; border-top: 2px dashed orange;">

- Here, 6 and 7 are “magic” because a reader has to <spanBYMix>guess</spanBYMix> they mean Saturday and Sunday.

   </div>
</div>




<div class="question-container">
  <div class="question-title">Notes</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

<spanRED>Why magic numbers are a problem</spanRED>

<hr style="border: none; border-top: 2px dashed green;">

- Unreadable: 42, 0.85, 7, 255 don’t explain themselves.

- <spanRED>Error-prone</spanRED>: you can mistype or misunderstand them.

- Hard to maintain: if the meaning changes, you must hunt down every occurrence.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Notes - Better alternatives</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

<b>Option 1</b> - Named constants

```
const int SATURDAY = 6;
const int SUNDAY   = 7;

if (day == SATURDAY || day == SUNDAY) cout << "Weekend\n";

```
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Notes - Better alternatives</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

<b>Option 2</b> - Enums / enum class

```
enum class Day { Mon=1, Tue, Wed, Thu, Fri, Sat, Sun };

Day d = Day::Fri;
if (d == Day::Sat || d == Day::Sun) cout << "Weekend\n";

```
   </div>
</div>




<p class='titlep'>&nbsp;</p>

<div id="roundbox">
If a number has a meaning, give it a name (constant) or a type (enum).
</div>



<div class="definition-container">
  <div class="definition-title">Enums</div>
  <div class="definition-shadebox">

An enum is a special type that represents a group of constants (<spanBYMix>unchangeable</spanBYMix> values).

<hr style="border:0;height:25px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

To create an enum, use the enum keyword, followed by the name of the enum, and separate the enum items with a comma:

```
enum Level {
  LOW,
  MEDIUM,
  HIGH
};
```
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Enums</div>
  <div class="definition-shadebox">

- Note that the last item does <spanRED>not</spanRED> need a comma.

- It is <spanRED>not</spanRED> required to use uppercase, but often considered as good practice.

- Enum is short for "enumerations", which means "specifically listed".

   </div>
</div>



<div class="question-container">
  <div class="question-title">Note</div>
  <div class="question-shadebox">

```
string grade = "A ";
if (grade == "A") cout << "Excellent\n"; 
```
   </div>
</div>




<div class="definition-shakeflash-container">
  <div class="definition-shakeflash-title">Strings are “typo-prone” problem</div>
  <div class="definition-shakeflash-shadebox">

```
string grade = "A ";
if (grade == "A") cout << "Excellent\n"; // won't run due to typo

```

<hr style="border: none; border-top: 2px dashed orange;">

- Strings must match exactly (character-by-character).

- "A " is NOT the same as "A" because of the extra space at the end.
   </div>
</div>




<div class="question-container">
  <div class="question-title">Notes</div>
  <div class="question-shadebox">

Why enums are explicit and safe

<hr style="border: none; border-top: 2px dashed green;">

- You stop using unclear numbers like 6 and 7

- You stop relying on fragile string equality like "A " vs "A"

- The compiler can catch invalid values earlier.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Enums</div>
  <div class="definition-shadebox">


```
const int SATURDAY = 6;
enum Day { Mon=1, Tue, Wed, Thu, Fri, Sat, Sun };
Day day = Fri;
if (day == Sat || day == Sun) cout << "Weekend\n";

```

- Sat and Sun are self-explaining.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Enums</div>
  <div class="definition-shadebox">
  
To access the enum, you must create a variable of it.

Inside the main() method, specify the enum keyword, followed by the name of the enum (Level) and then the name of the enum variable (myVar in this example):

```
enum Level myVar;
```

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Enums</div>
  <div class="definition-shadebox">
  
Now that you have created an enum variable (myVar), you can assign a value to it. The assigned value must be one of the items inside the enum (LOW, MEDIUM or HIGH):


```
enum Level myVar = MEDIUM;
```

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Enums</div>
  <div class="definition-shadebox">

By default, the first item (LOW) has the value 0, the second (MEDIUM) has the value 1, etc. If you now try to print myVar, it will output 1, which represents MEDIUM:

```
#include <iostream>
using namespace std;
 
enum Level {
  LOW,
  MEDIUM,
  HIGH
}; 

int main() {
  enum Level myVar = MEDIUM;
  cout << myVar;
  return 0;
}

```
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Enums - Change Values</div>
  <div class="definition-shadebox">

The first item of an enum has the value 0. The second has the value 1, and so on. To make more sense of the values, you can easily change them:

```
#include <iostream>
using namespace std;
 
enum Level {
  LOW = 25,
  MEDIUM = 50,
  HIGH = 75
}; 

int main() {
  enum Level myVar = MEDIUM;
  cout << myVar;
  return 0;
}

```
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Enums</div>
  <div class="definition-shadebox">
  
If you assign a value to one specific item, the next items will update their numbers accordingly (Try it)

```
#include <iostream>
using namespace std;
 
enum Level {
  LOW = 5,
  MEDIUM, // Value? 
  HIGH
}; 

int main() {
  enum Level myVar = MEDIUM;
  cout << myVar;
  return 0;
}

```

   </div>
</div>



> Can make the output a string, but not automatically with a plain enum?

- By default, C++ prints the integer value of an enum.



<div class="definition-container">
  <div class="definition-title">Enums</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">

```
#include <iostream>
#include <string>
using namespace std;

enum Level {
    LOW = 5,
    MEDIUM,
    HIGH
};

string LevelToString(Level level) {
    switch (level) {
        case LOW: return "LOW";
        case MEDIUM: return "MEDIUM";
        case HIGH: return "HIGH";
        default: return "UNKNOWN";
    }
}

int main() {
    Level myVar = MEDIUM;
    cout << LevelToString(myVar);
    return 0;
}

```

</div>
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Enums</div>
  <div class="definition-shadebox">
  
Enum in a Switch Statement


<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">

```
#include <iostream>
using namespace std;
 
enum Level {
  LOW = 1,
  MEDIUM,
  HIGH
};

int main() {
  enum Level myVar = MEDIUM;

  switch (myVar) {
    case 1:
      cout << "Low Level";
      break;
    case 2:
      cout << "Medium level";
      break;
    case 3:
      cout << "High level";
      break;
  }
  return 0;
}

```

</div>
   </div>
</div>

<div class="definition-com-container">

Simple enum class (implicit values)

<hr style="border: none; border-top: 2px dashed orange;">

```
enum class Color { Red, Green, Blue };   // Red=0, Green=1, Blue=2

int main() {
    Color c = Color::Green;
    return 0;
}

```

   </div>
</div>

- What is the output of c? <button type="button" class="reveal-btn" data-answer="answer-q6">Show Answer</button>
<div id="answer-q6" class="answer-box">
<b>Answer:</b> std::cout << static_cast<int>(c) << "\n";  // prints 1




<div class="definition-com-container">
  <div class="definition-com-title">Note</div>
  <div class="definition-com-shadebox">

Enum class with explicit values

<hr style="border: none; border-top: 2px dashed orange;">

```
enum class MenuOption { View = 1, Add = 2, Remove = 3, Quit = 9 };

int main() {
    MenuOption opt = MenuOption::Quit;
    return 0;
}

```

   </div>
</div>

- What is the output of opt? <button type="button" class="reveal-btn" data-answer="answer-q7">Show Answer</button>
<div id="answer-q7" class="answer-box">
<b>Answer:</b> std::cout << static_cast<int>(opt) << "\n";  // prints 9





<div class="definition-com-container">
  <div class="definition-com-title">Note</div>
  <div class="definition-com-shadebox">

Enum class inside a struct (real-world style)

<hr style="border: none; border-top: 2px dashed orange;">

```
struct Student {
    enum class Grade { A, B, C, D, F };
    Grade g;
};

int main() {
    Student s;
    s.g = Student::Grade::C;
    return 0;
}


```

   </div>
</div>

- What is the output of s.g? <button type="button" class="reveal-btn" data-answer="answer-q8">Show Answer</button>
<div id="answer-q8" class="answer-box">
<b>Answer:</b> std::cout << static_cast<int>(s.g) << "\n";  // prints 2

(Do not assign numbers—use the default/implicit values.)

#include <iostream>

enum class Mode { MENU, RUNNING, EXIT };

    while (mode != Mode::EXIT) {
        if (mode == Mode::MENU) {

```
#include <iostream>
#include <string>
using namespace std;

// Section 2: Definition & Syntax (enum class)
enum class MenuOption {
    View = 1,
    Add  = 2,
    Remove = 3,
    Quit = 9
};

// Section 4: Safe list/array of enum values for looping
const MenuOption allOptions[] = {
    MenuOption::View,
    MenuOption::Add,
    MenuOption::Remove,
    MenuOption::Quit
};

// Convert enum -> string (helps display nicely)
string toString(MenuOption opt) {
    switch (opt) {
        case MenuOption::View:   return "View";
        case MenuOption::Add:    return "Add";
        case MenuOption::Remove: return "Remove";
        case MenuOption::Quit:   return "Quit";
        default:                 return "Unknown";
    }
}

// Show menu (prints using the safe list)
void showMenu() {
    cout << "\n===== MENU =====\n";
    for (MenuOption opt : allOptions) {
        cout << static_cast<int>(opt) << ") " << toString(opt) << "\n";
    }
    cout << "Choose: ";
}

// Read int, validate, convert to MenuOption safely
MenuOption readMenuOption() {
    int choice;
    cin >> choice;

    // Section 1: prevent magic numbers + invalid choices
    switch (choice) {
        case 1: return MenuOption::View;
        case 2: return MenuOption::Add;
        case 3: return MenuOption::Remove;
        case 9: return MenuOption::Quit;
        default:
            cout << "Invalid choice. Try again.\n";
            return readMenuOption(); // simple retry for beginner lab
    }
}

int main() {
    // Section 3: enums vs primitives (type-safe menu choices)
    MenuOption option = MenuOption::View; // initial value doesn't matter much

    while (option != MenuOption::Quit) {
        showMenu();
        option = readMenuOption();

        // Section 4: switch on MenuOption
        switch (option) {
            case MenuOption::View:
                cout << "Showing items...\n";
                break;
            case MenuOption::Add:
                cout << "Adding an item...\n";
                break;
            case MenuOption::Remove:
                cout << "Removing an item...\n";
                break;
            case MenuOption::Quit:
                cout << "Goodbye!\n";
                break;
            default:
                cout << "Unknown option.\n";
                break;
        }
    }

    return 0;
}


```

### An answer

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <string>
using namespace std;

enum class MenuOption { View = 1, Checkout = 2, Return = 3, Quit = 9 };
enum class BookStatus { Available, CheckedOut };

struct Book {
    string title;
    BookStatus status;
};

int main() {
    // Safe list for looping (prints menu without magic numbers everywhere)
    const MenuOption allOptions[] = {
        MenuOption::View,
        MenuOption::Checkout,
        MenuOption::Return,
        MenuOption::Quit
    };

    // Inventory (3 books)
    Book books[3] = {
        { "C++ for Beginners", BookStatus::Available },
        { "Data Structures",   BookStatus::CheckedOut },
        { "Discrete Math",     BookStatus::Available }
    };
    const int N = 3;

    MenuOption option = MenuOption::View;

    while (option != MenuOption::Quit) {
        // ---- Show menu (no function) ----
        cout << "\n===== Library Kiosk =====\n";
        for (MenuOption opt : allOptions) {
            cout << static_cast<int>(opt) << ") ";
            switch (opt) {
                case MenuOption::View:     cout << "View inventory"; break;
                case MenuOption::Checkout: cout << "Check out a book"; break;
                case MenuOption::Return:   cout << "Return a book"; break;
                case MenuOption::Quit:     cout << "Quit"; break;
                default:                   cout << "Unknown"; break;
            }
            cout << "\n";
        }
        cout << "Choose: ";

        // ---- Read + validate + convert int -> MenuOption (no function) ----
        int choice;
        cin >> choice;

        bool valid = true;
        switch (choice) {
            case 1: option = MenuOption::View; break;
            case 2: option = MenuOption::Checkout; break;
            case 3: option = MenuOption::Return; break;
            case 9: option = MenuOption::Quit; break;
            default:
                cout << "Invalid choice. Try again.\n";
                valid = false;
                break;
        }
        if (!valid) continue;

        // ---- Do action with enum switch ----
        switch (option) {
            case MenuOption::View: {
                cout << "\n--- Inventory ---\n";
                for (int i = 0; i < N; i++) {
                    cout << (i + 1) << ") " << books[i].title << " [";
                    if (books[i].status == BookStatus::Available) cout << "Available";
                    else cout << "Checked out";
                    cout << "]\n";
                }
                break;
            }

            case MenuOption::Checkout: {
                cout << "\n--- Inventory ---\n";
                for (int i = 0; i < N; i++) {
                    cout << (i + 1) << ") " << books[i].title << " [";
                    if (books[i].status == BookStatus::Available) cout << "Available";
                    else cout << "Checked out";
                    cout << "]\n";
                }

                cout << "Enter book number (1-" << N << "): ";
                int k;
                cin >> k;

                if (k < 1 || k > N) {
                    cout << "Invalid book number.\n";
                    break;
                }

                int idx = k - 1;

                if (books[idx].status == BookStatus::Available) {
                    books[idx].status = BookStatus::CheckedOut;
                    cout << "Checked out: " << books[idx].title << "\n";
                } else {
                    cout << "Already checked out.\n";
                }
                break;
            }

            case MenuOption::Return: {
                cout << "\n--- Inventory ---\n";
                for (int i = 0; i < N; i++) {
                    cout << (i + 1) << ") " << books[i].title << " [";
                    if (books[i].status == BookStatus::Available) cout << "Available";
                    else cout << "Checked out";
                    cout << "]\n";
                }

                cout << "Enter book number (1-" << N << "): ";
                int k;
                cin >> k;

                if (k < 1 || k > N) {
                    cout << "Invalid book number.\n";
                    break;
                }

                int idx = k - 1;

                if (books[idx].status == BookStatus::CheckedOut) {
                    books[idx].status = BookStatus::Available;
                    cout << "Returned: " << books[idx].title << "\n";
                } else {
                    cout << "Already available.\n";
                }
                break;
            }

            case MenuOption::Quit: {
                cout << "Goodbye!\n";
                break;
            }

            default: {
                cout << "Unknown option.\n";
                break;
            }
        }
    }

    return 0;
}

<div class="question-container">
  <div class="question-title">Tips</div>
  <div class="question-shadebox">

- Keep enums as enums: don’t store menu choices in int after reading—convert once, then switch on the enum.

- No magic numbers: only allow 1,2,3,9 in the conversion switch (one place). Everything else uses MenuOption::....

- Safe looping: allOptions[] prevents forgetting to print a menu item.

- Status is not text: store BookStatus (Available / CheckedOut) and only print words when displaying.
