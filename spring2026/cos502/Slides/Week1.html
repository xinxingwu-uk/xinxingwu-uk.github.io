### Example

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>          
// Imports the iostream library so we can use input/output (cout, cin, etc.)

using namespace std;         
// Lets us write cout instead of std::cout (common in beginner examples)

int main() {                 
// Program entry point: execution starts here

  iostream::cout << "Hello World!"; 
  // Prints "Hello World!" to the screen (NOTE: this is incorrect; should be std::cout or just cout)
  
  return 0;                  
  // Ends the program and returns success code 0 to the operating system
}

```

<div class="definition-com-container">
  <div class="definition-com-title">Note</div>
  <div class="definition-com-shadebox">

- Variables are containers for storing data values.

- Types of variables

	- <spanGREEN>int</spanGREEN> - stores integers (whole numbers), without decimals, such as 123 or -123
	- <spanGREEN>double</spanGREEN> - stores floating point numbers, with decimals, such as 19.99 or -19.99
	- <spanGREEN>char</spanGREEN> - stores single characters, such as 'a' or 'B'. Char values are surrounded by single quotes
	- <spanGREEN>string</spanGREEN> - stores text, such as "Hello World". String values are surrounded by double quotes
	- <spanGREEN>bool</spanGREEN> - stores values with two states: true or false
   </div>
</div>

<div class="question-container">
  <div class="question-title">General rules for naming variables</div>
  <div class="question-shadebox">

- Names can contain <spanBYMix>letters</spanBYMix>, <spanBYMix>digits</spanBYMix> and <spanBYMix>underscores</spanBYMix>
- Names must <spanGREEN>begin</spanGREEN> with a <spanGREEN>letter</spanGREEN> or an <spanGREEN>underscore (_)</spanGREEN>
- Names are case-sensitive (myVar and myvar are different variables)
- Names cannot contain whitespaces or special characters like !, #, %, etc.
- Reserved words (like C++ keywords, such as int) cannot be used as names

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-com-container">
  <div class="definition-com-title">Note</div>
  <div class="definition-com-shadebox">

A boolean variable is declared with the bool keyword and can take the values true or false:

<hr style="border: none; border-top: 2px dashed orange;">

```
#include <iostream>
using namespace std;

int main() {
  bool isCodingFun = true;
  bool isFishTasty = false;
  cout << isCodingFun << "\n";
  cout << isFishTasty;
  return 0;
}
```

   </div>
</div>




<p class='titlep'>&nbsp;</p>

<div id="roundbox">

>  How to print true and false as words instead of 1 and 0?

</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">
  
Use the boolalpha manipulator:

<div id="shadebox-glass" class="shadebox glass">
Show why ints/strings (“Magic numbers”) cause bugs
</div>
   </div>
</div>



<div id="shadebox">

### Example code

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
using namespace std;

int main() {
  bool isCodingFun = true;
  bool isFishTasty = false;

  cout << boolalpha; // enable printing "true"/"false"

  cout << isCodingFun << "\n";   // Outputs true
  cout << isFishTasty << "\n";  // Outputs false
  return 0;
}

```

</div>



<div id="shadebox">

### Questions

<hr style="border: none; border-top: 1.5px solid cyan;">

```
	cout << isCodingFun << "\n";   // Outputs true

	cout << isFishTasty << "\n";  // Outputs 0
```

</div>




<div id="shadebox">

### Example code

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
using namespace std;

int main() {
	bool isCodingFun = true;
	bool isFishTasty = false;

	cout << boolalpha; // enable printing "true"/"false"

	cout << isCodingFun << "\n";   // Outputs true

	cout << noboolalpha;

	cout << isFishTasty << "\n";  // Outputs 0
	return 0;
}
```

</div>



<div class="definition-container">
  <div class="definition-title">Notes</div>
  <div class="definition-shadebox">

boolalpha is <spanRED>not</spanRED> a data type. It is an I/O manipulator - a setting that changes how cout displays boolean values.

<hr>

When you use it, you are telling cout: "From now on, print booleans as true and false instead of 1 and 0."
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Resetting Back With noboolalpha</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

```
bool isCodingFun = true;

cout << boolalpha;   // print as true/false
cout << isCodingFun << "\n";  // Outputs true

cout << noboolalpha; // reset to 1/0
cout << isCodingFun << "\n";  // Outputs 1

```
   </div>
</div>



<div class="question-container">
  <div class="question-title">Boolean expression</div>
  <div class="question-shadebox">

- A Boolean expression is a piece of code that compares values or variables and returns a boolean value: 1 (true) or 0 (false).

- Boolean expressions are the <spanGREEN>foundation of decision making</spanGREEN> in programming - they let your program decide what to do based on <spanBYMix>whether something is true or false</spanBYMix>.

```
int x = 10;
int y = 9;
cout << (x > y); // returns 1 (true), because 10 is higher than 9
```

<hr style="border: none; border-top: 2px dashed green;">

Others

```
int x = 10;
cout << (x == 10);  // returns 1 (true), because the value of x is equal to 10
```
   </div>
</div>

</textarea></section>

</section>
