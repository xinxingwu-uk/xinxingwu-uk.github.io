### An answer

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
using namespace std;

void drawBoard(char b[]) {
    cout << "\n";
    cout << " " << b[0] << " | " << b[1] << " | " << b[2] << "\n";
    cout << "---+---+---\n";
    cout << " " << b[3] << " | " << b[4] << " | " << b[5] << "\n";
    cout << "---+---+---\n";
    cout << " " << b[6] << " | " << b[7] << " | " << b[8] << "\n\n";
}

char checkWinner(char b[]) {
    int wins[8][3] = {
        {0,1,2},{3,4,5},{6,7,8}, // rows
        {0,3,6},{1,4,7},{2,5,8}, // cols
        {0,4,8},{2,4,6} // diags
    };

    for (int i = 0; i < 8; i++) {
        int a = wins[i][0], c = wins[i][1], d = wins[i][2];
        if (b[a] != ' ' && b[a] == b[c] && b[c] == b[d]) return b[a];
    }
    return ' '; // no winner
}

bool boardFull(char b[]) {
    for (int i = 0; i < 9; i++) {
        if (b[i] == ' ') return false;
    }
    return true;
}

int main() {
    char board[9];
    for (int i = 0; i < 9; i++) board[i] = ' ';
    char player = 'X';

    cout << "Tic Tac Toe (Console)\n";
    cout << "Positions are:\n";
    cout << " 1 | 2 | 3\n";
    cout << "---+---+---\n";
    cout << " 4 | 5 | 6\n";
    cout << "---+---+---\n";
    cout << " 7 | 8 | 9\n";

    while (true) {
        drawBoard(board);

        int pos;
        cout << "Player " << player << ", choose (1-9): ";
        cin >> pos;

        if (pos < 1 || pos > 9) {
            cout << "Invalid. Choose 1-9.\n";
            continue;
        }
        int idx = pos - 1;

        if (board[idx] != ' ') {
            cout << "That spot is taken. Try again.\n";
            continue;
        }

        board[idx] = player;

        char winner = checkWinner(board);
        if (winner != ' ') {
            drawBoard(board);
            cout << "Player " << winner << " wins!\n";
            break;
        }

        if (boardFull(board)) {
            drawBoard(board);
            cout << "It's a draw!\n";
            break;
        }

        player = (player == 'X') ? 'O' : 'X';
    }
    return 0;
}

```

/* =========================
   STEP 10) Convert to a class (minimal OOP overlay)
   =========================
   ADD this class above main() (uses your same logic):

class TicTacToe {
public:
    char board[9];
    char player;

    TicTacToe() { reset(); }

    void reset() {
        for (int i = 0; i < 9; i++) board[i] = ' ';
        player = 'X';
    }

    void draw() { drawBoard(board); }

    bool makeMove(int pos) {
        if (pos < 1 || pos > 9) return false;
        int idx = pos - 1;
        if (board[idx] != ' ') return false;
        board[idx] = player;
        return true;
    }

    char winner() { return checkWinner(board); }

    bool full() { return boardFull(board); }

    void nextPlayer() { player = (player == 'X') ? 'O' : 'X'; }
};
