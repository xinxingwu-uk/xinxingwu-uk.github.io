### An answer - Simple Version

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <windows.h>
#include <ctime>
#include <cstdlib>
#include <string>
using namespace std;

const int W = 50;
const int H = 18;

void enableANSI() {
    HANDLE hOut = GetStdHandle(STD_OUTPUT_HANDLE);
    DWORD mode = 0;
    GetConsoleMode(hOut, &mode);
    mode |= ENABLE_VIRTUAL_TERMINAL_PROCESSING;
    SetConsoleMode(hOut, mode);
}

bool keyDown(int vk) {
    return (GetAsyncKeyState(vk) & 0x8000) != 0;
}

int main() {
    enableANSI();
    srand((unsigned)time(nullptr));

    int leftY = H / 2;
    int rightY = H / 2;

    int ballX = W / 2, ballY = H / 2;
    int dx = (rand() % 2 == 0) ? 1 : -1;
    int dy = (rand() % 2 == 0) ? 1 : -1;

    int leftScore = 0, rightScore = 0;
    bool quit = false;

    cout << "\x1b[?25l"; // hide cursor
    cout << "\x1b[2J";   // clear once

    // Smooth frame rate (paddles feel responsive)
    const int FRAME_MS = 16;     // ~60 FPS

    // Slow ball only (keep paddles smooth)
    int ballTimer = 0;
    const int BALL_STEP_MS = 120; // bigger = slower ball (try 80, 120, 160)

    while (!quit) {
        DWORD start = GetTickCount();

        // -------- INPUT (smooth) --------
        if (keyDown('Q')) quit = true;

        if (keyDown('W') && leftY > 1) leftY--;
        if (keyDown('S') && leftY < H - 2) leftY++;

        if (keyDown('I') && rightY > 1) rightY--;
        if (keyDown('K') && rightY < H - 2) rightY++;

        // -------- LOGIC --------
        bool movedBall = false;

        ballTimer += FRAME_MS;
        if (ballTimer >= BALL_STEP_MS) {
            ballTimer = 0;
            ballX += dx;
            ballY += dy;
            movedBall = true;
        }

        // Only check ball collisions when the ball actually moved
        if (movedBall) {
            // bounce top/bottom
            if (ballY <= 1 || ballY >= H - 2) dy = -dy;

            // left paddle collision (x==2)
            if (ballX == 2) {
                if (ballY >= leftY - 1 && ballY <= leftY + 1) dx = 1;
            }

            // right paddle collision (x==W-3)
            if (ballX == W - 3) {
                if (ballY >= rightY - 1 && ballY <= rightY + 1) dx = -1;
            }

            // score
            if (ballX <= 0) {
                rightScore++;
                ballX = W / 2;
                ballY = H / 2;
                dx = 1;
                dy = (rand() % 2 == 0) ? 1 : -1;
            }
            if (ballX >= W - 1) {
                leftScore++;
                ballX = W / 2;
                ballY = H / 2;
                dx = -1;
                dy = (rand() % 2 == 0) ? 1 : -1;
            }
        }

        // -------- DRAW (fast: build frame once) --------
        string frame;
        frame.reserve((W + 1) * (H + 2) + 80);

        frame += "\x1b[H"; // move cursor to top-left

        for (int i = 0; i < W; i++) frame += '#';
        frame += '\n';

        for (int y = 1; y < H - 1; y++) {
            for (int x = 0; x < W; x++) {
                char c = ' ';

                if (x == 0 || x == W - 1) c = '#';
                if (x == W / 2 && y % 2 == 0) c = '|';

                if (x == 1 && (y >= leftY - 1 && y <= leftY + 1)) c = '|';
                if (x == W - 2 && (y >= rightY - 1 && y <= rightY + 1)) c = '|';

                if (x == ballX && y == ballY) c = 'O';

                frame += c;
            }
            frame += '\n';
        }

        for (int i = 0; i < W; i++) frame += '#';
        frame += '\n';

        frame += "Left: " + to_string(leftScore) + " Right: " + to_string(rightScore) +
            " (W/S) left, (I/K) right, Q quit\n";

        cout << frame;
        cout.flush();

        // -------- FRAME LIMIT --------
        DWORD elapsed = GetTickCount() - start;
        if (elapsed < (DWORD)FRAME_MS) Sleep(FRAME_MS - elapsed);
    }

    cout << "\x1b[?25h"; // show cursor
    cout << "\nThanks for playing!\n";
    return 0;
}

### An answer - OOP + Inheritance

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <windows.h>
#include <ctime>
#include <cstdlib>
#include <string>
using namespace std;

const int W = 50;
const int H = 18;

void enableANSI() {
    HANDLE hOut = GetStdHandle(STD_OUTPUT_HANDLE);
    DWORD mode = 0;
    GetConsoleMode(hOut, &mode);
    mode |= ENABLE_VIRTUAL_TERMINAL_PROCESSING;
    SetConsoleMode(hOut, mode);
}

bool keyDown(int vk) {
    return (GetAsyncKeyState(vk) & 0x8000) != 0;
}

class Entity {
public:
    int x;
    int y;
    char icon;

    Entity(int startX, int startY, char ch) {
        x = startX;
        y = startY;
        icon = ch;
    }

    virtual ~Entity() { }
};

class Paddle : public Entity {
public:
    Paddle(int startX, int startY) : Entity(startX, startY, '|') { }

    void up() {
        if (y > 1) y--;
    }

    void down() {
        if (y < H - 2) y++;
    }

    bool hitsBall(int ballY) const {
        return (ballY >= y - 1 && ballY <= y + 1);
    }
};

class Ball : public Entity {
public:
    int dx;
    int dy;

    Ball() : Entity(W / 2, H / 2, 'O') {
        dx = 1;
        dy = 1;
    }

    void reset(int dirX) {
        x = W / 2;
        y = H / 2;
        dx = dirX;
        dy = (rand() % 2 == 0) ? 1 : -1;
    }

    void step() {
        x += dx;
        y += dy;
    }

    void bounceVertical() {
        dy = -dy;
    }
};

int main() {
    enableANSI();
    srand((unsigned)time(nullptr));

    Paddle leftPaddle(1, H / 2);
    Paddle rightPaddle(W - 2, H / 2);
    Ball ball;

    int leftScore = 0;
    int rightScore = 0;

    bool quit = false;

    cout << "\x1b[?25l";
    cout << "\x1b[2J";

    const int FRAME_MS = 16;
    int ballTimer = 0;
    const int BALL_STEP_MS = 120;

    while (!quit) {
        DWORD start = GetTickCount();

        if (keyDown('Q')) quit = true;

        if (keyDown('W')) leftPaddle.up();
        if (keyDown('S')) leftPaddle.down();

        if (keyDown('I')) rightPaddle.up();
        if (keyDown('K')) rightPaddle.down();

        bool movedBall = false;

        ballTimer += FRAME_MS;
        if (ballTimer >= BALL_STEP_MS) {
            ballTimer = 0;
            ball.step();
            movedBall = true;
        }

        if (movedBall) {
            if (ball.y <= 1 || ball.y >= H - 2) {
                ball.bounceVertical();
            }

            if (ball.x == 2) {
                if (leftPaddle.hitsBall(ball.y)) {
                    ball.dx = 1;
                }
            }

            if (ball.x == W - 3) {
                if (rightPaddle.hitsBall(ball.y)) {
                    ball.dx = -1;
                }
            }

            if (ball.x <= 0) {
                rightScore++;
                ball.reset(1);
            }

            if (ball.x >= W - 1) {
                leftScore++;
                ball.reset(-1);
            }
        }

        string frame;
        frame.reserve((W + 1) * (H + 2) + 120);

        frame += "\x1b[H";

        for (int i = 0; i < W; i++) frame += '#';
        frame += '\n';

        for (int y = 1; y < H - 1; y++) {
            for (int x = 0; x < W; x++) {
                char c = ' ';

                if (x == 0 || x == W - 1) c = '#';
                if (x == W / 2 && y % 2 == 0) c = '|';

                if (x == leftPaddle.x && (y >= leftPaddle.y - 1 && y <= leftPaddle.y + 1)) c = leftPaddle.icon;
                if (x == rightPaddle.x && (y >= rightPaddle.y - 1 && y <= rightPaddle.y + 1)) c = rightPaddle.icon;

                if (x == ball.x && y == ball.y) c = ball.icon;

                frame += c;
            }
            frame += '\n';
        }

        for (int i = 0; i < W; i++) frame += '#';
        frame += '\n';

        frame += "Left: " + to_string(leftScore) + " Right: " + to_string(rightScore) +
                 " (W/S) left, (I/K) right, Q quit\n";

        cout << frame << flush;

        DWORD elapsed = GetTickCount() - start;
        if (elapsed < (DWORD)FRAME_MS) Sleep(FRAME_MS - elapsed);
    }

    cout << "\x1b[?25h";
    cout << "\nThanks for playing!\n";
    return 0;
}
