## 2 Coding Questions




<div class="definition-com-container">
  <div class="definition-com-title">Coding</div>
  <div class="definition-com-shadebox">

- Short program: Save + Load employee records with files (and avoid leaks)
- Task: Create 2 employees, save them to employees.txt (one per line), delete them, then load them back and print.
   </div>
</div>



<div id="shadebox">

### An answer

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <fstream>
#include <vector>
#include <string>
using namespace std;

class Employee {
protected:
  string name;
  int salary;
public:
  Employee(string n, int s) : name(n), salary(s) {}
  virtual string toFileLine() = 0;
  virtual void printInfo() = 0;
  virtual ~Employee() {}
};

class Programmer : public Employee {
  int bonus;
public:
  Programmer(string n, int s, int b) : Employee(n, s), bonus(b) {}
  string toFileLine() override {
    return "P," + name + "," + to_string(salary) + "," + to_string(bonus);
  }
  void printInfo() override {
    cout << "Programmer: " << name << ", Salary: " << salary
         << ", Bonus: " << bonus << "\n";
  }
};

class Manager : public Employee {
  int allowance;
public:
  Manager(string n, int s, int a) : Employee(n, s), allowance(a) {}
  string toFileLine() override {
    return "M," + name + "," + to_string(salary) + "," + to_string(allowance);
  }
  void printInfo() override {
    cout << "Manager: " << name << ", Salary: " << salary
         << ", Allowance: " << allowance << "\n";
  }
};

void saveToFile(const vector<Employee*>& staff, const string& filename) {
  ofstream outFile(filename);
  for (Employee* e : staff) outFile << e->toFileLine() << "\n";
  outFile.close();
}

vector<Employee*> loadFromFile(const string& filename) {
  vector<Employee*> staff;
  ifstream inFile(filename);

  string type, name, salaryStr, extraStr;
  while (getline(inFile, type, ',')) {
    getline(inFile, name, ',');
    getline(inFile, salaryStr, ',');
    getline(inFile, extraStr);

    int salary = stoi(salaryStr);
    int extra  = stoi(extraStr);

    if (type == "P") staff.push_back(new Programmer(name, salary, extra));
    else if (type == "M") staff.push_back(new Manager(name, salary, extra));
  }

  inFile.close();
  return staff;
}

int main() {
  vector<Employee*> staff;
  staff.push_back(new Programmer("Alice", 50000, 12000));
  staff.push_back(new Manager("Bob", 60000, 8000));

  saveToFile(staff, "employees.txt");

  for (Employee* e : staff) delete e;
  staff.clear();

  staff = loadFromFile("employees.txt");

  for (Employee* e : staff) e->printInfo();
  for (Employee* e : staff) delete e;

  return 0;
}

```
