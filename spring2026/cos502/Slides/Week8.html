### An answer

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <string>
using namespace std;

struct Student {
    int id;
    string name;
    double gpa;
};

int main() {
    const int N = 3;
    Student students[N];

    for (int i = 0; i < N; i++) {
        cout << "Student " << (i + 1) << " ID: ";
        cin >> students[i].id;

        cin.ignore(); // clear newline before getline

        cout << "Student " << (i + 1) << " Name: ";
        getline(cin, students[i].name);

        cout << "Student " << (i + 1) << " GPA: ";
        cin >> students[i].gpa;

        cout << "\n";
    }

    double sum = 0;
    for (int i = 0; i < N; i++) sum += students[i].gpa;

    double avg = sum / N;
    cout << "Average GPA: " << avg << "\n";

    cout << "Honors (GPA >= 3.5):\n";
    bool found = false;
    for (int i = 0; i < N; i++) {
        if (students[i].gpa >= 3.5) {
            cout << "- " << students[i].name << "\n";
            found = true;
        }
    }
    if (!found) cout << "None\n";

    return 0;
}

        else if (choice == 9) opt = MenuOption::Quit;
        else {
            cout << "Invalid choice\n";
            continue;
        }

        switch (opt) {
            case MenuOption::Add: {
                if (count >= MAX) {
                    cout << "Array full (max 5 scores)\n";
                } else {
                    cout << "Enter score: ";
                    cin >> scores[count];
                    count++;
                    cout << "Saved.\n";
                }
                break;
            }
            case MenuOption::Average: {
                if (count == 0) {
                    cout << "No scores yet\n";
                } else {
                    int sum = 0;
                    for (int i = 0; i < count; i++) sum += scores[i];
                    double avg = (double)sum / count;
                    cout << "Average: " << avg << "\n";
                }
                break;
            }
            case MenuOption::Lowest: {
                if (count == 0) {
                    cout << "No scores yet\n";
                } else {
                    int lowest = scores[0];
                    for (int i = 1; i < count; i++) {
                        if (scores[i] < lowest) lowest = scores[i];
                    }
                    cout << "Lowest: " << lowest << "\n";
                }
                break;
            }
            case MenuOption::Quit:
                cout << "Goodbye!\n";
                break;
        }
    }

    return 0;
}
