<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-com-container">
  <div class="definition-com-title">CLOs (Course Learning Outcomes)</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

Students will 

- (1) solve complex logic problems using CS/software engineering/game programming tools, 
- (2) write clear/efficient code following coding standards, 
- (3) collaborate as a team to plan and present a game/software project, and 
- (4) discuss the importance/rationale of software development.


   </div>
</div>

</textarea></section>

</section>

</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-com-container">
  <div class="definition-com-title">Module topics/themes (aligned to CLOs)</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

- Game Programming Refresh + Tooling (SFML/SDL/OpenGL) + Lab 1 (Bouncing Ball + Score) 

- Game Design Basics + Paper Prototyping (Lab 2) 

- Design Foundations: Genres/Players/Platforms (Lab 3) 

- Systems Design: Monetization/Concepts/Worlds (Lab 4)


   </div>
</div>



<div class="definition-com-container">
  <div class="definition-com-title">Module topics/themes (aligned to CLOs)</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

- Storytelling/Characters/Creative Play (Lab 5) 

- UX + Core Mechanics, Balancing + Level Design, Online Gaming Issues 

- Final Project Extension + Demo Presentation 

For more details, plesae see https://kysu.instructure.com/courses/7052/assignments/syllabus

   </div>
</div>

</textarea></section>

</section>
