Program-level goal (example): Graduates will be effective problem-solvers who can design, implement, and communicate software solutions collaboratively.

<div class="definition-com-container">
  <div class="definition-com-title">Connect the Dots (Program → Course)</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

Course-level outcome (COS 475): By the end of the course, students can solve complex logic problems using game-programming tools, write clear/efficient code, and collaborate to plan and present a game/software project.

   </div>
</div>



<div class="definition-com-container">
  <div class="definition-com-title">Connect the Dots (Program → Course)</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

Connection: COS 475 directly supports the program goal because building a playable game requires structured problem-solving (logic + debugging), disciplined coding practices, and professional teamwork/presentation. The course turns broad program expectations into observable performance through iterative labs and a final project.

   </div>
</div>

<section data-markdown id="ch2" class="center"><textarea data-template>

<p class="definition-rainbow-title">Fink’s Lens on a Module Objective</p>

</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-com-container">
  <div class="definition-com-title">Fink’s Lens on a Module Objective</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

Module objective (Lab 1): Implement a real-time SFML loop where a ball moves, bounces, increments score on wall hits, and supports pause/resume.


   </div>
</div>



<div class="definition-com-container">
  <div class="definition-com-title">Module topics/themes (aligned to CLOs)</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

Fink dimensions: Primarily Foundational Knowledge (events, game loop, delta time), Application (coding, debugging collisions/state), and some Integration (math/physics ideas + code).

   </div>
</div>




<div class="definition-com-container">
  <div class="definition-com-title">Module topics/themes (aligned to CLOs)</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

Revised objective: Students will implement the bouncing-ball system using time-based motion, explain (in 3–5 sentences) how collision + scoring logic works, and identify one improvement after testing (e.g., prevent double-count scoring or reduce jitter).

   </div>
</div>



<div class="definition-com-container">
  <div class="definition-com-title">Module topics/themes (aligned to CLOs)</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

This adds Learning How to Learn through testing, explanation, and reflection—making learning more durable and transferable.

   </div>
</div>

</textarea></section>

</section>

<section data-markdown id="ch3" class="center"><textarea data-template>

<p class="definition-rainbow-title">Bridging to CPE Essential Skills</p>

</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-com-container">
  <div class="definition-com-title">Bridging to CPE Essential Skills</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

Using the same Lab 1 objective, a strong match is Knowledge Application (and often 

- Critical/Creative Thinking). The Kentucky CPE “essential skills” include Knowledge 

- Application—using what students know to perform effectively in real contexts.

   </div>
</div>



<div class="definition-com-container">
  <div class="definition-com-title">Bridging to CPE Essential Skills</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

In Lab 1, students apply programming concepts (event handling, time-based movement, state control, and logic for scoring) to produce a working interactive system. They must test, diagnose edge cases (like repeated wall scoring), and adjust their implementation—demonstrating that they can apply knowledge, not just describe it, in a practical development setting.
   </div>
</div>
