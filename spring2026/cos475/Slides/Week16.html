<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div id="rainbow-type"> Outline </div>

<div style="display:flex; gap:16px;  justify-content:center; flex-wrap:wrap;">

<div class="liquid-glass">
  <h2 style="margin:0 0 10px; font-size:30px; line-height:1.1; letter-spacing:0.2px;">Games Are Defined by Systems, Not Just Content</h2>
  <hr style="border:0;height:3px;border-radius:999px;background:linear-gradient(90deg,#ff004c,#ffb300,#00e5ff,#7c4dff,#ff004c);background-size:300% 100%;animation:hrflow 3.5s linear infinite;box-shadow:0 0 12px rgba(0,0,0,.25);">
<style>@keyframes hrflow{0%{background-position:0% 50%}100%{background-position:100% 50%}}</style>
  <p style="margin:0; font-size:22px; line-height:1.55; opacity:0.92;">Games are fundamentally built from core mechanics, which consist of data + algorithms. These mechanics form internal systems (movement, combat, resources, time, rules) that generate gameplay. What players experience moment-to-moment (gameplay) and how they understand it (UX/UI) both emerge from these underlying systems rather than from visuals alone.</p>
</div>

<div class="liquid-glass">
  <h2 style="margin:0 0 10px; font-size:30px; line-height:1.1; letter-spacing:0.2px;">Balance Is About Meaningful Choices, Not Equality</h2>
  <hr style="border:0;height:3px;border-radius:999px;background:linear-gradient(90deg,#ff004c,#ffb300,#00e5ff,#7c4dff,#ff004c);background-size:300% 100%;animation:hrflow 3.5s linear infinite;box-shadow:0 0 12px rgba(0,0,0,.25);">
<style>@keyframes hrflow{0%{background-position:0% 50%}100%{background-position:100% 50%}}</style>
  <p style="margin:0; font-size:22px; line-height:1.55; opacity:0.92;">Game balance does not mean everything is equal. Instead, it means multiple strategies remain viable, and better decisions tend to win over time. Designers must watch for dominant strategies, which reduce variety, and correct them using techniques such as direct costs, shadow costs, intransitive relationships, and controlled feedback loops.</p>
</div>
</div>



<div id="rainbow-type"> Outline (Cont.) </div>

<div style="display:flex; gap:16px;  justify-content:center; flex-wrap:wrap;">

<div class="liquid-glass">
  <h2 style="margin:0 0 10px; font-size:30px; line-height:1.1; letter-spacing:0.2px;">Internal Economies Drive Player Behavior</h2>
  <hr style="border:0;height:3px;border-radius:999px;background:linear-gradient(90deg,#ff004c,#ffb300,#00e5ff,#7c4dff,#ff004c);background-size:300% 100%;animation:hrflow 3.5s linear infinite;box-shadow:0 0 12px rgba(0,0,0,.25);">
<style>@keyframes hrflow{0%{background-position:0% 50%}100%{background-position:100% 50%}}</style>
  <p style="margin:0; font-size:22px; line-height:1.55; opacity:0.92;">Most games contain an internal economy made of sources, drains, converters, and traders. These components regulate how resources enter the game, leave the game, change form, or change ownership. Properly tuning these systems controls pacing, difficulty, progression, and long-term engagement, while poor tuning leads to runaway power growth or player frustration.</p>
</div>

<div class="liquid-glass">
  <h2 style="margin:0 0 10px; font-size:30px; line-height:1.1; letter-spacing:0.2px;">Online Games Add Technical and Social Complexity</h2>
  <hr style="border:0;height:3px;border-radius:999px;background:linear-gradient(90deg,#ff004c,#ffb300,#00e5ff,#7c4dff,#ff004c);background-size:300% 100%;animation:hrflow 3.5s linear infinite;box-shadow:0 0 12px rgba(0,0,0,.25);">
<style>@keyframes hrflow{0%{background-position:0% 50%}100%{background-position:100% 50%}}</style>
  <p style="margin:0; font-size:22px; line-height:1.55; opacity:0.92;">Online multiplayer games introduce challenges beyond local play, including network latency, packet loss, synchronization, cheating, and player behavior issues. Design choices such as client/server vs. peer-to-peer models, turn-based vs. real-time gameplay, and server authority are critical for fairness, stability, and security. Technical constraints directly shape game design decisions.</p>
</div>

</div>

## 5 Descriptive questions



<div class="definition-com-container">
  <div class="definition-com-title">Question</div>
  <div class="definition-com-shadebox">

Explain the difference between core mechanics, gameplay, and UX/UI. Give one short example of each. <button type="button" class="reveal-btn" data-answer="answer-q21">Show Answer</button>
<div id="answer-q21" class="answer-box">
<b>Answer:</b>Core mechanics are the engine rules expressed as data + algorithms (exact numbers + triggers). Example: “swamp timer” with data like time_limit and an if-then rule that kills the avatar if time exceeds the limit; Gameplay is what the player deals with moment-to-moment: the challenges that arise from those mechanics. Example: deciding when to leave the swamp to avoid dying; UX/UI is how the player understands and controls the game. Example: a timer bar or warning sound that communicates “gas is rising” and provides clear controls.
</div>

   </div>
</div>



<div class="definition-com-container">
  <div class="definition-com-title">Question</div>
  <div class="definition-com-shadebox">

Define “dominant strategy” and describe three ways the slides suggest to fix it (use terms from the materials). <button type="button" class="reveal-btn" data-answer="answer-q22">Show Answer</button>
<div id="answer-q22" class="answer-box">
<b>Answer:</b>A dominant strategy is when one option is clearly best in most situations, so players always pick it. Fixes include: Add direct costs (ammo, cooldown, stamina, etc.); Add shadow costs (risk, harder use, positioning needs, etc.); Make options intransitive (rock-paper-scissors style), so no single option dominates.
</div>

   </div>
</div>
