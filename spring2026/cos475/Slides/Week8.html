<p class="definition-rainbow-title">Outline</p>

</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div id="rainbow-type"> Outline </div>

<div style="display:flex; gap:16px;  justify-content:center; flex-wrap:wrap;">

<div class="liquid-glass">
  <h2 style="margin:0 0 10px; font-size:30px; line-height:1.1; letter-spacing:0.2px;">Games are structured, player-centric systems—not just stories or graphics</h2>
  <hr style="border:0;height:3px;border-radius:999px;background:linear-gradient(90deg,#ff004c,#ffb300,#00e5ff,#7c4dff,#ff004c);background-size:300% 100%;animation:hrflow 3.5s linear infinite;box-shadow:0 0 12px rgba(0,0,0,.25);">
<style>@keyframes hrflow{0%{background-position:0% 50%}100%{background-position:100% 50%}}</style>
  <p style="margin:0; font-size:22px; line-height:1.55; opacity:0.92;">A game is best understood as organized play with clear goals, rules, actions, challenges, and outcomes. Good game design starts from the player’s experience, focusing first on what the player does (player verbs), rather than story, art, or technology. Fairness, clarity, feedback, and meaningful decision-making are essential for engagement.</p>
</div>

<div class="liquid-glass">
  <h2 style="margin:0 0 10px; font-size:30px; line-height:1.1; letter-spacing:0.2px;">Genre, player, and platform must align for a game to work</h2><hr style="border:0;height:3px;border-radius:999px;background:linear-gradient(90deg,#ff004c,#ffb300,#00e5ff,#7c4dff,#ff004c);background-size:300% 100%;animation:hrflow 3.5s linear infinite;box-shadow:0 0 12px rgba(0,0,0,.25);">
<style>@keyframes hrflow{0%{background-position:0% 50%}100%{background-position:100% 50%}}</style>
  <p style="margin:0; font-size:22px; line-height:1.55; opacity:0.92;">Game genres are defined by the types of challenges players face, not by story content. A strong game idea succeeds only when the chosen genre fits the target player’s motivations and the platform’s constraints (PC, console, mobile). Modern games often blend genres, but each challenge type must still be intentional and understandable.
  </p>
</div>
</div>



<div id="rainbow-type"> Outline (Cont.) </div>

<div style="display:flex; gap:16px;  justify-content:center; flex-wrap:wrap;">

<div class="liquid-glass">
  <h2 style="margin:0 0 10px; font-size:30px; line-height:1.1; letter-spacing:0.2px;">A strong game concept connects mechanics, world, and monetization</h2>
  <hr style="border:0;height:3px;border-radius:999px;background:linear-gradient(90deg,#ff004c,#ffb300,#00e5ff,#7c4dff,#ff004c);background-size:300% 100%;animation:hrflow 3.5s linear infinite;box-shadow:0 0 12px rgba(0,0,0,.25);">
<style>@keyframes hrflow{0%{background-position:0% 50%}100%{background-position:100% 50%}}</style>
  <p style="margin:0; font-size:22px; line-height:1.55; opacity:0.92;">A game concept is more than an idea—it is a communicable product vision. It includes a high concept statement, core mechanics, player role, progression, world description, platform choice, and monetization model. Monetization (premium, subscription, episodic, freemium) directly influences design decisions and player behavior, and must be considered early.
</div>

<div class="liquid-glass">
  <h2 style="margin:0 0 10px; font-size:30px; line-height:1.1; letter-spacing:0.2px;">Tools and technology should support learning and design clarity</h2><hr style="border:0;height:3px;border-radius:999px;background:linear-gradient(90deg,#ff004c,#ffb300,#00e5ff,#7c4dff,#ff004c);background-size:300% 100%;animation:hrflow 3.5s linear infinite;box-shadow:0 0 12px rgba(0,0,0,.25);">
<style>@keyframes hrflow{0%{background-position:0% 50%}100%{background-position:100% 50%}}</style>
  <p style="margin:0; font-size:22px; line-height:1.55; opacity:0.92;">For beginner and student projects, higher-level tools like SFML are ideal because they allow designers to focus on core game loops (input → update → render), mechanics, and player experience without excessive setup. Lower-level tools (SDL, OpenGL) offer more control but increase complexity. In education, clarity, iteration speed, and design understanding matter more than raw performance.
  </p>
</div>
</div>

<div class="definition-com-container">

<b>Answer:</b>True

<hr style="border: none; border-top: 2px dashed orange;">

</div>

<hr style="border: none; border-top: 2px dashed orange;">

## 5 Descriptive Questions



<div class="definition-com-container">
  <div class="definition-com-title">Question</div>
  <div class="definition-com-shadebox">

Question: Explain (in 3–5 sentences) what makes video games “special” compared to non-video games. <button type="button" class="reveal-btn" data-answer="answer-q21">Show Answer</button>
<div id="answer-q21" class="answer-box">
<b>Answer:</b>Video games use computers to enforce rules reliably, simulate worlds quickly, provide instant audiovisual feedback, manage hidden information (like fog of war), and scale complexity (big maps, many entities). The computer can also take on roles such as referee, opponent AI, storyteller, and stage manager for pacing.
</div>

   </div>
</div>



<div class="definition-com-container">
  <div class="definition-com-title">Question</div>
  <div class="definition-com-shadebox">

Define “game genre” in the game-design sense, and explain how it differs from movie/book genre. <button type="button" class="reveal-btn" data-answer="answer-q22">Show Answer</button>
<div id="answer-q22" class="answer-box">
<b>Answer:</b>In games, a genre is defined by the type of challenge the player engages with, regardless of the story setting or world content. In movies/books, genre is more about content themes (romance, spy, etc.), while in games it’s about what players do and what challenges they face.
</div>

   </div>
</div>



<div class="definition-com-container">
  <div class="definition-com-title">Question</div>
  <div class="definition-com-shadebox">

What are “core mechanics,” and give one tiny example of a core-mechanics model. <button type="button" class="reveal-btn" data-answer="answer-q23">Show Answer</button>
<div id="answer-q23" class="answer-box">
<b>Answer:</b>Core mechanics are the game’s underlying “engine of meaning”: the numeric rules/probabilities that describe how the game state changes (e.g., health decreases when hit). A tiny model example is: player speed 200 px/s, coins give +1 score, timer 30 seconds, win if score ≥ 20.
</div>

   </div>
</div>




<div class="definition-com-container">
  <div class="definition-com-title">Question</div>
  <div class="definition-com-shadebox">

What is a “high concept statement,” and what key pieces should it communicate? <button type="button" class="reveal-btn" data-answer="answer-q24">Show Answer</button>
<div id="answer-q24" class="answer-box">
<b>Answer:</b>A high concept statement is a short (often 2–3 sentence) description of what the game is about. A good template includes the fantasy + core activity + unique twist, plus setting, the player’s verbs, the goal, and the main challenge/twist.
</div>

   </div>
</div>




<div class="definition-com-container">
  <div class="definition-com-title">Question</div>
  <div class="definition-com-shadebox">

List the four brainstorming principles and explain why “withhold criticism” matters during idea generation. <button type="button" class="reveal-btn" data-answer="answer-q25">Show Answer</button>
<div id="answer-q25" class="answer-box">
<b>Answer:</b>The four principles are: focus on quantity, withhold criticism, welcome unusual ideas, and combine & improve ideas. Withholding criticism matters because early judgment reduces idea output and makes people self-censor; brainstorming is meant to produce many options first, then evaluate later
</div>

   </div>
</div>
