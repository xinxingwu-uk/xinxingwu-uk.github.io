<div id="shadebox-neon" class="shadebox neon">

Store and manipulate text using <spanGREEN>std::string</spanGREEN>, read user input correctly (including spaces with getline()), combine strings using concatenation or append(), access and modify characters safely, use common string operations such as length()/size() and find(), and avoid common mistakes that occur with C-style char[] strings and input handling.

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">

```
| Feature           | `char[]` (C-style string) | `std::string` (C++ string)  |
| ----------------- | ------------------------- | --------------------------- |
| Memory type       | Raw array                 | Class (object)              |
| Stored as         | Characters + `'\0'`       | Managed dynamic buffer      |
| Size              | Fixed at compile time     | Dynamic (grows/shrinks)     |
| Null terminator   | Required (`'\0'`)         | Hidden internally           |
| Overflow risk     | HIGH ⚠️                   | Very low                    |
| Assignment        | ❌ cannot use `=`          | ✅ allowed                   |
| Copying           | `strcpy()` needed         | automatic                   |
| Memory management | manual thinking required  | automatic                   |
| Safer?            | ❌ no                      | ✅ yes                       |
| Speed control     | Maximum low-level control | Slight abstraction overhead |
| Teaching use      | memory & pointers         | modern programming          |

```
   </div>
</div>

- Arrays are just blocks of memory

```

> Give me two chunks of memory.

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

- The compiler puts them on the stack (local memory).

```
Memory addresses increasing ↓

| b[0] |
| b[1] |
| b[2] |
| a[0] |
| a[1] |
| a[2] |
| a[3] |
| ...  |

```

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

- strcpy does NOT know boundaries

strcpy only does this:

```
copy character
copy character
copy character
...
until '\0'

```

- It does <spanRED>NOT</spanRED> know: size of b; where b ends; where a starts
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

- You copy:

```
Hello\0   (6 bytes)
```

into:

```
b[3]

```

Copy sequence:

```
b[0] = H
b[1] = e
b[2] = l

```

Then b is FULL.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

But <spanRED>strcpy keeps going</spanRED>:

```
overflow →
a[0] = l
a[1] = o
a[2] = '\0'
```

<spanBYMix>So overflow continues into the next memory area — which happens to be a.</spanBYMix>
   </div>
</div>



> ❗ Memory does NOT know variable boundaries.



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>

<div style="width: 800px;"></div>

```

```

Variables are just labels the compiler gives us. The CPU doesn’t protect:

```

this belongs to a

```

    cout << "b = " << b << "\n";
    cout << sizeof(a) << "\n";
    cout << &a<<"\n";
    cout << &b;
}
```

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

```
a = Cello
b = Hello
20
0x7ffdadf78c40
0x7ffdadf78c20
```

</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">

- &a = address of the whole array a (type: char (*)[20])

- &b = address of the whole array b (type: char (*)[20])

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

Why is &a larger than &b here?

```
0x...8c40 - 0x...8c20 = 0x20 = 32 bytes
```


But each array is only 20 bytes, the extra 12 bytes is likely due to:

- alignment/padding

- space for other bookkeeping/locals

<spanRED> Address spacing is NOT guaranteed to equal sizeof </spanRED>

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Motivation</div>
  <div class="definition-pro-Y-shadebox">
  
- Concatenation is not simple with +: You can’t do "Hello" + "World" style joining.

```
#include <iostream>
using namespace std;

int main() {
    char first[20] = "Hello";
    char last[20]  = "World";

    // char full[40] = first + last;  // ❌ doesn't work
    cout << first << " " << last << "\n";
}

```

   </div>
</div>

- To combine you must use functions like strcat, and you must ensure the destination is large enough.



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Motivation</div>
  <div class="definition-pro-Y-shadebox">
  
- Input with spaces is awkward / risky: Using cin >> stops at spaces.

```
#include <iostream>
using namespace std;

int main() {
    char fullName[20];
    cout << "Enter full name: ";
    cin >> fullName; // reads only until first space
    cout << fullName << "\n";
}
```

   </div>
</div>

- Typing John Smith prints just John. Using cin.getline(fullName, 20) works, but you must always handle the buffer size manually.



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Motivation</div>
  <div class="definition-pro-Y-shadebox">

- Many useful operations require C library functions: Length, compare, find, copy, etc. are not built-in as methods.

```
#include <iostream>
#include <cstring> // needed for strlen, strcmp, strcpy, strcat
using namespace std;

int main() {
    char s[20] = "hello";
    cout << strlen(s) << "\n"; // need <cstring>
}

```
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Why it’s annoying:</div>
  <div class="definition-shadebox">
  
- You need extra headers (<cstring>)

- You must know which function to use

- Many functions don’t protect you from overflow unless you choose safer variants carefully

</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Motivation</div>

- “Null terminator” bugs are common

	- C-style strings rely on '\0' to know where the string ends.
	- If it’s missing (or overwritten), printing and functions can run past the array → garbage output or crashes.

</div>

<section>
<section data-markdown id="ch2" class="center"><textarea data-template>

<p class="definition-rainbow-title">Definition and Syntax</p>

</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Strings</div>
  <div class="definition-pro-Y-shadebox">
  
- Strings are used for storing text/characters.

	- For example, "Hello World" is a string.

- A string variable contains a collection of characters surrounded by double quotes (""):

<div id="shadebox-glass" class="shadebox glass">

```
// Include the string library
#include <string>

// Create a string variable
string greeting = "Hello";

// Print the string
cout << greeting;
```

</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Concatenation</div>
  <div class="definition-pro-Y-shadebox">
  
- The + operator can be used between strings to add them together to make a new string. This is called concatenation:

<div id="shadebox-glass" class="shadebox glass">

```
string firstName = "John ";
string lastName = "Doe";
string fullName = firstName + lastName;
cout << fullName;
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Append</div>
  <div class="definition-pro-Y-shadebox">
  
- A string in C++ is actually an object, which contain functions that can perform certain operations on strings. For example, you can also concatenate strings with the append() function:

<div id="shadebox-glass" class="shadebox glass">

```
#include <iostream>
#include <string>
using namespace std;
 
int main () {
  string firstName = "John ";
  string lastName = "Doe";
  string fullName = firstName.append(lastName);
  cout << fullName;
  return 0;
}

```
</div>
   </div>
</div>



<div class="definition-shakeflash-container">
  <div class="definition-shakeflash-title">WARNING</div>
  <div class="definition-shakeflash-shadebox">

- C++ uses the + operator for both addition and concatenation.

- Numbers are added. Strings are concatenated.

<hr style="border: none; border-top: 2px dashed orange;">

```
int x = 10;
int y = 20;
int z = x + y;      // z will be 30 (an integer)
```
   </div>
</div>



<div class="definition-shakeflash-container">
  <div class="definition-shakeflash-title">WARNING</div>
  <div class="definition-shakeflash-shadebox">

- If you try to add a number to a string, an error occurs:

<hr style="border: none; border-top: 2px dashed orange;">

```
string x = "10";
int y = 20;
string z = x + y;
```
   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Length</div>
  <div class="definition-pro-Y-shadebox">
  
- To get the length of a string, use the length() function:

<div id="shadebox-glass" class="shadebox glass">

```
#include <iostream>
#include <string>
using namespace std;

int main() {
  string txt = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  cout << "The length of the txt string is: " << txt.length();
  return 0;
}

```
</div>
   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Size</div>
  <div class="definition-pro-Y-shadebox">
  
- You might see some C++ programs that use the size() function to get the length of a string. This is just an alias of length(). It is completely up to you if you want to use length() or size():

<div id="shadebox-glass" class="shadebox glass">

```
string txt = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
cout << "The length of the txt string is: " << txt.size();
```
</div>
   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Access Strings</div>
  <div class="definition-pro-Y-shadebox">
  
- You can access the characters in a string by referring to its index number inside square brackets []. This example prints the first character in myString:

<div id="shadebox-glass" class="shadebox glass">

```
#include <iostream>
#include <string>
using namespace std;

int main() {
  string myString = "Hello";
  cout << myString[0];
  return 0;
}
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Access Strings</div>
  <div class="definition-pro-Y-shadebox">
  
- To print the last character of a string, you can use the following code:

<div id="shadebox-glass" class="shadebox glass">

```

#include <iostream>
#include <string>
using namespace std;
​
int main() {
  string myString = "Hello";
  cout << myString[myString.length() - 1];
  return 0;
}
```

</div>
</div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Change String Characters</div>
  <div class="definition-pro-Y-shadebox">
  
- To change the value of a specific character in a string, refer to the index number, and use single quotes:

<div id="shadebox-glass" class="shadebox glass">

```
#include <iostream>
#include <string>
using namespace std;

int main() {
  string myString = "Hello";
  myString[0] = 'J';
  cout << myString;
  return 0;
}
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">at()</div>
  <div class="definition-pro-Y-shadebox">
  
- The <string> library also has an at() function that can be used to access characters in a string:

<div id="shadebox-glass" class="shadebox glass">

```
#include <iostream>
#include <string>
using namespace std;

int main() {
  string myString = "Hello";
  cout << "Original string: " << myString << "\n";
  
  cout << "First character: " << myString.at(0) << "\n";
  cout << "Second character: " << myString.at(1) << "\n";
  cout << "Last character: " << myString.at(myString.length() - 1) << "\n";
  
  myString.at(0) = 'J';
  cout << "Changed string: " << myString;
  return 0;
}
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Special Characters</div>
  <div class="definition-pro-Y-shadebox">

<div id="shadebox-glass" class="shadebox glass">

```
#include <iostream>
using namespace std;

int main() {
  string txt = "We are the so-called \"Vikings\" from the north.";
  cout << txt;
  return 0;
}
```
</div>
   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">User Input Strings</div>
  <div class="definition-pro-Y-shadebox">
  
- It is possible to use the extraction operator >> on cin to store a string entered by a user:

<div id="shadebox-glass" class="shadebox glass">

```
string firstName;
cout << "Type your first name: ";
cin >> firstName; // get user input from the keyboard
cout << "Your name is: " << firstName;

// Type your first name: John
// Your name is: John
```
</div>
   </div>
</div>



<div class="definition-shakeflash-container">
  <div class="definition-shakeflash-title">Error</div>
  <div class="definition-shakeflash-shadebox">

- cin considers a space (whitespace, tabs, etc) as a terminating character, which means that it can only store a single word (even if you type many words):

<hr style="border: none; border-top: 2px dashed orange;">

```
string fullName;
cout << "Type your full name: ";
cin >> fullName;
cout << "Your name is: " << fullName;

// Type your full name: John Doe
// Your name is: John
```
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Fix</div>
  <div class="definition-pro-Y-shadebox">
  
- That's why, when working with strings, we often use the getline() function to read a line of text. It takes cin as the first parameter, and the string variable as second:

<div id="shadebox-glass" class="shadebox glass">

```
string fullName;
cout << "Type your full name: ";
getline (cin, fullName);
cout << "Your name is: " << fullName;

// Type your full name: John Doe
// Your name is: John Doe
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">String Namespace</div>
  <div class="definition-pro-Y-shadebox">
  
- You might see some C++ programs that run without the standard namespace library. The using namespace std line can be omitted and replaced with the std keyword, followed by the :: operator for string (and cout) objects:

<div id="shadebox-glass" class="shadebox glass">

```
#include <iostream>
#include <string>
// using namespace std; - Remove this line

int main() {
  std::string greeting = "Hello";
  std::cout << greeting;
  return 0;
}
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">C-Style Strings</div>
  <div class="definition-pro-Y-shadebox">
  
- As C++ was developed as an extension of C, it continued to support this way of creating strings in C++:

Example

<div id="shadebox-glass" class="shadebox glass">

```
#include <iostream>
#include <string>
using namespace std;

int main() {
  string greeting1 = "Hello";  // Regular String
  char greeting2[] = "Hello";  // C-Style String (an array of characters)
  cout << greeting1 << "\n";
  cout << greeting2;
  return 0;
}
```
</div>
   </div>
</div>

</textarea></section>

<section data-markdown id="ch4" class="center"><textarea data-template>

<p class="definition-rainbow-title">Common Mistakes and Best Practices</p>

</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example 1</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

- Task - input: john barron 

<div  style="font-size: 1.6em; line-height: 1.5;">

```
#include <iostream>
#include <string>
using namespace std;

int main() {
    string fullName;

    cout << "Type your full name: ";
    cin>>fullName;

    string message = "Welcome, " + fullName + "!";
    cout << message << "\n";

    cout << "Your name has " << fullName.length() << " characters.\n";

    return 0;
}
```

</div>
</div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example 2</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

- Task - give some inputs.

<div  style="font-size: 1.6em; line-height: 1.5;">

```

#include <iostream>
#include <string>
using namespace std;

int main() {
    int age;
    string name;

    cout << "Age: ";
    cin >> age;

    cout << "Full name: ";
    getline(cin, name);
    cout << "Name: " << name << "\n";
    return 0;
}
```
</div>
</div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Common Mistake 1</div>
  <div class="definition-pro-Y-shadebox">
  
- cin >> stops at whitespace, so it only reads the first word.

<div id="shadebox-glass" class="shadebox glass">

```
#include <iostream>
#include <string>
using namespace std;

int main() {
    string fullName;
    cout << "Enter your full name: ";
    cin >> fullName;                 // ❌ only reads first word
    cout << "You typed: " << fullName << "\n";
    return 0;
}
```
</div>
   </div>
</div>



<div id="shadebox">

### Best practice

- use getline() for full lines (spaces included).

<hr style="border: none; border-top: 1.5px solid cyan;">

```
string fullName;
getline(cin, fullName);             // ✅ reads whole line
```

</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Common Mistake 2</div>
  <div class="definition-pro-Y-shadebox">
  
- After cin >>, the newline \n stays in the input buffer. Then getline() reads it immediately.

<div id="shadebox-glass" class="shadebox glass">

```
#include <iostream>
#include <string>
using namespace std;

int main() {
    int age;
    string name;

    cout << "Age: ";
    cin >> age;

    cout << "Full name: ";
    getline(cin, name);             // ❌ reads empty line
    cout << "Name: " << name << "\n";
    return 0;
}
```
</div>
   </div>
</div>



<div id="shadebox">

### Best practice

- clear the leftover newline before getline().

<hr style="border: none; border-top: 1.5px solid cyan;">

```
cin.ignore();                       // ✅ ignores one character (often the '\n')
getline(cin, name);
```

More robust version:

```
#include <limits>
// ...
cin.ignore(numeric_limits<streamsize>::max(), '\n');
getline(cin, name);
```
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Common Mistake 3</div>
  <div class="definition-pro-Y-shadebox">
  
- Trying to do string + int: You can’t directly add an int to a string.

<div id="shadebox-glass" class="shadebox glass">

```
string label = "Score: ";
int score = 90;
string msg = label + score;         // ❌ ERROR

```
</div>
   </div>
</div>



<div id="shadebox">

### Best practice

- convert the number to string first.

<hr style="border: none; border-top: 1.5px solid cyan;">

```
string msg = label + to_string(score);  // ✅
```

</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Common Mistake 4</div>
  <div class="definition-pro-Y-shadebox">
  
- Forgetting string comparisons are case-sensitive: "Yes" is different from "yes".

<div id="shadebox-glass" class="shadebox glass">

```
string ans;
cin >> ans;

if (ans == "yes") cout << "OK\n";   // user types "Yes" → not matched
```
</div>
   </div>
</div>



<div id="shadebox">

### Best practice

- normalize case before comparing.

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <cctype>
// ...
for (char &c : ans) c = (char)tolower((unsigned char)c);
if (ans == "yes") cout << "OK\n";
```

</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Common Mistake 5</div>
  <div class="definition-pro-Y-shadebox">
  
- Using == with C-style strings (char[]): With char[], == compares addresses, not the text content.

<div id="shadebox-glass" class="shadebox glass">

```
char a[] = "hi";
char b[] = "hi";

if (a == b) cout << "same\n";       // ❌ compares memory addresses
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

<div  style="font-size: 1.6em; line-height: 1.5;">

```
#include <iostream>
#include <string>
using namespace std;

int main() {
    char a[] = "hi";
    char b[] = "hi";

    if (a == b) { cout << "same\n"; }

    cout << "Address " << &a << "\n";

    cout << "Address " << &b << "\n";

    return 0;
}
```
</div>
</div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

Address-of operator (gets an address)

Used in expressions to get the memory address of a variable.

```

int x = 10;
int* p = &x;   // p stores the address of x

```

</div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

- int* p means: “p is a pointer to an int.”

	- int = the type of value it will point to (an integer)

	- `*` = “pointer to”

	- p = the variable name
	
```
int x = 10;
int* p = &x;   // p stores x’s address
```

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>


- &x = “the address of x”

- p holds that address

- *p = “the int value at that address” (so *p is 10)


</div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

<div  style="font-size: 1.6em; line-height: 1.5;">

```
int x = 10;
int* p = &x;

cout << x << "\n";   // 10
cout << *p << "\n";  // 10 (value p points to)

*p = 25;             // change x through the pointer
cout << x << "\n";   // 25
```
</div>
</div>
</div>




<div id="shadebox">

### Best practice

- use std::string

<hr style="border: none; border-top: 1.5px solid cyan;">

```
string a = "hi", b = "hi";
if (a == b) cout << "same\n";       // ✅ compares content
```

</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Common Mistake 6</div>
  <div class="definition-pro-Y-shadebox">
  
- Going out of bounds with indexing: Accessing myString[myString.length()] is out of range (last index is length()-1).

<div id="shadebox-glass" class="shadebox glass">

```
string s = "Hello";
cout << s[s.length()] << "\n";      // ❌ out of bounds
```
</div>
   </div>
</div>



<div id="shadebox">

### Best practice

```
cout << s[s.length() - 1] << "\n";  // ✅ last character

```

Even safe

```
cout << s.at(s.length() - 1) << "\n"; // ✅ throws error if invalid
```

</div>

</textarea></section>

</section>

<section data-markdown id="ch6" class="center"><textarea data-template>

</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-com-container">
  <div class="definition-com-title">Lab: Student Welcome Card Generator</div>
  <div class="definition-com-shadebox">

Scenario - Build a console program that collects a student’s info and generates a formatted “welcome card” using std::string.

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Task</div>
  <div class="definition-pro-Y-shadebox">
  
- Requirement 1: Ask the user for

	- First name (single word)

	- Last name (single word)

	- Age (integer)

	- Favorite quote (a full line with spaces)

	- Email (single word is fine)

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Task (Cont.)</div>
  <div class="definition-pro-Y-shadebox">
  
- Requirement 2: Build and print

	- Full name using concatenation (+) and also use .append() at least once

	- The length of the full name and quote using .length() or .size()

	- The first character and last character of the last name (use indexing [] or .at())

	- A simple email check: confirm the email contains '@' using .find()

	- A generated “username” like: first initial + last name + age (example: jsmith20)
   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Task (Cont.)</div>
  <div class="definition-pro-Y-shadebox">
  
- Requirement 3: Show a final welcome card output that includes all results.
   </div>
</div>



<div id="shadebox">

### An answer

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <string>
#include <cctype>   // tolower
using namespace std;

int main() {
    string firstName, lastName, quote, email;
    int age;

    cout << "First name (one word): ";
    cin >> firstName;

    cout << "Last name (one word): ";
    cin >> lastName;

    cout << "Age: ";
    cin >> age;

    // Clear the leftover newline before using getline
    cin.ignore();

    cout << "Favorite quote (a full sentence): ";
    getline(cin, quote);

    cout << "Email: ";
    cin >> email;

    // Build full name using +
    string fullName = firstName + " " + lastName;

    // Also demonstrate append()
    string greeting = "Welcome, ";
    greeting.append(fullName);  // append full name
    greeting.append("!");

    // Length checks
    int nameLen = (int)fullName.length();
    int quoteLen = (int)quote.size();

    // First/last character of last name (safe check)
    char firstChar = '?';
    char lastChar = '?';
    if (lastName.length() > 0) {
        firstChar = lastName[0];
        lastChar = lastName[lastName.length() - 1];
        // You could also do: lastName.at(0) and lastName.at(lastName.length() - 1)
    }

    // Email contains '@'?
    bool hasAt = (email.find('@') != string::npos);

    // Create username: first initial + lowercase last name + age
    string lowerLast = lastName;
    for (int i = 0; i < (int)lowerLast.length(); i++) {
        lowerLast[i] = (char)tolower((unsigned char)lowerLast[i]);
    }

    char initial = (firstName.length() > 0) ? (char)tolower((unsigned char)firstName[0]) : 'x';
    string username = "";
    username += initial;
    username += lowerLast;
    username += to_string(age);

    // Output
    cout << "\n==============================\n";
    cout << greeting << "\n";
    cout << "==============================\n";
    cout << "Full Name: " << fullName << "\n";
    cout << "Name Length: " << nameLen << "\n";
    cout << "Quote Length: " << quoteLen << "\n";
    cout << "Last Name First Char: " << firstChar << "\n";
    cout << "Last Name Last Char: " << lastChar << "\n";
    cout << "Email contains '@': " << (hasAt ? "Yes" : "No") << "\n";
    cout << "Generated Username: " << username << "\n";
    cout << "Favorite Quote: \"" << quote << "\"\n";
    cout << "==============================\n";

    return 0;
}

```
