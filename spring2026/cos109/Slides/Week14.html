```
#include <iostream>
#include <windows.h>
#include <ctime>
#include <string>
using namespace std;

const int W = 30;
const int H = 20;

void enableANSI() {
    HANDLE hOut = GetStdHandle(STD_OUTPUT_HANDLE);
    DWORD mode = 0;
    GetConsoleMode(hOut, &mode);
    mode |= ENABLE_VIRTUAL_TERMINAL_PROCESSING;
    SetConsoleMode(hOut, mode);
}

int main() {
    ios::sync_with_stdio(false);
    cin.tie(nullptr);

    enableANSI();
    srand((unsigned)time(nullptr));

    int playerX = W / 2;

    bool bulletOn = false;
    int bulletX = -1, bulletY = -1;

    int enemyX = rand() % W, enemyY = 0;
    int score = 0;

    bool gameOver = false;

    cout << "\x1b[?25l"; // hide cursor
    cout << "\x1b[2J";   // clear once

    int enemyTick = 0;          // controls enemy fall speed
    const int enemyDelay = 5;   // bigger = slower enemy (2 means move every 2 frames)
    const int frameMs = 50;     // 20 FPS (smooth enough)

    bool lastSpaceDown = false; // to make space fire once per press

    while (!gameOver) {
        // ----- INPUT (smooth hold) -----
        bool aDown = (GetAsyncKeyState('A') & 0x8000) || (GetAsyncKeyState(VK_LEFT) & 0x8000);
        bool dDown = (GetAsyncKeyState('D') & 0x8000) || (GetAsyncKeyState(VK_RIGHT) & 0x8000);
        bool qDown = (GetAsyncKeyState('Q') & 0x8000);

        bool spaceDown = (GetAsyncKeyState(VK_SPACE) & 0x8000);

        if (aDown && playerX > 0) playerX--;
        if (dDown && playerX < W - 1) playerX++;

        // fire only once per press (not machine-gun when holding)
        if (spaceDown && !lastSpaceDown && !bulletOn) {
            bulletOn = true;
            bulletX = playerX;
            bulletY = H - 2;
        }
        lastSpaceDown = spaceDown;

        if (qDown) gameOver = true;

        // ----- LOGIC -----
        if (bulletOn) {
            bulletY--;
            if (bulletY < 0) bulletOn = false;
        }

        // enemy falls slower than frame rate
        enemyTick++;
        if (enemyTick >= enemyDelay) {
            enemyTick = 0;
            enemyY++;
        }

        // bullet hits enemy
        if (bulletOn && bulletX == enemyX && bulletY == enemyY) {
            score++;
            bulletOn = false;
            enemyX = rand() % W;
            enemyY = 0;
        }

        // enemy reaches bottom
        if (enemyY >= H - 1) {
            if (enemyX == playerX) gameOver = true;
            enemyX = rand() % W;
            enemyY = 0;
        }

        // ----- DRAW (double-buffer) -----
        string screen;
        screen.reserve((W + 3) * (H + 4));

        screen += "\x1b[H"; // cursor to top-left

        for (int i = 0; i < W + 2; i++) screen += "#";
        screen += "\n";

        for (int y = 0; y < H; y++) {
            screen += "#";
            for (int x = 0; x < W; x++) {
                char c = ' ';
                if (x == enemyX && y == enemyY) c = 'W';
                if (bulletOn && x == bulletX && y == bulletY) c = '|';
                if (y == H - 1 && x == playerX) c = 'A';
                screen += c;
            }
            screen += "#\n";
        }

        for (int i = 0; i < W + 2; i++) screen += "#";
        screen += "\nScore: " + to_string(score) + " (A/D or arrows move, Space shoot, Q quit)\n";

        cout << screen << flush;

        Sleep(frameMs);
    }

    cout << "\x1b[?25h"; // show cursor
    cout << "\nGAME OVER! Final Score: " << score << "\n";
    return 0;
}

### An answer - OOP + Inheritance

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <windows.h>
#include <ctime>
#include <string>
using namespace std;

const int W = 30;
const int H = 20;

void enableANSI() {
    HANDLE hOut = GetStdHandle(STD_OUTPUT_HANDLE);
    DWORD mode = 0;
    GetConsoleMode(hOut, &mode);
    mode |= ENABLE_VIRTUAL_TERMINAL_PROCESSING;
    SetConsoleMode(hOut, mode);
}

class Entity {
public:
    int x;
    int y;
    char icon;

    Entity(int startX, int startY, char ch) {
        x = startX;
        y = startY;
        icon = ch;
    }

    virtual ~Entity() { }
};

class Player : public Entity {
public:
    Player(int startX, int startY) : Entity(startX, startY, 'A') { }

    void moveLeft() {
        if (x > 0) x--;
    }

    void moveRight() {
        if (x < W - 1) x++;
    }
};

class Bullet : public Entity {
public:
    bool on;

    Bullet() : Entity(-1, -1, '|') {
        on = false;
    }

    void fireFromPlayer(const Player& p) {
        on = true;
        x = p.x;
        y = H - 2;
    }

    void update() {
        if (!on) return;
        y--;
        if (y < 0) on = false;
    }
};

class Enemy : public Entity {
public:
    Enemy() : Entity(0, 0, 'W') {
        reset();
    }

    void reset() {
        x = rand() % W;
        y = 0;
    }

    void fallStep() {
        y++;
    }
};

bool keyDown(int vk) {
    return (GetAsyncKeyState(vk) & 0x8000) != 0;
}

int main() {
    ios::sync_with_stdio(false);
    cin.tie(nullptr);

    enableANSI();
    srand((unsigned)time(nullptr));

    Player player(W / 2, H - 1);
    Bullet bullet;
    Enemy enemy;

    int score = 0;
    bool gameOver = false;

    cout << "\x1b[?25l";
    cout << "\x1b[2J";

    int enemyTick = 0;
    const int enemyDelay = 5;
    const int frameMs = 50;

    bool lastSpaceDown = false;

    while (!gameOver) {
        bool aDown = keyDown('A') || keyDown(VK_LEFT);
        bool dDown = keyDown('D') || keyDown(VK_RIGHT);
        bool qDown = keyDown('Q');
        bool spaceDown = keyDown(VK_SPACE);

        if (aDown) player.moveLeft();
        if (dDown) player.moveRight();

        if (spaceDown && !lastSpaceDown && !bullet.on) {
            bullet.fireFromPlayer(player);
        }
        lastSpaceDown = spaceDown;

        if (qDown) gameOver = true;

        bullet.update();

        enemyTick++;
        if (enemyTick >= enemyDelay) {
            enemyTick = 0;
            enemy.fallStep();
        }

        if (bullet.on && bullet.x == enemy.x && bullet.y == enemy.y) {
            score++;
            bullet.on = false;
            enemy.reset();
        }

        if (enemy.y >= H - 1) {
            if (enemy.x == player.x) gameOver = true;
            enemy.reset();
        }

        string screen;
        screen.reserve((W + 3) * (H + 4));

        screen += "\x1b[H";

        for (int i = 0; i < W + 2; i++) screen += "#";
        screen += "\n";

        for (int y = 0; y < H; y++) {
            screen += "#";
            for (int x = 0; x < W; x++) {
                char c = ' ';

                if (x == enemy.x && y == enemy.y) c = enemy.icon;
                if (bullet.on && x == bullet.x && y == bullet.y) c = bullet.icon;
                if (x == player.x && y == player.y) c = player.icon;

                screen += c;
            }
            screen += "#\n";
        }

        for (int i = 0; i < W + 2; i++) screen += "#";
        screen += "\nScore: " + to_string(score) + " (A/D or arrows move, Space shoot, Q quit)\n";

        cout << screen << flush;
        Sleep(frameMs);
    }
