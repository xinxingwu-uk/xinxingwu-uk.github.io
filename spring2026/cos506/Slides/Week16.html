Why a stack?

<div class="definition-pro-Y-container">

Algorithm (step-by-step)

- From the slides’ “key idea”: scan left → right, push opens, and when you see a close you must match & pop.

<hr style="border: none; border-top: 2px dashed red;">

1.Create an empty stack st

2.For each character c in the string:

- If c is an opening bracket ( [ { → push it

- Else if c is a closing bracket ) ] }:

	- If stack is empty → underflow → invalid
	- Otherwise pop the top and check if it matches; if not → invalid

</div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example 1</div>
  <div class="definition-pro-Y-shadebox">

Algorithm (step-by-step)

<hr style="border: none; border-top: 2px dashed red;">

- Ignore other characters (letters, digits, operators) 

3.At the end, expression is valid only if stack is empty

<div class="definition-pro-Y-container">

Hand trace

Test input: {[()]} (the slides show this exact walk-through idea)

We read: { [ ( ) ] }

- { → push { → stack: {

</div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example 1</div>
  <div class="definition-pro-Y-shadebox">
  
Hand trace (cont.)

<hr style="border: none; border-top: 2px dashed red;">

Test input: {[()]} (the slides show this exact walk-through idea)

We read: { [ ( ) ] }

- ) → must match ( → pop ( → stack: { [

- ] → must match [ → pop [ → stack: {

- } → must match { → pop { → stack: empty ✅

So it’s well-formed because it ends with an empty stack.
</div>
</div>



<div id="shadebox">

### Implementation

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <stack>
#include <string>
using namespace std;

bool IsOpen(char c) {
    return c == '(' || c == '[' || c == '{';
}

bool IsClose(char c) {
    return c == ')' || c == ']' || c == '}';
}

bool Matches(char open, char close) {
    return (open == '(' && close == ')') ||
           (open == '[' && close == ']') ||
           (open == '{' && close == '}');
}

bool IsWellFormed(const string& s) {
    stack<char> st;

    for (char c : s) {
        if (IsOpen(c)) {
            st.push(c);
        } else if (IsClose(c)) {
            if (st.empty()) return false;   // underflow case
            char top = st.top();
            st.pop();
            if (!Matches(top, c)) return false; // mismatch case
        }
        // ignore other characters
    }

    return st.empty(); // must be empty at end
}

int main() {
    cout << IsWellFormed("{[()]}") << "\n"; // 1 (true)
    cout << IsWellFormed("{[(])}") << "\n"; // 0 (false)
    cout << IsWellFormed(")()")    << "\n"; // 0 (false)
    return 0;
}
```

BFS algorithm (step-by-step)
 
<hr style="border: none; border-top: 2px dashed red;">

Review: enqueue start, mark visited, pop from queue, push unvisited neighbors. 

- To get the actual path, your slides say to keep a parent[] array: when you first discover u from v, set parent[u]=v, then walk backward from target.
</div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example 2</div>
  <div class="definition-pro-Y-shadebox">

Hand trace

<hr style="border: none; border-top: 2px dashed red;">

Start = 0, Target = 2

Initialize:

- queue = [0]

- visited[0]=true

- parent = [-1, -1, -1, -1]
</div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example 2</div>
  <div class="definition-pro-Y-shadebox">

Step 1:

<hr style="border: none; border-top: 2px dashed red;">

- Dequeue 0

- Neighbors of 0: 1, 3

	- Discover 1: visited[1]=true, parent[1]=0, enqueue 1

	- Discover 3: visited[3]=true, parent[3]=0, enqueue 3

- queue becomes [1, 3]

- parent becomes [-1, 0, -1, 0]
</div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example 2</div>
  <div class="definition-pro-Y-shadebox">

Step 2:

<hr style="border: none; border-top: 2px dashed red;">

- Dequeue 1

- Neighbors of 1: 0, 2, 3

	- 0 already visited → skip

	- Discover 2: visited[2]=true, parent[2]=1, enqueue 2

	- 3 already visited → skip

- queue becomes [3, 2]

- parent becomes [-1, 0, 1, 0]

- Target 2 is now discovered (we can stop early or continue)
</div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example 2</div>
  <div class="definition-pro-Y-shadebox">

Reconstruct path (walk parents backward):

<hr style="border: none; border-top: 2px dashed red;">

- Start at target 2

- parent[2]=1 → then parent[1]=0 → then parent[0]=-1 stop

- Path backward: 2 -> 1 -> 0

- Reverse: 0 -> 1 -> 2

So the shortest path (fewest edges) is 0 → 1 → 2

</div>
</div>



<div id="shadebox">

### Implementation

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <vector>
#include <queue>
using namespace std;

vector<int> bfsShortestPath(vector<vector<int>> &adj, int start, int target) {
    int n = adj.size();
    vector<bool> visited(n, false);
    vector<int> parent(n, -1);
    queue<int> q;

    q.push(start);
    visited[start] = true;

    while (!q.empty()) {
        int v = q.front();
        q.pop();

        if (v == target) break; // optional early stop

        for (int u : adj[v]) {
            if (!visited[u]) {
                visited[u] = true;
                parent[u] = v;   // remember how we first reached u
                q.push(u);
            }
        }
    }

    // Reconstruct path from target back to start using parent[]
    vector<int> path;
    if (!visited[target]) return path; // empty => no path

    int cur = target;
    while (cur != -1) {
        path.push_back(cur);
        cur = parent[cur];
    }

    // reverse (beginner-friendly)
    for (int i = 0, j = (int)path.size() - 1; i < j; i++, j--) {
        int tmp = path[i];
        path[i] = path[j];
        path[j] = tmp;
    }
    return path;
}

int main() {
    int n = 4;
    vector<vector<int>> adj(n);

    // undirected edges
    adj[0].push_back(1); adj[1].push_back(0);
    adj[0].push_back(3); adj[3].push_back(0);
    adj[1].push_back(2); adj[2].push_back(1);
    adj[1].push_back(3); adj[3].push_back(1);

    vector<int> path = bfsShortestPath(adj, 0, 2);

    if (path.size() == 0) cout << "No path\n";
    else {
        cout << "Shortest path: ";
        for (int v : path) cout << v << " ";
        cout << "\n";
    }
    return 0;
}
```

Build an IntBST program (menu-driven). Menu:
- Insert a number
- Search for a number
- Delete a number
- Print inorder (sorted)
- Print preorder
- Print postorder
- Count nodes
- Quit

  <div class="definition-pro-Y-shadebox">

Starter requirements:

- Use Node struct + insert, contains, remove

- Start with empty tree (Node* root = nullptr;)

 
   </div>
</div>





<div id="shadebox">

### Example code

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
using namespace std;

int main() {
    Node* root = nullptr;

    int choice;
    while (true) {
        cout << "\n1 Insert  2 Search  3 Delete  4 Inorder  5 Count  0 Quit\n";
        cout << "Choice: ";
        cin >> choice;

        if (choice == 0) break;

        if (choice == 1) {
            int x; cout << "Insert: "; cin >> x;
            root = insert(root, x);
        } else if (choice == 2) {
            int x; cout << "Search: "; cin >> x;
            cout << (contains(root, x) ? "Found\n" : "Not found\n");
        } else if (choice == 3) {
            int x; cout << "Delete: "; cin >> x;
            root = remove(root, x);
        } else if (choice == 4) {
            inorder(root); cout << "\n";
        } else if (choice == 5) {
            cout << "Count = " << getLength(root) << "\n";
        }
    }
    return 0;
}


```
