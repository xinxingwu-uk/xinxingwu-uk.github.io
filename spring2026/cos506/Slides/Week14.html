<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">From trees → graphs</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
- A **tree** is a special kind of graph (<spanRED>no</spanRED> cycles, one “root”)

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

- A **graph** is more general:
  - Can have <spanGREEN>cycles</spanGREEN>

  - Can have <spanGREEN>many</spanGREEN> ways to go from A to B

  - Can be directed <spanGREEN>or</spanGREEN> undirected (Directed graphs, digraphs, use edges with specific directions, arrows, to show one-way relationships, e.g., A 

<spanBYMix>Undirected</spanBYMix> graphs use simple lines to represent <spanBYMix>bidirectional relationships</spanBYMix>, e.g., A—B, where movement in both directions is permitted)
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Graph words</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
- **Vertex** (or node): a point (like “Austin”)
- **Edge** (or arc): a connection between two vertices
- **Path**: a sequence of vertices that connects start to end
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Undirected graph</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
- Edge has **no direction**
- If A is connected to B, then B is connected to A

<hr>

Example:
- Road between two cities (two-way)
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Directed graph</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
- Edge has **direction**
- A → B does <spanRED>NOT</spanRED> automatically mean B → A

<hr>

Example:

- One-way street

- “Flight from Houston to Austin” is <spanRED>not automatically</spanRED> “Austin to Houston”
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Adjacency</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Two vertices are **adjacent** if there is an edge between them.

- Undirected: A adjacent to B means B adjacent to A

<br>
<br>

- Directed: A adjacent to B <spanRED>depends on edge direction</spanRED> (A → B)
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Path example</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
If we have edges:
- A—B, B—C, C—D

Then A → D has a path:
- A, B, C, D
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Complete graph</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
- Every vertex connects to every other vertex

If there are N vertices:
- Complete **directed**: $N*(N−1)$ edges
- Complete **undirected**: $N*(N−1)/2$ edges

<hr>

See a smulation in Canvas.
   </div>
</div>

<hr>

Example:

- “Dallas → Denver = 780 miles”

<div class="definition-container">
  <div class="definition-title">Adjacency Matrix</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

- DFS stands for Depth-First Search, which explores <spanBYMix>as far as</spanBYMix> possible along each branch before backtracking. 

- BFS stands for Breadth-First Search, which explores <spanBYMix>all</spanBYMix> neighbors of a node at the current depth level before moving on to nodes at the next level.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Adjacency Matrix</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
A table (2D array):
- rows = “from”
- columns = “to”
- value = connected? (or weight)

Great when:
- Graph is dense (lots of edges)
- $\mathcal{O}(1)$ “is there an edge?” check
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Adjacency Matrix (cont.)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Vertices order: A=0, B=1, C=2, D=3

If unweighted, we can store 1/0:

<div  style="font-size: 1.6em; line-height: 1.5;">

```
      A B C D
A     0 1 0 1
B     1 0 1 1
C     0 1 0 0
D     1 1 0 0
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">adjacency matrix (unweighted)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">
  
```
#include <iostream>
#include <vector>
using namespace std;

int main() {
    int n = 4; // A,B,C,D
    vector<vector<int>> adj(n, vector<int>(n, 0));

    // undirected edges
    adj[0][1] = 1; adj[1][0] = 1; // A-B
    adj[0][3] = 1; adj[3][0] = 1; // A-D
    adj[1][2] = 1; adj[2][1] = 1; // B-C
    adj[1][3] = 1; adj[3][1] = 1; // B-D

    cout << "Is A connected to C? " << adj[0][2] << "\n"; // 0
    cout << "Is B connected to D? " << adj[1][3] << "\n"; // 1
    return 0;
}
```
</div>
   </div>
</div>

```

#include <vector>
using namespace std;

int main() {

<div class="definition-container">
  <div class="definition-title">A Graph class</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Goal: make the operations feel real.

We’ll:

- store vertex names in a vector

- use adjacency list with weights
   </div>
</div>



<div id="shadebox">

### Example code

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <vector>
#include <string>
using namespace std;

class Graph {
private:
    vector<string> names;                       // vertex labels
    vector<vector<pair<int,int>>> adj;          // (neighborIndex, weight)

    int findIndex(string name) {
        for (int i = 0; i < (int)names.size(); i++) {
            if (names[i] == name) return i;
        }
        return -1;
    }

public:
    void addVertex(string name) {
        if (findIndex(name) != -1) return;
        names.push_back(name);
        adj.push_back(vector<pair<int,int>>());
    }

    void addEdge(string from, string to, int w, bool directed) {
        int a = findIndex(from);
        int b = findIndex(to);
        if (a == -1 || b == -1) return;

        adj[a].push_back({b, w});
        if (!directed) adj[b].push_back({a, w});
    }

    void print() {
        for (int i = 0; i < (int)names.size(); i++) {
            cout << names[i] << ": ";
            for (pair<int,int> e : adj[i]) {
                cout << "(" << names[e.first] << "," << e.second << ") ";
            }
            cout << "\n";
        }
    }
};

int main() {
    Graph g;
    g.addVertex("A"); g.addVertex("B"); g.addVertex("C"); g.addVertex("D");
    g.addEdge("A","B",1,false);
    g.addEdge("A","D",1,false);
    g.addEdge("B","C",1,false);
    g.addEdge("B","D",1,false);
    g.print();
    return 0;
}


```

</div>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Why search/traverse a graph?</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Common question:

- “Can I get from X to Y?”

For example, using the airline graph:

- “Can we reach a destination city from a start city?”
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">DFS idea</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
DFS explores:

- “Go as far as possible down one path”

- If stuck, backtrack and try another path

The topic uses a stack for this.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">DFS uses a Stack</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Stack = LIFO (last in, first out)

Operations:

- push(x)

- pop()

- top()
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Visited marks</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Graphs can have cycles:

- If you keep revisiting, you can loop forever.

So we need:

- a visited[] array

- mark a vertex as visited when we first handle it
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Visited marks (cont.)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
The section calls these kinds of operations

<div id="shadebox-glass" class="shadebox glass">

- ClearMarks

- MarkVertex

- IsMarked
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">DFS (iterative) — high-level steps</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Push the start vertex

While stack not empty:

- take the top

- if it is the goal: done

- otherwise push its unvisited neighbors

- mark visited so we don’t repeat
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">DFS trace</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Graph:

- A: B, D
- B: A, C, D
- C: B
- D: A, B

Goal: start A, find C

Possible DFS path: A → D → B → C

(DFS depends on neighbor order.)
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">DFS (adjacency list)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">
  
```
#include <iostream>
#include <vector>
#include <stack>
using namespace std;

bool dfsPathExists(vector<vector<int>> &adj, int start, int target) {
    int n = adj.size();
    vector<bool> visited(n, false);
    stack<int> st;

    st.push(start);

    while (!st.empty()) {
        int v = st.top();
        st.pop();

        if (visited[v]) continue;
        visited[v] = true;

        if (v == target) return true;

        for (int u : adj[v]) {
            if (!visited[u]) st.push(u);
        }
    }
    return false;
}

    adj[1].push_back(2); adj[2].push_back(1);
    adj[1].push_back(3); adj[3].push_back(1);

    cout << dfsPathExists(adj, 0, 2) << "\n"; // A to C -> 1 (true)
    return 0;
}

```
#include <iostream>
#include <vector>
#include <queue>
using namespace std;

vector<int> bfsShortestPath(vector<vector<int>> &adj, int start, int target) {
    int n = adj.size();
    vector<bool> visited(n, false);
    vector<int> parent(n, -1);
    queue<int> q;

    q.push(start);
    visited[start] = true;

    while (!q.empty()) {
        int v = q.front();
        q.pop();

        if (v == target) break;

        for (int u : adj[v]) {
            if (!visited[u]) {
                visited[u] = true;
                parent[u] = v;
                q.push(u);
            }
        }
    }

    // build path by walking parents backwards
    vector<int> path;
    if (!visited[target]) return path; // empty = no path

    int cur = target;
    while (cur != -1) {
        path.push_back(cur);
        cur = parent[cur];
    }

    // reverse manually (beginner-friendly)
    for (int i = 0, j = (int)path.size() - 1; i < j; i++, j--) {
        int tmp = path[i];
        path[i] = path[j];
        path[j] = tmp;
    }
    return path;
}

int main() {
    int n = 4;
    vector<vector<int>> adj(n);

    adj[0].push_back(1); adj[1].push_back(0);
    adj[0].push_back(3); adj[3].push_back(0);
    adj[1].push_back(2); adj[2].push_back(1);
    adj[1].push_back(3); adj[3].push_back(1);

    vector<int> path = bfsShortestPath(adj, 0, 2);
    if (path.size() == 0) cout << "No path\n";
    else {
        cout << "Path: ";
        for (int v : path) cout << v << " ";
        cout << "\n";
    }
    return 0;
}

```
#include <iostream>
#include <vector>
#include <queue>
#include <limits>
using namespace std;

vector<int> dijkstra(vector<vector<pair<int,int>>> &adj, int start) {
    int n = adj.size();
    const int INF = numeric_limits<int>::max();
    vector<int> dist(n, INF);

    // (distance, vertex)
    priority_queue<pair<int,int>, vector<pair<int,int>>, greater<pair<int,int>>> pq;

    dist[start] = 0;
    pq.push({0, start});

    while (!pq.empty()) {
        pair<int,int> cur = pq.top();
        pq.pop();

        int d = cur.first;
        int v = cur.second;

        if (d != dist[v]) continue; // outdated entry

        for (pair<int,int> e : adj[v]) {
            int to = e.first;
            int w  = e.second;

            if (dist[v] != INF && dist[v] + w < dist[to]) {
                dist[to] = dist[v] + w;
                pq.push({dist[to], to});
            }
        }
    }
    return dist;
}

int main() {
    int n = 3;
    vector<vector<pair<int,int>>> adj(n);

    adj[0].push_back({1,5});
    adj[0].push_back({2,1});
    adj[2].push_back({1,1});

    vector<int> dist = dijkstra(adj, 0);
    cout << "dist to 1 = " << dist[1] << "\n"; // 2
    return 0;
}

Implement Dijkstra (using priority_queue)

<div id="shadebox">

### Example code

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <vector>
#include <queue>
#include <limits>
using namespace std;

vector<int> dijkstra(vector<vector<pair<int,int>>> &adj, int start) {
    int n = adj.size();
    const int INF = numeric_limits<int>::max();
    vector<int> dist(n, INF);

    // (distance, vertex)
    priority_queue<pair<int,int>, vector<pair<int,int>>, greater<pair<int,int>>> pq;

    dist[start] = 0;
    pq.push({0, start});

    while (!pq.empty()) {
        pair<int,int> cur = pq.top();
        pq.pop();

        int d = cur.first;
        int v = cur.second;

        if (d != dist[v]) continue; // outdated entry

        for (pair<int,int> e : adj[v]) {
            int to = e.first;
            int w  = e.second;

            if (dist[v] != INF && dist[v] + w < dist[to]) {
                dist[to] = dist[v] + w;
                pq.push({dist[to], to});
            }
        }
    }
    return dist;
}

int main() {
    int n = 3;
    vector<vector<pair<int,int>>> adj(n);

    adj[0].push_back({1,5});
    adj[0].push_back({2,1});
    adj[2].push_back({1,1});

    vector<int> dist = dijkstra(adj, 0);
    cout << "dist to 1 = " << dist[1] << "\n"; // 2
    return 0;
}
