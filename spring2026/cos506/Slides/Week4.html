<div class="question-container">
  <div class="question-title">What is a “List”</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

A **list** is a linear sequence of items:
- You can access items <spanGREEN>in order</spanGREEN> (first, second, third…)
- From an item (except the last), you can access the **next** item

  <div class="question-shadebox">
<div style="width: 800px;"></div>

A **Sorted List** keeps items ordered by a **key**.

Example (sorted by name):

<hr style="border: none; border-top: 2px dashed green;">

```

```
   </div>

- If we <spanGREEN>insert a new item</spanGREEN>, we must put it <spanRED>in the correct position</spanRED> so the list stays sorted.

<div class="question-container">

  <div class="question-shadebox">
<div style="width: 800px;"></div>

When a function says “Preconditions”, it means:

> “What must be true BEFORE you call it.”

Examples:
- `PutItem(item)`: list must be <spanBYMix>initialized</spanBYMix>, <spanRED>not full</spanRED>, and item <spanRED>not</spanRED> already inside; list is <spanGREEN>sorted</spanGREEN>.
- `DeleteItem(item)`: item’s key must be set; list sorted; exactly one matching item exists.

   </div>
</div>

We usually store:
- `info[]` : array of items
- `length` : how many items currently in list
- `maxList` : capacity (max size)
- `currentPos` : for iteration (`ResetList` + `GetNextItem`)
   </div>
</div>




<div class="question-container">
  <div class="question-title">ItemType</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

In the textbook style, items have a `ComparedTo()` that returns:
- `LESS`, `GREATER`, or `EQUAL`

Here is a minimal C++ version:

```cpp
enum RelationType { LESS, GREATER, EQUAL };

struct ItemType {
    int key; // the thing we sort by

    RelationType ComparedTo(const ItemType& other) const {
        if (key < other.key) return LESS;
        if (key > other.key) return GREATER;
        return EQUAL;
    }
};
```
   </div>
</div>

<div class="question-container">
  <div class="question-title">PutItem pseudocode</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

```
location = 0
while location < length AND item > info[location]:
    location++

for index = length down to location+1:

info[location] = item

```

<div class="question-container">
  <div class="question-title">PutItem C++</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

```
class SortedIntList {
private:
    static const int MAX = 100;
    int info[MAX];
    int length;

public:
    SortedIntList() : length(0) {}

    bool isFull() const { return length == MAX; }
    int getLength() const { return length; }

    void putItem(int item) {
        if (isFull()) return; // for class demo; in real code throw/handle

        int location = 0;
        while (location < length && info[location] < item) {
            location++;
        }

        for (int i = length; i > location; i--) {
            info[i] = info[i - 1];
        }

        info[location] = item;
        length++;
    }
};
```
   </div>
</div>

- Insert larger than everything: loop ends with location = length, shift loop does nothing → append → works.

<div class="question-container">
  <div class="question-title">DeleteItem C++</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

```
void deleteItem(int item) {
    // assume item exists exactly once (like the chapter’s precondition)
    int location = 0;
    while (location < length && info[location] != item) {
        location++;
    }

    if (location == length) return; // not found (extra safety)

    for (int i = location + 1; i < length; i++) {
        info[i - 1] = info[i];
    }

    length--;
}

```

</div>

class SortedIntList {

    int currentPos;

public:
    SortedIntList() : length(0), currentPos(-1) {}

> GetItem in a sorted list: why it can be faster



<div class="question-container">
  <div class="question-title">GetItem in a sorted list:</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

GetItem in a sorted list: why it can be <spanBYMix>faster</spanBYMix>

If list is sorted, and you are <spanGREEN>scanning left-to-right</spanGREEN>:

- When you reach a value bigger than your target, you can <spanRED>STOP</spanRED> early (target cannot appear later).

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

That’s better than unsorted scanning (where you must check all).
   </div>
</div>



<div class="question-container">
  <div class="question-title">GetItem</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

GetItem - improved sequential search

<hr style="border: none; border-top: 2px dashed green;">

```
bool getItemEarlyStop(int item) {
    int location = 0;
    while (location < length && info[location] < item) {
        location++;
    }
    return (location < length && info[location] == item);
}
```
   </div>
</div>

- Worst-case still $\mathcal{O}(n)$, but often faster when item is missing<h1>❓</h1>

<div class="question-container">
  <div class="question-title">Binary Search - phone book</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

Binary search = “split in half” again and again:

- check the middle

- decide left half or right half

- repeat

<hr style="border: none; border-top: 2px dashed green;">

This only works well when:

- data is sorted

- you have random access (arrays)

   </div>
</div>



<div class="question-container">
  <div class="question-title">Binary search variables</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

- first : left boundary index

- last : right boundary index

- mid : middle index

Loop while first <= last.
   </div>
</div>



<div class="question-container">
  <div class="question-title">Binary search C++</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

```
bool binarySearch(int item) const {
    int first = 0;
    int last = length - 1;

    while (first <= last) {
        int mid = (first + last) / 2;

        if (info[mid] == item) return true;
        if (item < info[mid]) last = mid - 1;
        else first = mid + 1;
    }
    return false;
}
```
   </div>
</div>




<div class="question-container">
  <div class="question-title">Example - Looking up a word in a dictionary (sorted)</div>
  <div class="question-shadebox">
<div style="width: 1000px;"></div>

- The dictionary words are alphabetical (sorted) = like info[].

- You want to find “cat”.

- You open the dictionary in the middle.

	- If the middle word is “mango”, then “cat” must be in the left half.

	- If the middle word is “apple”, then “cat” must be in the right half.

- Repeat: always jump to the middle of the remaining half until found or the range is empty.

- first, last, mid = the pages you’re still searching.
   </div>
</div>



<div class="question-container">
  <div class="question-title">Big-O of Binary Search</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>


Each step cuts the search area in half.

So the number of steps grows like:

- $\mathcal{log2(n)}$ (log base 2)

Binary search is $\mathcal{O}(log2(n))$.
   </div>
</div>




<div class="question-container">
  <div class="question-title">Big-O of Binary Search</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

Because binary search halves what’s left each step.

If you start with $n$ items, after:

- $1$ step → at most $n / 2$ items left

- $2$ steps → at most $n / 4$ left

- $3$ steps → at most $n / 8$ left

- $k$ steps → at most $n / 2^k$ left
   </div>
</div>




<div class="question-container">
  <div class="question-title">Comparing linear vs binary</div>
  <div class="question-shadebox">

- Linear search: up to $n$ checks → $\mathcal{O}(n)$

- Binary search: about $\mathcal{log2(n)}$ checks → $\mathcal{log n}$

<hr style="border: none; border-top: 2px dashed green;">

Example intuition:

- n = 1024 → log2(1024) = 10 → about ~10–11 checks
   </div>
</div>



<div class="question-container">
  <div class="question-title">Comparing linear vs binary</div>
  <div class="question-shadebox">

- Linear search: up to $n$ checks → $\mathcal{O}(n)$

	- Linear search (scan one by one):
	- Worst / average: $\mathcal{O}(n)$
	- Best: $\mathcal{O}(1)$ (if it’s the first element)

<hr style="border: none; border-top: 2px dashed green;">

- Binary search: Worst case: $\mathcal{O}(logn)$ (item not found, or found at the end)

	- Best case: $\mathcal{O}(1)$ (item happens to be at the first mid)
	- Average case: $\mathcal{O}(logn)$

   </div>
</div>




<div class="question-container">
  <div class="question-title">Example - Finding a book on a messy desk</div>
  <div class="question-shadebox">
<div style="width: 1000px;"></div>

The books are not sorted → linear search. You are looking for one specific book.

- Best case — $\mathcal{O}(1)$

	- The book is right on top of the pile.

	- You pick it up immediately.

	- Only 1 check.

- “Lucky me — found it instantly.”
   </div>
</div>




<div class="question-container">
  <div class="question-title">Example - Finding a book on a messy desk</div>
  <div class="question-shadebox">
<div style="width: 1000px;"></div>

- Average case — $\mathcal{O}(n)$

	- The book is somewhere in the middle.

	- You check about <spanBYMix>half</spanBYMix> the books before finding it.

	- Roughly n / 2 checks, but Big-$\mathcal{O}$ ignores constants → $\mathcal{O}(n)$.

- “Had to look through several books, but not all.”
   </div>
</div>




<div class="question-container">
  <div class="question-title">Example - Finding a book on a messy desk</div>
  <div class="question-shadebox">
<div style="width: 1000px;"></div>

- Worst case — $\mathcal{O}(n)$

	- The book is at the very bottom — or not there at all.

	- You must check every single book.

	- n checks.

- “I checked everything… either it’s last or missing.”
   </div>
</div>



> In linear search, the best case occurs when the target is found immediately, the average case requires checking about <spanBYMix>half</spanBYMix> the elements, and the worst case requires checking <spanBYMix>all</spanBYMix> elements, resulting in $\mathcal{O}(n)$ time.

Binary search works for array implementation. It does <spanGREEN>not</spanGREEN> work naturally for linked lists because:

- You <spanGREEN>cannot</spanGREEN> jump directly to the middle node quickly

</div>

<div class="question-container">
  <div class="question-title">Linked list</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>


A linked list is a linear data structure where elements are stored as nodes, and each node keeps:

- The data

- A pointer (link) to the next node (and sometimes also to the previous node)


```
[data | next] → [data | next] → [data | next] → null

```
   </div>

In C++, the ~ means destructor.

#include <iostream>
using namespace std;

struct NodeType {
    int info;
    NodeType* next;

    // Destructor: runs automatically when a NodeType is deleted
    ~NodeType() {
        cout << "Node destructor called for value = " << info << endl;
    }
};

class LinkedList {
private:
    NodeType* head;

public:
    LinkedList() {
        head = nullptr;
    }

    void BuildExample_10_20_30() {
        NodeType* A = new NodeType;
        NodeType* B = new NodeType;
        NodeType* C = new NodeType;

        A->info = 10; A->next = B;
        B->info = 20; B->next = C;
        C->info = 30; C->next = nullptr;

        head = A;
    }

    void Print() const {
        NodeType* p = head;
        while (p != nullptr) {
            cout << "[" << p->info << "] -> ";
            p = p->next;
        }
        cout << "nullptr" << endl;
    }

    // Delete the first node whose info == value (here we will use value=20)
    void DeleteValue(int value) {
        if (head == nullptr) return;

        // Special case: deleting head
        if (head->info == value) {
            NodeType* doomed = head;
            head = head->next;
            delete doomed;              // ✅ triggers NodeType destructor
            return;
        }

        // General case: find predecessor
        NodeType* pred = head;
        while (pred->next != nullptr && pred->next->info != value) {
            pred = pred->next;
        }

        if (pred->next != nullptr) {   // found it
            NodeType* doomed = pred->next;     // doomed points to the node to delete
            pred->next = doomed->next;         // bypass it
            delete doomed;                      // ✅ triggers NodeType destructor
        }
    }

    // Destructor: runs automatically when LinkedList object goes out of scope
    ~LinkedList() {
        cout << "LinkedList destructor: cleaning remaining nodes..." << endl;

        NodeType* cur = head;
        while (cur != nullptr) {
            NodeType* next = cur->next;
            delete cur;                 // ✅ triggers NodeType destructor for each remaining node
            cur = next;
        }

        head = nullptr;
    }
};

int main() {
    LinkedList list;
    list.BuildExample_10_20_30();

    cout << "Before delete: ";
    list.Print();

    cout << "Deleting 20..." << endl;
    list.DeleteValue(20);

    cout << "After delete:  ";
    list.Print();

    cout << "End of main() is coming. LinkedList destructor will run next." << endl;
    return 0;
}
```

> Binary search works for linked list? 



<div class="question-container">
  <div class="question-title">Note</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

Binary search needs this operation: Jump directly to the middle element

```
middle = (low + high) / 2;

```

<spanRED>Linked lists do NOT support indexing</spanRED>. To reach the middle, you must walk node by node:

```
head → → → → middle
```

The complexity Each “middle” search costs $\mathcal{O}(n)$. Total becomes: $\mathcal{O}(n\log n)$ (<spanRED>Not worth it</spanRED>)
   </div>
</div>

- linked: search $\mathcal{O}(n)$ + link $\mathcal{O}(1)$ → $\mathcal{O}(n)$

DeleteItem:

- array: search + shift → $\mathcal{O}(n)$

- linked: search $\mathcal{O}(n)$ + unlink $\mathcal{O}(1)$ → $\mathcal{O}(n)$

#include <iostream>
using namespace std;

class SortedScoreList {
private:
    static const int MAX = 20;   // capacity of the leaderboard
    int info[MAX];
    int length;

public:
    SortedScoreList() {
        length = 0;
    }

    bool isFull() const {
        return length == MAX;
    }

    bool isEmpty() const {
        return length == 0;
    }

    int getLength() const {
        return length;
    }

    // Descending order: biggest score first
    void putItem(int item) {
        if (isFull()) {
            cout << "Leaderboard is full. Cannot add.\n";
            return;
        }

        // duplicate check using search
        if (getItem(item)) {
            cout << "Score already exists. Not added.\n";
            return;
        }

        // find location where item should go (descending)
        int location = 0;
        while (location < length && info[location] > item) {
            location++;
        }

        // shift right
        for (int i = length; i > location; i--) {
            info[i] = info[i - 1];
        }

        info[location] = item;
        length++;
        cout << "Added score " << item << ".\n";
    }

    // Delete one matching item if it exists
    void deleteItem(int item) {
        if (isEmpty()) {
            cout << "Leaderboard is empty.\n";
            return;
        }

        int location = 0;
        while (location < length && info[location] != item) {
            location++;
        }

        if (location == length) {
            cout << "Score not found. Nothing deleted.\n";
            return;
        }

        // shift left
        for (int i = location + 1; i < length; i++) {
            info[i - 1] = info[i];
        }

        length--;
        cout << "Deleted score " << item << ".\n";
    }

    // Early-stop search (works because list is sorted descending)
    bool getItem(int item) const {
        int location = 0;

        // since descending: once info[location] < item, item cannot appear later
        while (location < length && info[location] > item) {
            location++;
        }

        if (location < length && info[location] == item) return true;
        return false;
    }

    void print() const {
        if (isEmpty()) {
            cout << "[empty]\n";
            return;
        }

        cout << "Leaderboard (high -> low): ";
        for (int i = 0; i < length; i++) {
            cout << info[i];
            if (i != length - 1) cout << ", ";
        }
        cout << "\n";
    }
};

int main() {
    SortedScoreList board;

    int choice;
    while (true) {
        cout << "\n==== Top Scores Leaderboard ====\n";
        cout << "1. Add score\n";
        cout << "2. Remove score\n";
        cout << "3. Search score\n";
        cout << "4. Print leaderboard\n";
        cout << "5. Exit\n";
        cout << "Choose: ";
        cin >> choice;

        if (choice == 1) {
            int score;
            cout << "Enter score: ";
            cin >> score;
            board.putItem(score);
        }
        else if (choice == 2) {
            int score;
            cout << "Enter score to remove: ";
            cin >> score;
            board.deleteItem(score);
        }
        else if (choice == 3) {
            int score;
            cout << "Enter score to search: ";
            cin >> score;
            if (board.getItem(score)) cout << "FOUND\n";
            else cout << "NOT FOUND\n";
        }
        else if (choice == 4) {
            board.print();
        }
        else if (choice == 5) {
            cout << "Bye!\n";
            break;
        }
        else {
            cout << "Invalid choice.\n";
        }
    }

    return 0;
}

#include <iostream>
using namespace std;

class SortedIntList {
private:
    static const int MAX = 50;
    int info[MAX];
    int length;

public:
    SortedIntList() {
        length = 0;
    }

    bool isFull() const {
        return length == MAX;
    }

    bool isEmpty() const {
        return length == 0;
    }

    int getLength() const {
        return length;
    }

    void makeEmpty() {
        length = 0;
    }

    // early-stop search because list is sorted ascending
    bool getItem(int item) const {
        int location = 0;
        while (location < length && info[location] < item) {
            location++;
        }
        return (location < length && info[location] == item);
    }

    void putItem(int item) {
        if (isFull()) {
            cout << "List is full. Cannot insert.\n";
            return;
        }

        if (getItem(item)) {
            cout << "Duplicate not allowed: " << item << "\n";
            return;
        }

        int location = 0;
        while (location < length && info[location] < item) {
            location++;
        }

        for (int i = length; i > location; i--) {
            info[i] = info[i - 1];
        }

        info[location] = item;
        length++;
        cout << "Inserted: " << item << "\n";
    }

    void deleteItem(int item) {
        if (isEmpty()) {
            cout << "List is empty. Nothing to delete.\n";
            return;
        }

        int location = 0;
        while (location < length && info[location] < item) {
            location++;
        }

        if (location == length || info[location] != item) {
            cout << "Not found: " << item << "\n";
            return;
        }

        for (int i = location + 1; i < length; i++) {
            info[i - 1] = info[i];
        }

        length--;
        cout << "Deleted: " << item << "\n";
    }

    void print() const {
        if (isEmpty()) {
            cout << "[empty]\n";
            return;
        }

        cout << "List: ";
        for (int i = 0; i < length; i++) {
            cout << info[i];
            if (i != length - 1) cout << ", ";
        }
        cout << "\n";
    }
};

int main() {
    SortedIntList list;
    int choice;

    while (true) {
        cout << "\n==== SortedIntList Menu ====\n";
        cout << "1) Insert\n";
        cout << "2) Delete\n";
        cout << "3) Search\n";
        cout << "4) Print\n";
        cout << "5) Clear\n";
        cout << "6) Exit\n";
        cout << "Choose: ";
        cin >> choice;

        if (choice == 1) {
            int x;
            cout << "Enter number: ";
            cin >> x;
            list.putItem(x);
        }
        else if (choice == 2) {
            int x;
            cout << "Enter number to delete: ";
            cin >> x;
            list.deleteItem(x);
        }
        else if (choice == 3) {
            int x;
            cout << "Enter number to search: ";
            cin >> x;
            cout << (list.getItem(x) ? "FOUND\n" : "NOT FOUND\n");
        }
        else if (choice == 4) {
            list.print();
        }
        else if (choice == 5) {
            list.makeEmpty();
            cout << "List cleared.\n";
        }
        else if (choice == 6) {
            cout << "Bye!\n";
            break;
        }
        else {
            cout << "Invalid choice.\n";
        }
    }

    return 0;
}
