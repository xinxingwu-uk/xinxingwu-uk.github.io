<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Vocabulary</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>
  
- **Push(x)**: put x on top
- **Pop()**: remove top
- **Top()** (or Peek): look at top without removing
- **IsEmpty()**: any items?
- **IsFull()**: only for fixed-size implementations

Minimum common set:

<div  style="font-size: 1.6em; line-height: 1.5;">

- `Push(item)`
- `Pop()`
- `Top()`
- `IsEmpty()`
- `IsFull` (only if capacity is limited)

</div>
</div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Underflow vs Overflow</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

- **Underflow**: Pop/Top when empty
- **Overflow**: Push when full (fixed-size stack)

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">“Logical garbage” idea</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

If we store stack in an <spanGREEN>array</spanGREEN>:
- Pop usually just moves the `top` index down
- Old values still exist in memory (garbage), but we treat them as “not in stack”
- The stack’s “real content” is only up to `top`
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">The key variable: `top`</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>
  
A classic design:
- `top` stores the index of the last valid element
- when empty: `top = -1`
- after pushing first item: `top = 0`
   </div>
</div>

  <div class="definition-pro-Y-title">Visual trace</div>

  <div class="definition-pro-Y-shadebox">

If `top == -1`, then:

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Stack class (fixed-size)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

<div  style="font-size: 1.5em; line-height: 1.5;">


```
#include <iostream>
#include <stdexcept>
using namespace std;

class StackFull : public runtime_error {
public:
    StackFull() : runtime_error("Stack overflow: stack is full") {}
};

class StackEmpty : public runtime_error {
public:
    StackEmpty() : runtime_error("Stack underflow: stack is empty") {}
};

class IntStack {
private:
    static const int MAX = 100;
    int items[MAX];
    int top; // index of top item, -1 means empty

public:
    IntStack() {
        top = -1;
    }

    bool IsEmpty() const {
        return top == -1;
    }

    bool IsFull() const {
        return top == MAX - 1;
    }

    void Push(int x) {
        if (IsFull()) throw StackFull();
        top++;
        items[top] = x;
    }

    void Pop() {
        if (IsEmpty()) throw StackEmpty();
        top--;
    }

    int Top() const {
        if (IsEmpty()) throw StackEmpty();
        return items[top];
    }
};

```

</div>
</div>
</div>

#include <iostream>

using namespace std;

void typeAction(stack<string>& undoStack, const string& action) {
    cout << "Type " << action << "\n";
    undoStack.push(action);
}

void undo(stack<string>& undoStack) {
    if (undoStack.empty()) {
        cout << "Undo: nothing to undo\n";
        return;
    }
    cout << "Undo removes " << undoStack.top() << "\n";
    undoStack.pop();
}

int main() {
    stack<string> undoStack;

    typeAction(undoStack, "A");
    typeAction(undoStack, "B");
    typeAction(undoStack, "C");

    cout << "\nNow undo:\n";
    undo(undoStack); // removes C first
    undo(undoStack); // then removes B
    undo(undoStack); // then removes A

    return 0;
}

```

<div class="question-container">

<div class="definition-container">
  <div class="definition-title">Key idea</div>
  <div class="definition-shadebox">
  <div style="width: 800px;"></div>
  
Read the expression left to right:

- when you see an opening symbol → push it

- when you see a closing symbol → top must match → pop it

At the end:

- stack must be empty

- { push

- [ push

- ( push

- ) matches ( → pop

- ] matches [ → pop

- } matches { → pop

End: stack empty → well-formed
   </div>
</div>

  <div class="definition-shadebox">
  <div style="width: 800px;"></div>

- [ push

- ( push

  <div class="definition-shadebox">

  <div class="definition-shadebox">
<div style="width: 800px;"></div>

End:

- stack not empty → extra opening → not well-formed ❌

<div class="definition-container">
  <div class="definition-title">Functions</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

We often write:

- IsOpen(c) → true if c is one of (, [, {

- IsClose(c) → true if c is one of ), ], }

- Matches(open, close) → true if they pair correctly
   </div>

<div id="shadebox">

### Example - use STL stack

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <stack>
#include <string>
using namespace std;

bool IsOpen(char c) {
    return c == '(' || c == '[' || c == '{';
}

bool IsClose(char c) {
    return c == ')' || c == ']' || c == '}';
}

bool Matches(char open, char close) {
    return (open == '(' && close == ')') ||
           (open == '[' && close == ']') ||
           (open == '{' && close == '}');
}

bool IsWellFormed(const string& s) {
    stack<char> st;

    for (char c : s) {
        if (IsOpen(c)) {
            st.push(c);
        } else if (IsClose(c)) {
            if (st.empty()) return false;      // underflow
            char top = st.top();
            st.pop();
            if (!Matches(top, c)) return false; // mismatch
        }
    }

    return st.empty(); // must be empty at end
}

int main() {
    cout << IsWellFormed("{[()]}") << "\n"; // 1
    cout << IsWellFormed("{[(])}") << "\n"; // 0
}

```

<div class="definition-container">

  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Instead of:

```

```

```

```

<div class="definition-container">

  <div class="definition-shadebox">

   </div>

### Example code - Dynamic array stack

<hr style="border: none; border-top: 1.5px solid cyan;">

```
class DynIntStack {
private:
    int* items;
    int top;
    int maxSize;

public:
    DynIntStack(int size = 100) {
        maxSize = size;
        items = new int[maxSize];
        top = -1;
    }

    ~DynIntStack() {
        delete[] items;
    }

    bool IsEmpty() const { return top == -1; }
    bool IsFull()  const { return top == maxSize - 1; }

    void Push(int x) {
        if (IsFull()) throw StackFull();
        items[++top] = x;
    }

    void Pop() {
        if (IsEmpty()) throw StackEmpty();
        top--;
    }

    int Top() const {
        if (IsEmpty()) throw StackEmpty();
        return items[top];
    }
};

```

<div class="definition-container">
  <div class="definition-title">Linked stack (idea)</div>
  <div class="definition-shadebox">
  <div style="width: 800px;"></div>
  
We store nodes:

- each node holds (data, next)

   </div>

<div class="definition-container">
  <div class="definition-title">Linked stack (cont.)</div>
  <div class="definition-shadebox">
  <div style="width: 800px;"></div>

Push:

- create new node

- new->next = top

- top = new

Pop:

- remove top node
   </div>
</div>



<div id="shadebox">

### Example code - Linked stack

<hr style="border: none; border-top: 1.5px solid cyan;">

```
class LinkedIntStack {
private:
    struct Node {
        int data;
        Node* next;
    };

    Node* topPtr;

public:
    LinkedIntStack() { topPtr = nullptr; }

    ~LinkedIntStack() {
        while (!IsEmpty()) Pop();
    }

    bool IsEmpty() const {
        return topPtr == nullptr;
    }

    void Push(int x) {
        Node* n = new Node;
        n->data = x;
        n->next = topPtr;
        topPtr = n;
    }

    void Pop() {
        if (IsEmpty()) throw StackEmpty();
        Node* old = topPtr;
        topPtr = topPtr->next;
        delete old;
    }

    int Top() const {
        if (IsEmpty()) throw StackEmpty();
        return topPtr->data;
    }
};

```

</div>

A Queue is an ordered collection where:

  <div class="definition-pro-Y-shadebox">
    <div style="width: 800px;"></div>
  
- Enqueue(x): add x to rear

Queue:

  <div class="definition-pro-Y-shadebox">

Typical ADT says:

<div class="definition-pro-Y-container">

Better:

using namespace std;

int main() {

    int rear = 3;
    cout << "Start rear = " << rear << "\n";

    for (int i = 0; i < 4; i++) {

Enqueue:

### Example code - Circular Queue (int)

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <stdexcept>
using namespace std;

class QueueFull : public runtime_error {
public:
    QueueFull() : runtime_error("Queue overflow: queue is full") {}
};

class QueueEmpty : public runtime_error {
public:
    QueueEmpty() : runtime_error("Queue underflow: queue is empty") {}
};

class IntQueue {
private:
    static const int MAX = 5; // small for easy testing
    int items[MAX];
    int front;
    int rear;
    int count;

public:
    IntQueue() {
        front = 0;
        rear = -1;
        count = 0;
    }

    bool IsEmpty() const { return count == 0; }
    bool IsFull()  const { return count == MAX; }

    void Enqueue(int x) {
        if (IsFull()) throw QueueFull();
        rear = (rear + 1) % MAX;
        items[rear] = x;
        count++;
    }

    void Dequeue() {
        if (IsEmpty()) throw QueueEmpty();
        front = (front + 1) % MAX;
        count--;
    }

    int Front() const {
        if (IsEmpty()) throw QueueEmpty();
        return items[front];
    }
};


```

class LinkedIntQueue {
private:
    struct Node {
        int data;
        Node* next;
    };

    Node* frontPtr;
    Node* rearPtr;

public:
    LinkedIntQueue() {
        frontPtr = nullptr;
        rearPtr = nullptr;
    }

    ~LinkedIntQueue() {
        while (!IsEmpty()) Dequeue();
    }

    bool IsEmpty() const {
        return frontPtr == nullptr;
    }

    void Enqueue(int x) {
        Node* n = new Node;
        n->data = x;
        n->next = nullptr;

        if (IsEmpty()) {
            frontPtr = n;
            rearPtr = n;
        } else {
            rearPtr->next = n;
            rearPtr = n;
        }
    }

    void Dequeue() {
        if (IsEmpty()) throw QueueEmpty();
        Node* old = frontPtr;
        frontPtr = frontPtr->next;
        delete old;

        if (frontPtr == nullptr) {
            rearPtr = nullptr; // queue became empty
        }
    }

    int Front() const {
        if (IsEmpty()) throw QueueEmpty();
        return frontPtr->data;
    }
};

#include <iostream>
#include <string>
#include <stdexcept>
using namespace std;

/* =======================
   Exceptions
   ======================= */
class StackFull : public runtime_error {
public:
    StackFull() : runtime_error("Stack overflow: stack is full") {}
};

class StackEmpty : public runtime_error {
public:
    StackEmpty() : runtime_error("Stack underflow: stack is empty") {}
};

class QueueFull : public runtime_error {
public:
    QueueFull() : runtime_error("Queue overflow: queue is full") {}
};

class QueueEmpty : public runtime_error {
public:
    QueueEmpty() : runtime_error("Queue underflow: queue is empty") {}
};

/* =======================
   Part A: Array Stack<char>
   ======================= */
class CharStack {
private:
    static const int MAX = 200;
    char items[MAX];
    int top; // -1 means empty

public:
    CharStack() { top = -1; }

    bool IsEmpty() const { return top == -1; }
    bool IsFull()  const { return top == MAX - 1; }

    void Push(char c) {
        if (IsFull()) throw StackFull();
        items[++top] = c;
    }

    void Pop() {
        if (IsEmpty()) throw StackEmpty();
        top--;
    }

    char Top() const {
        if (IsEmpty()) throw StackEmpty();
        return items[top];
    }
};

/* Balanced symbols helpers */
bool IsOpen(char c) {
    return c == '(' || c == '[' || c == '{';
}

bool IsClose(char c) {
    return c == ')' || c == ']' || c == '}';
}

bool Matches(char open, char close) {
    return (open == '(' && close == ')') ||
           (open == '[' && close == ']') ||
           (open == '{' && close == '}');
}

bool IsWellFormed(const string& s) {
    CharStack st;

    for (char c : s) {
        if (IsOpen(c)) {
            st.Push(c);
        } else if (IsClose(c)) {
            if (st.IsEmpty()) return false; // early close
            char t = st.Top();
            st.Pop();
            if (!Matches(t, c)) return false; // mismatch
        }
    }
    return st.IsEmpty(); // no leftover opens
}

/* =======================
   Part B: Circular Queue<int>
   ======================= */
class IntQueue {
private:
    static const int MAX = 5; // intentionally small for overflow practice
    int items[MAX];
    int front;
    int rear;
    int count;

public:
    IntQueue() {
        front = 0;
        rear = -1;
        count = 0;
    }

    bool IsEmpty() const { return count == 0; }
    bool IsFull()  const { return count == MAX; }
    int  Size()    const { return count; }

    void Enqueue(int x) {
        if (IsFull()) throw QueueFull();
        rear = (rear + 1) % MAX;
        items[rear] = x;
        count++;
    }

    void Dequeue() {
        if (IsEmpty()) throw QueueEmpty();
        front = (front + 1) % MAX;
        count--;
    }

    int Front() const {
        if (IsEmpty()) throw QueueEmpty();
        return items[front];
    }
};

/* =======================
   Main: Lab Driver
   ======================= */
int main() {
    cout << "=== Part A: Balanced Symbols Checker (Stack) ===\n";
    cout << "Enter an expression: ";
    string expr;
    getline(cin, expr);

    if (IsWellFormed(expr)) cout << "Result: VALID\n";
    else                   cout << "Result: INVALID\n";

    cout << "\n=== Part B: Service Desk Simulator (Queue) ===\n";
    cout << "Commands: ARRIVE id | SERVE | NEXT | STATUS | END\n";

    IntQueue line;
    string cmd;

    while (true) {
        cout << "> ";
        cin >> cmd;

        if (cmd == "END") {
            cout << "Goodbye.\n";
            break;
        }

        try {
            if (cmd == "ARRIVE") {
                int id;
                cin >> id;
                line.Enqueue(id);
                cout << "Customer " << id << " arrived.\n";
            } else if (cmd == "SERVE") {
                int next = line.Front();
                line.Dequeue();
                cout << "Serving customer " << next << ".\n";
            } else if (cmd == "NEXT") {
                cout << "Next customer: " << line.Front() << "\n";
            } else if (cmd == "STATUS") {
                cout << "Customers waiting: " << line.Size() << "\n";
            } else {
                cout << "Unknown command.\n";
            }
        } catch (const exception& e) {
            cout << "Error: " << e.what() << "\n";
        }
    }

    return 0;
}

```
#include <iostream>
#include <string>
#include <stdexcept>
#include <sstream>
using namespace std;

/* =======================
   Exceptions
   ======================= */
class QueueFull : public runtime_error {
public:
    QueueFull() : runtime_error("Queue overflow: pending queue is full") {}
};

class QueueEmpty : public runtime_error {
public:
    QueueEmpty() : runtime_error("Queue underflow: no pending jobs") {}
};

class StackFull : public runtime_error {
public:
    StackFull() : runtime_error("Stack overflow: processed stack is full") {}
};

class StackEmpty : public runtime_error {
public:
    StackEmpty() : runtime_error("Stack underflow: no processed jobs") {}
};

/* =======================
   Circular Array Queue<string>
   ======================= */
class StringQueue {
private:
    static const int MAX = 10; // small for practice; you may increase
    string items[MAX];
    int front;
    int rear;
    int count;

public:
    StringQueue() {
        front = 0;
        rear = -1;
        count = 0;
    }

    bool IsEmpty() const { return count == 0; }
    bool IsFull()  const { return count == MAX; }
    int  Size()    const { return count; }

    void Enqueue(const string& job) {
        if (IsFull()) throw QueueFull();
        rear = (rear + 1) % MAX;
        items[rear] = job;
        count++;
    }

    void Dequeue() {
        if (IsEmpty()) throw QueueEmpty();
        front = (front + 1) % MAX;
        count--;
    }

    string Front() const {
        if (IsEmpty()) throw QueueEmpty();
        return items[front];
    }

    void PrintQueue() const {
        cout << "Pending (front -> rear): ";
        if (IsEmpty()) {
            cout << "[empty]\n";
            return;
        }

        cout << "[";
        for (int i = 0; i < count; i++) {
            int idx = (front + i) % MAX;
            cout << items[idx];
            if (i != count - 1) cout << ", ";
        }
        cout << "]\n";
    }
};

/* =======================
   Array Stack<string>
   ======================= */
class StringStack {
private:
    static const int MAX = 10; // small for practice; you may increase
    string items[MAX];
    int top; // -1 means empty

public:
    StringStack() {
        top = -1;
    }

    bool IsEmpty() const { return top == -1; }
    bool IsFull()  const { return top == MAX - 1; }
    int  Size()    const { return top + 1; }

    void Push(const string& job) {
        if (IsFull()) throw StackFull();
        items[++top] = job;
    }

    void Pop() {
        if (IsEmpty()) throw StackEmpty();
        top--;
    }

    string Top() const {
        if (IsEmpty()) throw StackEmpty();
        return items[top];
    }

    void PrintStack() const {
        cout << "Processed (top -> bottom): ";
        if (IsEmpty()) {
            cout << "[empty]\n";
            return;
        }

        cout << "[";
        for (int i = top; i >= 0; i--) {
            cout << items[i];
            if (i != 0) cout << ", ";
        }
        cout << "]\n";
    }
};

/* =======================
   Main Program
   ======================= */
int main() {
    StringQueue pending;
    StringStack processed;

    cout << "=== Job Center Simulator (Queue + Stack) ===\n";
    cout << "Commands:\n";
    cout << "  ADD jobName\n";
    cout << "  PROCESS\n";
    cout << "  UNDO\n";
    cout << "  NEXT\n";
    cout << "  HISTORY\n";
    cout << "  STATUS\n";
    cout << "  LIST\n";
    cout << "  END\n\n";

    string line;
    while (true) {
        cout << "> ";
        getline(cin, line);

        if (line.empty()) continue;

        stringstream ss(line);
        string cmd;
        ss >> cmd;

        try {
            if (cmd == "END") {
                cout << "Goodbye.\n";
                break;
            } else if (cmd == "ADD") {
                string job;
                ss >> job;
                if (job.empty()) {
                    cout << "Error: ADD requires a job name (example: ADD HW1)\n";
                } else {
                    pending.Enqueue(job);
                    cout << "Added job: " << job << "\n";
                }
            } else if (cmd == "PROCESS") {
                // move from queue -> stack
                string job = pending.Front();
                pending.Dequeue();
                processed.Push(job);
                cout << "Processed job: " << job << "\n";
            } else if (cmd == "UNDO") {
                // move from stack -> queue (goes to rear)
                string job = processed.Top();
                processed.Pop();
                pending.Enqueue(job);
                cout << "Undo: returned job to pending: " << job << "\n";
            } else if (cmd == "NEXT") {
                cout << "Next pending job: " << pending.Front() << "\n";
            } else if (cmd == "HISTORY") {
                cout << "Most recent processed job: " << processed.Top() << "\n";
            } else if (cmd == "STATUS") {
                cout << "Pending count: " << pending.Size()
                     << " | Processed count: " << processed.Size() << "\n";
            } else if (cmd == "LIST") {
                pending.PrintQueue();
                processed.PrintStack();
            } else {
                cout << "Unknown command: " << cmd << "\n";
            }
        } catch (const exception& e) {
            cout << "Error: " << e.what() << "\n";
        }
    }

    return 0;
}
