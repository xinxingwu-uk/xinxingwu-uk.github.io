- << endl means end the line (go to a new line) and it also flushes the output buffer

## Recursive algorithm

<div id="roundbox">

```
#include <iostream>

using namespace std;

int sumToN(int n) {           
// a function that returns 1 + 2 + ... + n

    if (n == 1) {             
	// base case: when n is 1, the sum is 1
	
        return 1;             
    }
    return n + sumToN(n - 1); 
	// recursive case: n + (sum from 1 to n-1)
}

int main() {                          
// program starts here

    int result = sumToN(10);          
	// compute sum from 1 to 10 using recursion
	
    cout << "Sum from 1 to 10 is: "   
	// print message
	
         << result                    
		 // print the result value
		 
         << endl;                     
		 // move to next line
		 
    return 0;                         
	// end program
}

```
