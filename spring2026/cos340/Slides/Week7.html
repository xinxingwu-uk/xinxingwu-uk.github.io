</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Templates (Generics)</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

C++ Templates (Generics) + warm-up pointers review  

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Why do we need “generic” code?</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>
  

Sometimes we want the <spanBYMix>SAME</spanBYMix> data structure for <spanGREEN>many</spanGREEN> types:
- Stack of `int`
- Stack of `double`
- Stack of `string`

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

Without templates, we would <spanRED>rewrite</spanRED> the <spanRED>same</spanRED> class again and again.

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Examples </div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

```
#include <iostream>
#include <string>
using namespace std;

class IntBox {
private:
    int value;

public:
    IntBox(int v) { value = v; }
    int get() const { return value; }
    void set(int v) { value = v; }
};

class StringBox {
private:
    string value;

public:
    StringBox(string v) { value = v; }
    string get() const { return value; }
    void set(string v) { value = v; }
};

class DoubleBox {
private:
    double value;

public:
    DoubleBox(double v) { value = v; }
    double get() const { return value; }
    void set(double v) { value = v; }
};

int main() {
    IntBox a(10);
    StringBox b("Hello");
    DoubleBox c(3.14);

    cout << a.get() << "\n";
    cout << b.get() << "\n";
    cout << c.get() << "\n";
}
```

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Examples </div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

```
Box<int> a(10);
Box<string> b("Hello");
Box<double> c(3.14);
```

   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Examples </div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

Instead of writing:

```
IntBox

StringBox

DoubleBox

CharBox

FloatBox
```

You write only one generic class: Box\<T\>.
   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Template </div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

- Template = “code that works for many types”

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

A **template** lets you write:

- one class definition
- that can become many real classes later

Think: a “cookie cutter” for classes.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Template </div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

Smallest template example: a “Box”

```
#include <iostream>
using namespace std;

template <class T>
class Box {
private:
    T value;

public:
    Box(T v) { value = v; }
    T get() const { return value; }
    void set(T v) { value = v; }
};

int main() {
    Box<int> a(10);
    Box<string> b("Hello");

    cout << a.get() << "\n";
    cout << b.get() << "\n";
}
```

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">What does Box<int> mean?</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

Box<int> tells the compiler:

- “Replace T with int”

- and generate a real class type from the template.

So you get a real class named something like Box_int.

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Instantiation</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

Compile-time generation - When you write:

```
Box<int> a(10);
Box<string> b("Hi");
```

   </div>
</div>

- The compiler generates:

	- Box\<int\> version

	- Box\<string\> version

- This happens at compile time, not at runtime.



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Template syntax</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

```
template <class T>

```

- template introduces a template

- T is a placeholder type name (can be anything: T, ItemType, etc.)
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Template function</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

```
template <class T>
T myMax(T a, T b) {
    if (a > b) return a;
    return b;
}

int main() {
    cout << myMax<int>(3, 7) << "\n";
    cout << myMax<double>(2.5, 1.2) << "\n";
}
```

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Common confusion</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

- “Why does my template code fail to link?”

- Templates usually must be fully visible to the compiler when used.

- That’s why many template classes put:

	- class definition + function definitions inside the same header file (.h / .hpp).

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">headers</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

Template class definitions go in headers. If you do:

- StackType.h (class template)

- StackType.cpp (member defs)

You often get linker errors.

<hr style="border: none; border-top: 1.5px solid cyan;">

Beginner rule:

- ✅ Put template implementations in the header.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Warm-up:pointers</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

```
int x = 5;
int* p = &x;   // p stores address of x

cout << x << "\n";   // 5
cout << *p << "\n";  // 5 (dereference)

```

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">A linked list node</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

```
struct Node {
    int data;
    Node* next;
};

```

- data is the value

- next points to the next node
   </div>
</div>



<div class="definition-com-container">
  <div class="definition-com-title">Questions</div>
  <div class="definition-com-shadebox">
  <div style="width: 800px;"></div>

If Node* a points to a node, how do you access the data?  <button type="button" class="reveal-btn" data-answer="answer-q1">Show Answer</button>

   </div>
</div>

<section data-markdown id="ch2" class="center"><textarea data-template>

<p class="definition-rainbow-title">Circular Linked Lists</p>

</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Circular Linked Lists</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

Circular linked lists (idea + traversal + search)  
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Reminder: linear singly linked list</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

In a normal (linear) list:

- last node points to nullptr

Example: A → B → C → nullptr

   </div>
</div>

- nullptr in C++ is a special keyword that means “<spanBYMix>null pointer</spanBYMix>” — a pointer that points to nothing.



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">null pointer</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

Sir Tony Hoare (11 January 1934 – 5 March 2026) introduced the null reference (null pointer) in 1965 while designing the ALGOL W programming language, aiming to create a simple way to represent the absence of an object. 

He later famously referred to this invention as his "billion-dollar mistake" due to the countless bugs and crashes it caused.
   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Circular linked list</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

In a circular list:

- The last node points back to the first node

Example:

<div  style="font-size: 1.6em; line-height: 1.5;">

```
A → B → C
↑ 
└───────┘
```
</div>


So there is <spanRED>no nullptr</spanRED> at the end.

</div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Why use a circular list?</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

Circular lists are useful when:

- you want to keep cycling (round-robin scheduling)

- you often need fast access to <spanBYMix>both</spanBYMix> “front” and “end”

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

A common trick:

- keep one pointer to the rear (last) node.

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example - round-robin scheduling</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

- Suppose the CPU is using <spanGREEN>Round-Robin scheduling</spanGREEN> with a time quantum = 2 ms.

<div  style="font-size: 1.6em; line-height: 1.5;">

```

| Process | Burst Time |
| ------- | ---------- |
| P1      | 5 ms       |
| P2      | 3 ms       |
| P3      | 7 ms       |

```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example - round-robin scheduling</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

Each process gets at most 2 ms each turn.

- P1 runs for 2 ms → remaining 3 ms

- P2 runs for 2 ms → remaining 1 ms

- P3 runs for 2 ms → remaining 5 ms

- P1 runs for 2 ms → remaining 1 ms

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example - round-robin scheduling</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

- P2 runs for 1 ms → finished

- P3 runs for 2 ms → remaining 3 ms

- P1 runs for 1 ms → finished

- P3 runs for 2 ms → remaining 1 ms

- P3 runs for 1 ms → finished

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example - round-robin scheduling</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>


<div  style="font-size: 1.6em; line-height: 1.5;">

```

0    2    4    6    8    9    11   12   14   15
| P1 | P2 | P3 | P1 | P2 | P3 | P1 | P3 | P3 |

```
</div>

Completion Times

- P1 = 12 ms

- P2 = 9 ms

- P3 = 15 ms

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example - round-robin scheduling</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>


<div  style="font-size: 1.6em; line-height: 1.5;">

```

0    2    4    6    8    9    11   12   14   15
| P1 | P2 | P3 | P1 | P2 | P3 | P1 | P3 | P3 |

```
</div>

Waiting time = Turnaround time - Burst time

- P1 = 12 - 5 = 7 ms

- P2 = 9 - 3 = 6 ms

- P3 = 15 - 7 = 8 ms
   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example - round-robin scheduling</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

Each process gets a small amount of CPU time. If it is not finished, it goes to the back of the queue and waits for its next turn. This makes the system more fair, especially in time-sharing systems.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">One-pointer trick: rear</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

We store:

- Node* rear; // <spanRED>points to last node</spanRED>


<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

Then:

- first node is rear->next

So we can reach front quickly:

- front = rear->next

- rear = rear

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Empty circular list</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

If list is empty:

- rear == nullptr

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">One-node circular list</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

If there is one node X:

- rear points to X

- rear->next points to itself (X)

So: X → (back to X)

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

```
#include <iostream>
using namespace std;

struct Node {
    int data;
    Node* next;
};

int main() {
    Node* rear = new Node;
    rear->data = 10;

    // only one node, so it points to itself
    rear->next = rear;

    cout << "rear data: " << rear->data << "\n";
    cout << "rear->next data: " << rear->next->data << "\n";

    if (rear->next == rear) {
        cout << "rear->next points to itself\n";
    }

    return 0;
}
```

   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">A safe print traversal pattern</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

Because there is no nullptr, you <spanRED>must stop</spanRED> when you come back.

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

Use a do...while:

- start at rear->next (first)

- stop when <spanRED>current becomes first again</spanRED>

   </div>
</div>



<div id="shadebox">

### Example: Circular list of int

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
using namespace std;

struct Node {
    int data;
    Node* next;
};

class CircularList {
private:
    Node* rear; // last node; rear->next is the first

public:
    CircularList() { rear = nullptr; }

    bool isEmpty() const {
        return rear == nullptr;
    }

    void print() const {
        if (rear == nullptr) {
            cout << "[empty]\n";
            return;
        }

        Node* first = rear->next;
        Node* cur = first;

        do {
            cout << cur->data << " ";
            cur = cur->next;
        } while (cur != first);

        cout << "\n";
    }
};

```

</div>



<div class="definition-shakeflash-container">
  <div class="definition-shakeflash-title">infinite loop</div>
  <div class="definition-shakeflash-shadebox">
  <div style="width: 800px;"></div>

<div class="definition-pro-Y-container">

  <div class="definition-pro-Y-shadebox">

- If empty → make one-node <spanGREEN>circle</spanGREEN>

- Otherwise, find the first place where:

	- cur->data >= x

- Insert between <spanGREEN>pred</spanGREEN> and <spanBYMix>cur</spanBYMix>

- If inserted after rear (new largest), <spanRED>update rear</spanRED>

<div id="shadebox">

### Sorted insert code

<hr style="border: none; border-top: 1.5px solid cyan;">

```
void insertSorted(int x) {
    Node* n = new Node;
    n->data = x;

    // Case 1: empty list
    if (rear == nullptr) {
        n->next = n;
        rear = n;
        return;
    }

    Node* first = rear->next;
    Node* pred = rear;
    Node* cur  = first;

    // Find position: first node >= x
    do {
        if (cur->data >= x) break;
        pred = cur;
        cur  = cur->next;
    } while (cur != first);

    // Insert between pred and cur
    pred->next = n;
    n->next = cur;

    // If we inserted after the old rear, update rear
    // This happens when x is bigger than everything.
    if (pred == rear && x >= rear->data) {
        rear = n;
    }
}

```

</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">insert smallest</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>
  
Why “insert smallest” is easy with rear-pointer

If <spanGREEN>x is smaller than the first element</spanGREEN>:

<div id="shadebox">

- pred is still rear

- cur is still first
</div>

Then:

<div id="shadebox">

- rear->next becomes <spanGREEN>the new node automatically</spanGREEN>

</div>

So we <spanRED>don’t</spanRED> need a special “insert at front” case.

   </div>
</div>

- empty list

- deleting the rear node

- deleting a middle/front node

<div class="definition-pro-Y-container">

```
bool remove(int x) {
    if (rear == nullptr) return false;

    Node* first = rear->next;
    Node* pred  = rear;
    Node* cur   = first;

    do {
        if (cur->data == x) {
            // Case: only one node
            if (cur == pred) {
                delete cur;
                rear = nullptr;
                return true;
            }

            // General unlink
            pred->next = cur->next;

            // If deleting rear, move rear back
            if (cur == rear) {
                rear = pred;
            }

            delete cur;
            return true;
        }

        pred = cur;
        cur = cur->next;

    } while (cur != first);

    return false;
}
```

- This includes <spanBYMix>creating</spanBYMix>, <spanBYMix>using</spanBYMix>, and <spanBYMix>releasing memory</spanBYMix> when it's <spanRED>no</spanRED> longer needed.

- In C++, you can use pointers to <spanBYMix>access</spanBYMix> and <spanBYMix>change memory</spanBYMix> directly.

<div class="definition-container">
  <div class="definition-title">Differences - Memory location</div>
  <div class="definition-shadebox">
  <div style="width: 800px;"></div>

<div  style="font-size: 1.6em; line-height: 1.5;">

```

```
</div>

- usually creates a regular local variable.

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

<div  style="font-size: 1.6em; line-height: 1.5;">

```

```
</div>

- creates memory dynamically, and that memory must later be released:

<div  style="font-size: 1.6em; line-height: 1.5;">

```

```

Otherwise, you get a memory leak. 
</div>
</div>




<div class="definition-container">
  <div class="definition-title">Note</div>
  <div class="definition-shadebox">
  
> A memory leak happens when a program asks for memory, uses it, but never gives it back. In another word, A memory leak is memory that your program allocated but forgot to release.

<div  style="font-size: 1.6em; line-height: 1.5;">

```
int* p = new int;
*p = 35;
```
</div>

Memory is created dynamically. If you do <spanRED>not</spanRED> write:

<div  style="font-size: 1.6em; line-height: 1.5;">

```

```
</div>

</div>
</div>



> Memory stays allocated even after you are done with it. That is a memory leak

```
#include <iostream>
using namespace std;

struct Node {
    int data;
    Node* next;
};

class CircularList {
private:
    Node* rear;

public:
    CircularList() { rear = nullptr; }

    void print() const {
        if (rear == nullptr) { cout << "[empty]\n"; return; }
        Node* first = rear->next;
        Node* cur = first;
        do {
            cout << cur->data << " ";
            cur = cur->next;
        } while (cur != first);
        cout << "\n";
    }

    void insertSorted(int x) {
        Node* n = new Node;
        n->data = x;

        if (rear == nullptr) {
            n->next = n;
            rear = n;
            return;
        }

        Node* first = rear->next;
        Node* pred = rear;
        Node* cur = first;

        do {
            if (cur->data >= x) break;
            pred = cur;
            cur = cur->next;
        } while (cur != first);

        pred->next = n;
        n->next = cur;

        if (pred == rear && x >= rear->data) {
            rear = n;
        }
    }

    bool remove(int x) {
        if (rear == nullptr) return false;

        Node* first = rear->next;
        Node* pred = rear;
        Node* cur = first;

        do {
            if (cur->data == x) {
                if (cur == pred) {
                    delete cur;
                    rear = nullptr;
                    return true;
                }

                pred->next = cur->next;

                if (cur == rear) {
                    rear = pred;
                }

                delete cur;
                return true;
            }

            pred = cur;
            cur = cur->next;

        } while (cur != first);

        return false;
    }

    ~CircularList() {
	//~CircularList() is the destructor of the CircularList class in C++.
	//It means:
	// CircularList() → constructor, used when an object is created
	// ~CircularList() → destructor, used when an object is destroyed
	//The ~ in front of the class name means “this function cleans up
	//the object before it disappears.”
        // simple cleanup (optional for beginners)
        while (rear != nullptr) {
            int x = rear->next->data;
            remove(x);
        }
    }
};

int main() {
    CircularList L;

    L.insertSorted(20);
    L.insertSorted(10);
    L.insertSorted(30);
    L.insertSorted(25);

    L.print(); // 10 20 25 30

    L.remove(10);
    L.print(); // 20 25 30

    L.remove(30);
    L.print(); // 20 25

    L.remove(20);
    L.remove(25);
    L.print(); // [empty]
}
```

</div>

void insertAfter(DNode* p, int x) {

    n->data = x;

    n->next = p->next;
    n->prev = p;

}

#include <iostream>
#include <string>
using namespace std;

// -------------------- Template Box<T> --------------------
template <class T>
class Box {
private:
    T value;
public:
    Box(T v) { value = v; }
    T get() const { return value; }
    void set(T v) { value = v; }
};

// -------------------- Circular Linked List (Agents) --------------------
struct AgentNode {
    string name;
    AgentNode* next;
};

class AgentCircle {
private:
    AgentNode* rear;       // last node
    AgentNode* current;    // for round-robin "nextAgent"

public:
    AgentCircle() {
        rear = nullptr;
        current = nullptr;
    }

    bool isEmpty() const {
        return rear == nullptr;
    }

    // Print the list once (no infinite loop)
    void printOnce() const {
        if (rear == nullptr) {
            cout << "[Agents: empty]\n";
            return;
        }
        AgentNode* first = rear->next;
        AgentNode* cur = first;

        cout << "[Agents] ";
        do {
            cout << cur->name << " ";
            cur = cur->next;
        } while (cur != first);
        cout << "\n";
    }

    // Insert in sorted order by name
    void insertSorted(const string& agentName) {
        AgentNode* n = new AgentNode;
        n->name = agentName;

        // empty list
        if (rear == nullptr) {
            n->next = n;
            rear = n;
            current = rear->next; // first
            return;
        }

        AgentNode* first = rear->next;
        AgentNode* pred = rear;
        AgentNode* cur = first;

        // find first node >= agentName
        do {
            if (cur->name >= agentName) break;
            pred = cur;
            cur = cur->next;
        } while (cur != first);

        // insert between pred and cur
        pred->next = n;
        n->next = cur;

        // update rear if inserted as the new largest (after rear)
        if (pred == rear && agentName >= rear->name) {
            rear = n;
        }

        // ensure current is valid
        if (current == nullptr) current = rear->next;
    }

    // Return next agent in round-robin order
    string nextAgent() {
        if (rear == nullptr) return "[no agents]";

        if (current == nullptr) current = rear->next; // first

        string ans = current->name;
        current = current->next;
        return ans;
    }

    // Remove agent by name (return true if removed)
    bool remove(const string& agentName) {
        if (rear == nullptr) return false;

        AgentNode* first = rear->next;
        AgentNode* pred = rear;
        AgentNode* cur = first;

        do {
            if (cur->name == agentName) {
                // only one node
                if (cur == pred) {
                    delete cur;
                    rear = nullptr;
                    current = nullptr;
                    return true;
                }

                // if current points to the node being deleted, move it forward
                if (current == cur) {
                    current = cur->next;
                }

                // unlink
                pred->next = cur->next;

                // if deleting rear, rear moves back
                if (cur == rear) {
                    rear = pred;
                }

                delete cur;
                return true;
            }
            pred = cur;
            cur = cur->next;
        } while (cur != first);

        return false;
    }

    // Destructor: free all nodes
    ~AgentCircle() {
        if (rear == nullptr) return;

        AgentNode* first = rear->next;
        AgentNode* cur = first->next;

        while (cur != first) {
            AgentNode* temp = cur;
            cur = cur->next;
            delete temp;
        }
        delete first;
        rear = nullptr;
        current = nullptr;
    }
};

// -------------------- Doubly Linked List (History) --------------------
struct HistNode {
    string msg;
    HistNode* next;
    HistNode* prev;
};

class HistoryList {
private:
    HistNode* head;
    HistNode* tail;

public:
    HistoryList() {
        head = nullptr;
        tail = nullptr;
    }

    void pushBack(const string& message) {
        HistNode* n = new HistNode;
        n->msg = message;
        n->next = nullptr;
        n->prev = tail;

        if (tail != nullptr) {
            tail->next = n;
        } else {
            head = n; // first node
        }
        tail = n;
    }

    void printForward() const {
        cout << "\n[History Forward]\n";
        HistNode* cur = head;
        while (cur != nullptr) {
            cout << cur->msg << "\n";
            cur = cur->next;
        }
    }

    void printBackward() const {
        cout << "\n[History Backward]\n";
        HistNode* cur = tail;
        while (cur != nullptr) {
            cout << cur->msg << "\n";
            cur = cur->prev;
        }
    }

    ~HistoryList() {
        HistNode* cur = head;
        while (cur != nullptr) {
            HistNode* temp = cur;
            cur = cur->next;
            delete temp;
        }
        head = nullptr;
        tail = nullptr;
    }
};

// -------------------- Main (Test Scenario) --------------------
int main() {
    Box<string> systemName("Round-Robin Help Desk");
    Box<int> totalTickets(0);

    cout << "System: " << systemName.get() << "\n\n";

    AgentCircle agents;
    agents.insertSorted("Amy");
    agents.insertSorted("Ben");
    agents.insertSorted("Cody");
    agents.insertSorted("Dina");

    agents.printOnce();

    HistoryList history;

    // Assign 6 tickets
    for (int ticket = 1; ticket <= 6; ticket++) {
        // After ticket 3, remove Cody
        if (ticket == 4) {
            cout << "\nCody goes offline. Removing Cody...\n";
            bool ok = agents.remove("Cody");
            cout << (ok ? "Removed.\n" : "Not found.\n");
            agents.printOnce();
        }

        string agent = agents.nextAgent();
        string msg = "Ticket " + to_string(ticket) + " -> " + agent;

        cout << msg << "\n";
        history.pushBack(msg);

        totalTickets.set(totalTickets.get() + 1);
    }

    // Print results
    cout << "\nFinal agents:\n";
    agents.printOnce();

    history.printForward();
    history.printBackward();

    cout << "\nTotal tickets handled = " << totalTickets.get() << "\n";
    return 0;
}
