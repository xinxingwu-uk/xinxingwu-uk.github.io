<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Priority Queues (ADT)</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

<spanGREEN>Priority</spanGREEN> Queue idea + <spanGREEN>binary</spanGREEN> tree stored in an <spanGREEN>array</spanGREEN>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Regular Queue vs Priority Queue</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
**Regular queue (FIFO):** 

<div id="shadebox">

first in → first out
</div>

<hr>

**Priority queue:** 

<div id="shadebox">

*highest priority* comes out first
</div>

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

Examples:

- Hospital triage: most severe gets served first
- Registration waitlist: <spanGREEN>seniors</spanGREEN> might get priority  
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Priority Queue = “Access rule”</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
In a priority queue:
- You don’t remove “the <spanRED>oldest</spanRED>” item.

<hr>

- You remove the item with the **<spanGREEN>highest</spanGREEN> priority**.

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

Important:
- “<spanGREEN>Highest</spanGREEN> priority” depends on the application  
  (could mean *largest number*, or *longest waiting* - is the same to regular FIFO Queue, etc.) 
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">What operations?</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
A priority queue ADT typically supports:
- `MakeEmpty()` — clear all items
- `IsEmpty()` — any items?
- `IsFull()` — out of space? (array-based)
- `Enqueue(x)` — add item
- `Dequeue(x)` — remove the **<spanGREEN>highest-priority</spanGREEN>** item (return it)  
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Key difference from FIFO Queue</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
The **names** of operations look similar to a normal queue…

… but the meaning of `Dequeue()` changes:

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

- FIFO queue: remove the *<spanGREEN>oldest</spanGREEN>*

<hr>

- Priority queue: remove the *<spanGREEN>highest</spanGREEN> priority*
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Suppose higher number = higher priority.

We enqueue: `5, 1, 9, 3`

- If we dequeue once → we get `9`  
- If we dequeue again → we get `5`  

<div id="shadebox">

<spanGREEN>order depends on priority</spanGREEN>, not arrival time

</div>

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Implementation Choices</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
To implement a priority queue, we want:
- <spanGREEN>Fast</spanGREEN> insertion (enqueue)

<br>
<br>

- <spanGREEN>Fast</spanGREEN> removal of <spanRED>highest</spanRED> priority (dequeue)
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Implementation Choices (cont.)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Possible structures discussed:
- Unsorted list / array
- Sorted list / array
- Linked sorted list
- Stack
- Queue
- Binary search tree
- Heap (our focus)
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title"><spanBYMix>Unsorted</spanBYMix> list</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
- Enqueue: easy (<spanGREEN>append</spanGREEN>) → fast

<br>
<br>

- Dequeue: must search for <spanGREEN>max</spanGREEN> → slow
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title"><spanBYMix>Sorted</spanBYMix> list</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
- Enqueue: must insert in <spanGREEN>correct</spanGREEN> place → slower

<br>
<br>

- Dequeue: remove from <spanGREEN>end/front</spanGREEN> → fast  
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">BST idea</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Binary search tree can do both in ~log N *if <spanGREEN>balanced</spanGREEN>*…

…but in worst case it can become “<spanRED>skewed</spanRED>” and degrade toward $\mathcal{O}(N))$ (<spanRED>? Why </spanRED>).
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Why heaps?</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Heaps give:

- Predictable height (because shape is **complete**)
- Both enqueue and dequeue around **O(log N)**  
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

- A heap is a special tree-based data structure used to quickly find the largest or smallest item.

- “heap” means a data structure heap, not the “heap memory” in programming.


<div id="shadebox">

A heap is usually a complete binary tree with a special order rule:

- In a max-heap, every parent is greater than or equal to its children.
- In a min-heap, every parent is less than or equal to its children.
</div>

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>
  
In a heap, the tree is complete, which is why its height is predictable.

<div id="shadebox">

A complete binary tree means:

- every level is completely filled except possibly the last level
- the last level is filled from left to right

So the tree never becomes long and skinny like a linked list. It stays compact.
</div>
   </div>
</div>

<div class="question-container">

<div  style="font-size: 0.8em; line-height: 1.0;">

| Type                         | Main idea                                   | Rule                                                                                   | Example                                                       |
| ---------------------------- | ------------------------------------------- | -------------------------------------------------------------------------------------- | ------------------------------------------------------------- |
| **Binary Tree**              | General tree with up to 2 children per node | Each node has at most one left child and one right child                               | Any shape is okay as long as no node has more than 2 children |
| **BST** (Binary Search Tree) | A binary tree for searching                 | Left subtree values < node < right subtree values                                      | Good for searching numbers in order                           |
| **Full Binary Tree**         | Every node is “all or nothing”              | Each node has either 0 or 2 children                                                   | No node has only one child                                    |
| **Complete Binary Tree**     | Tree is filled compactly                    | All levels are full except maybe the last, and the last level fills from left to right | Used in heaps                                                 |
| **Heap**                     | A complete binary tree with priority order  | Max-heap: parent ≥ children, or Min-heap: parent ≤ children                            | Used in priority queues                                       |

</div>
   </div>
</div>

<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>
  
Why is the height predictable?

- If a heap has $N$ nodes, its height is about $\log_2^N$.

<hr>

That is because each level roughly doubles the number of nodes:

- level 0: 1 node
- level 1: 2 nodes
- level 2: 4 nodes
- level 3: 8 nodes


So if you keep adding levels, the number of nodes grows exponentially, which means the number of levels grows logarithmically. That is why heap operations are about $\mathcal{O}(\log N)$.
   </div>
</div>

Example - an emergency room priority system.

- Patients with more urgent conditions should be treated first.
- When a new patient arrives, they are inserted into the priority structure.
- If their case is very urgent, they may move upward in priority.
- When the doctor is ready, the highest-priority patient is removed first.
   </div>
</div>



<div class="definition-container">

<div style="width: 800px;"></div>

<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>
  
A heap is usually a complete binary tree with a special order rule:

- In a max-heap, every parent is greater than or equal to its children.
- In a min-heap, every parent is less than or equal to its children.

So the top element is always easy to access.

Example of a max-heap:

<div  style="font-size: 1.6em; line-height: 1.5;">

<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>
  
Example of a min-heap:

<div  style="font-size: 1.6em; line-height: 1.5;">

```
        10
      /    \
    20      30
   /  \    /  \
  40  50  60  70
```
</div>

- 10 is smaller than 20 and 30
- 20 is smaller than 40 and 50
- 30 is smaller than 60 and 70


   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>
  
<div id="shadebox">

- A heap is not the same as a sorted tree.
- It only <spanBYMix>guarantees</spanBYMix> the parent-child order, <spanRED>not</spanRED> full left-to-right sorting.

<hr>


```

        5
      /   \
     9     7
    / \   /
   20 15 10
   
```
</div>
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>
  
Example: hospital emergency room

- The most serious patient should be treated first.
- A max-heap can store patients by priority.
- The patient with the highest urgency stays at the top.
- When a new critical patient arrives, they may move upward.
- When a doctor becomes available, the top patient is removed first.

So the heap helps always find the highest-priority patient quickly.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

In programming, heap memory is a region of memory used for dynamic allocation.

- That means memory is created while the program is running, when the program does <spanRED>not</spanRED> know in advance exactly how much space it will need.

<hr>

Examples:

- making a new object
- creating a linked list node
- building a tree
- creating a dynamic array
- storing data that should live longer than one function call
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

- stack memory = small, automatic, temporary memory
- heap memory = flexible memory you ask for during runtime

<hr>

malloc asks for memory from the heap.

```
int *p = malloc(sizeof(int));
*p = 10;
```

- The object created by new is usually stored in the heap.

```
int *p = new int(10);
```
   </div>
</div>




<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Why is it called “heap memory”?

- It is just a traditional name for that memory area.
- It is not the same as the heap data structure you learned about in algorithms.

So:

- heap data structure = a special tree for priorities
- heap memory = an area of RAM used for dynamic objects 
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Stack memory: This is a region of memory used by a running program, especially for:

- function calls
- local variables
- return addresses
- parameters

It is called “stack” because it is usually managed in a stack-like LIFO way.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>


| Term                     | Meaning                                                                         |
| ------------------------ | ------------------------------------------------------------------------------- |
| **Stack data structure** | A LIFO structure used in algorithms                                             |
| **Stack memory**         | A memory area used for calls and local variables, usually managed in LIFO order |

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

- heap data structure and heap memory are mostly just same word, different meanings
- stack data structure and stack memory are different, but more closely connected, because stack memory really follows stack behavior
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Heap</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Think of a stack of plates.

- You put a new plate on top.
- You remove the top plate first.

That is like the stack data structure.

<hr>

Now think of function calls in a program:

- the newest function call goes on top
- the most recent one finishes first

That is like stack memory.

So “stack” in these two cases is not exactly the same thing, but the memory version is based on the same idea.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Why store a tree in an array?</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Pointer-based trees store:
- node + left pointer + right pointer

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

Array-based (“implicit links”) stores:
- Just the values in level-order
- Parent/child relationships computed by index formulas  
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Level-order storage rule</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Store nodes:
- level by level
- left to right within each level

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

So the array becomes like:
- index <spanGREEN>0</spanGREEN>: root

<br>
<br>

- index <spanGREEN>1,2</spanGREEN>: root’s children

<br>
<br>

- index <spanGREEN>3,4,5,6</spanGREEN>: next level
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">0-based indexing</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
If a node is at index `i`:
- Left child index = `2*i + 1`
- Right child index = `2*i + 2`
- Parent index = `(i - 1) / 2` (integer division) 
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">index example</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Array (indices shown):
- `A[0]` = root  
- children of `A[0]` → `A[1]`, `A[2]`
- children of `A[1]` → `A[3]`, `A[4]`
- children of `A[2]` → `A[5]`, `A[6]`

This matches the “complete binary tree layout.”
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">A node is a leaf</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
How do we know if a node is a leaf?

A node at index `i` is a **leaf** if:

- Its left child index `2*i + 1` is **<spanRED>outside</spanRED>** the current size

If `2*i + 1 > lastIndex`, then `i` has <spanGREEN>no</spanGREEN> children → leaf.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Full binary tree</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
 
- All leaves on the <spanGREEN>same</spanGREEN> level

<br>
<br>

- Every non-leaf has <spanGREEN>exactly two</spanGREEN> children
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Complete binary tree</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
- Full through <spanGREEN>next-to-last level</spanGREEN>

<br>
<br>

- Last level filled **<spanGREEN>left to right</spanGREEN>**
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Why “complete” matters</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

If the tree is complete:
- Nodes occupy **contiguous** array positions
- No “holes” in the middle
- Index formulas work cleanly

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

If not complete:
- You may need “dummy values” to represent missing nodes  
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Heap = a special binary tree</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
A heap is a binary tree with two properties:

- **Shape property:** tree is **<spanGREEN>complete</spanGREEN>**  

<br>
<br>

- **Order property:** parent <spanGREEN>dominates</spanGREEN> children  

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

Two versions:
- **Max heap:** parent $\geqslant$ children (root is maximum)
- **Min heap:** parent $\leqslant$ children (root is minimum)
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Max heap</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Max heap order property:
For every non-leaf node at index `i`:
- `A[i] >= A[leftChild]`
- `A[i] >= A[rightChild]` (if right exists)
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">What heaps are great at</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

In a max heap:

<div id="shadebox">

- The **largest value is always at the root**
- so “get max” is fast (peek root)
</div>

<br>

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

But heaps are <spanRED>NOT</spanRED> good for:

<div id="shadebox">

- searching for an arbitrary element quickly (like BST)
</div> 
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Heap shape is fixed</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Two heaps can have:
- The same shape (complete tree)
- The same set of values
- Different internal arrangement

As long as the heap order property holds
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Heap shape is fixed, but different internal arrangement</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 1000px;"></div>

<div  style="font-size: 1.6em; line-height: 1.5;">

```
        100
       /   \
     90     80
    /  \   /  \
   70  60 50  40
```

</div>

vs

<div  style="font-size: 1.6em; line-height: 1.5;">

```
        100
       /   \
     80     90
    /  \   /  \
   70  50 60  40
```
</div>

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Two fundamental heap repair operations</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
When the heap rule is <spanRED>broken</spanRED>, we “fix” it using:

- **ReheapDown(root, bottom)**  
  Used when the *root* might be <spanGREEN>too small</spanGREEN> (after remove-root)

- **ReheapUp(root, bottom)**  
  Used when the *new bottom element* might be <spanBYMix>too large</spanBYMix> (after insert)
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Remove Root</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
 
Removing the max (root)
To remove highest priority (root):
- Save `A[0]` (this is the max)
- Move the **last element** into `A[0]`
- Reduce size by 1
- **ReheapDown** <spanGREEN>from root to restore heap order</spanGREEN>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Remove Root</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
 
Why move the last element to the root?

<div id="shadebox">
Because the heap must remain <spanRED>complete</spanRED>:

- Removing root leaves a hole
- You must fill that hole
- Using the last element preserves the complete shape

</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">ReheapDown idea</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
At a node:
- compare the node with its children
- if a child is bigger, swap with the bigger child
- keep going down until:
  - you reach a leaf, OR
  - parent is already $\geqslant$ both children
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">ReheapDown (simple pseudocode)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Given array A and heap size n:

<div  style="font-size: 1.6em; line-height: 1.5;">

```
i = root

while i has at least a left child:
    biggerChild = index of larger child

    if A[i] < A[biggerChild]:
        swap(A[i], A[biggerChild])
        i = biggerChild
    else:
        stop

```
</div>
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">heap tree</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Start heap array: [50, 40, 45, 29, 3]

In a heap array:

- index 0 is the root
- index 1 is the root’s left child
- index 2 is the root’s right child
- index 3 is the left child of 40
- index 4 is the right child of 40

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">heap tree</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

<div  style="font-size: 1.6em; line-height: 1.5;">

```
        50
       /  \
     40    45
    /  \
   29   3
```
</div>

After removing the root 50. Move the last element 3 to the root. Array becomes: [3, 40, 45, 29]

<div  style="font-size: 1.6em; line-height: 1.5;">

```
        3
       / \
     40   45
    /
   29
```
</div>
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">heap tree</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Now do ReheapDown: Compare 3 with its children 40 and 45.

- Since this is a max heap, the larger child is 45, so swap 3 and 45.

- Array becomes: [45, 40, 3, 29]

<div  style="font-size: 1.6em; line-height: 1.5;">

```
        45
       /  \
     40    3
    /
   29
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Quick Trace</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Start heap array:
`[50, 40, 45, 29, 3]`

Remove root (50):
- move last (3) to root → `[3, 40, 45, 29]`
- ReheapDown:
  - compare 3 with (40,45) → swap with 45 → `[45, 40, 3, 29]`
  - now 3 has no children → done

Heap restored
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Inserting a new value</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
To insert in a heap:
- Put the new value at the **next available slot** (<spanGREEN>end of array</spanGREEN>)
- This preserves completeness (shape property)
- But order might be broken
- <spanGREEN>Fix</spanGREEN> using **ReheapUp** 
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">ReheapUp idea</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
At the new node:
- compare with its parent
- if the new node is bigger, swap upward
- repeat until:
  - you reach the root, OR
  - parent is already $\geqslant$ new node
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">ReheapUp (simple pseudocode)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">

```
i = bottom

while i > 0:
    p = (i - 1) / 2

    if A[p] < A[i]:
        swap(A[p], A[i])
        i = p
    else:
        stop
```

</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Quick Trace</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Heap:
`[45, 40, 3, 29]`

Insert `50`:
- append → `[45, 40, 3, 29, 50]`
- ReheapUp:
  - parent of index 4 is 1 → compare 40 vs 50 → swap
    `[45, 50, 3, 29, 40]`
  - parent of index 1 is 0 → compare 45 vs 50 → swap
    `[50, 45, 3, 29, 40]`
Done.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">C++ MaxHeap</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Goal: beginner-friendly heap with `int`.

Operations:
- `push(x)`  (insert)
- `top()`    (peek max)
- `pop()`    (remove max)

We’ll store the heap in a `vector<int>`.
   </div>
</div>



<div id="shadebox">
<div style="width: 800px;"></div>

### MaxHeap class (part 1)

<hr style="border: none; border-top: 1.5px solid cyan;">

```cpp
#include <iostream>
#include <vector>
using namespace std;

class MaxHeap {
private:
    vector<int> a; // heap array (0-based)

    int parent(int i) { return (i - 1) / 2; }
    int left(int i)   { return 2 * i + 1; }
    int right(int i)  { return 2 * i + 2; }

    void reheapUp(int i) {
        while (i > 0) {
            int p = parent(i);
            if (a[p] < a[i]) {
                int temp = a[p];
                a[p] = a[i];
                a[i] = temp;
                i = p;
            } else {
                break;
            }
        }
    }

```

</div>



<div id="shadebox">

### MaxHeap class (part 2)

<hr style="border: none; border-top: 1.5px solid cyan;">

```
    void reheapDown(int i) {
        int n = (int)a.size();

        while (true) {
            int L = left(i);
            int R = right(i);

            // if no left child, it's a leaf
            if (L >= n) break;

            // pick bigger child
            int bigger = L;
            if (R < n && a[R] > a[L]) bigger = R;

            // if order violated, swap and continue
            if (a[i] < a[bigger]) {
                int temp = a[i];
                a[i] = a[bigger];
                a[bigger] = temp;
                i = bigger;
            } else {
                break;
            }
        }
    }

public:
    bool empty() const { return a.empty(); }
    int size() const { return (int)a.size(); }


```

</div>



<div id="shadebox">

### push, top, pop (part 3)

<hr style="border: none; border-top: 1.5px solid cyan;">

```
    void push(int x) {
        a.push_back(x);           // put at bottom
        reheapUp((int)a.size()-1);
    }

    int top() const {
        // assume not empty
        return a[0];
    }

    int pop() {
        // remove and return max
        int n = (int)a.size();
        int result = a[0];

        a[0] = a[n - 1];   // move last to root
        a.pop_back();      // shrink

        if (!a.empty()) reheapDown(0);
        return result;
    }
};


```

</div>

}

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Complexity</div>
  <div class="definition-pro-Y-shadebox">
  
Heap rules + insert/remove + ReheapUp/ReheapDown
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Why heaps are O(log N)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
A heap is complete, so its height is small:

- height is about $\log2(N)$

Insert uses ReheapUp:

- moves up at most one level each swap → $\leqslant$ height swaps

Remove uses ReheapDown:

- moves down at most one level each swap → $\leqslant$ height swaps
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Typical heap costs</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
For a max heap with $N$ items:

- Peek max (root): $\mathcal{O}(1)$

- Insert (enqueue): $\mathcal{O}(\log N)$

- Remove max (dequeue): $\mathcal{O}(\log N)$
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Compare Priority Queue implementations</div>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Heap Sort</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
HeapSort (build heap + sort loop) + practice
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Idea of Heap Sort</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Heap sort is like “smart selection sort”:

- in selection sort, finding the max each time costs $\mathcal{O}(N)$

- in a heap, max is always at root (easy), and fixing heap costs $\mathcal{O}(\log N)$

So heap sort becomes $\mathcal{O}(N \log N)$.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">max-heap → ascending order</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Remember:

- root has largest
- we can place largest at the end

Plan:

- Build a max heap from the array
- Repeat:

	- swap root with last element in heap

	- reduce heap size

	- ReheapDown at root
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Step 1: BuildHeap</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
To build a heap from array values[0..n-1]:

- find the first non-leaf index

- call ReheapDown on each node from there down to 0

First non-leaf index:

- n/2 - 1 (0-based)
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">BuildHeap pseudocode</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

<div  style="font-size: 1.6em; line-height: 1.5;">
 
```
for i = n/2 - 1 down to 0:
    ReheapDown(values, i, n-1)
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example array</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Original values: [25, 17, 36, 2, 3, 100, 1, 19, 7]

After heapify steps (shown in the chapter):

- after index = 3: [25, 17, 36, 19, 3, 100, 1, 2, 7]

- after index = 2: [25, 17, 100, 19, 3, 36, 1, 2, 7]

- after index = 1: [25, 19, 100, 17, 3, 36, 1, 2, 7]

- after index = 0: [100, 19, 36, 17, 3, 25, 1, 2, 7]
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Step 2: Sort loop</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
After we have a max heap:

- swap values[0] with values[last]

- the last element is now correctly placed (largest)

- heap size shrinks by 1

- ReheapDown to fix the heap in the remaining portion
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Sort loop pseudocode</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">

```
for end = n-1 down to 1:
    swap(values[0], values[end])
    ReheapDown(values, 0, end-1)
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">HeapSort complexity</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
- BuildHeap (heapify): about $\mathcal{O}(N)$

- Then N removals, each ReheapDown is $\mathcal{O}(\log N)$

Total:

- $\mathcal{O}(N \log N)$ time

- can be done in-place (no extra big array) 
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example: HeapSort for int</div>
  <div class="definition-pro-Y-shadebox">
  
ReheapDown for array segment. This version treats a[0...end] as a heap.

<div  style="font-size: 1.6em; line-height: 1.5;">

```
void reheapDown(vector<int> &a, int root, int end) {
    int i = root;

    while (true) {
        int L = 2 * i + 1;
        int R = 2 * i + 2;
        if (L > end) break; // no children

        int bigger = L;
        if (R <= end && a[R] > a[L]) bigger = R;

        if (a[i] < a[bigger]) {
            int temp = a[i];
            a[i] = a[bigger];
            a[bigger] = temp;
            i = bigger;
        } else {
            break;
        }
    }
}
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Example: HeapSort for int (cont.)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

C++ BuildHeap + HeapSort

<div  style="font-size: 1.6em; line-height: 1.5;">


```
void heapSort(vector<int> &a) {
    int n = (int)a.size();

    // 1) BuildHeap (heapify)
    for (int i = n/2 - 1; i >= 0; i--) {
        reheapDown(a, i, n - 1);
    }

    // 2) Sort (move max to the end)
    for (int end = n - 1; end >= 1; end--) {
        int temp = a[0];
        a[0] = a[end];
        a[end] = temp;

        reheapDown(a, 0, end - 1);
    }
}

```

</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">C++ test for HeapSort</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>

<div  style="font-size: 1.6em; line-height: 1.5;">

```
int main() {
    vector<int> a = {25, 17, 36, 2, 3, 100, 1, 19, 7};

    heapSort(a);

    for (int x : a) cout << x << " ";
    cout << "\n";
    // Expected ascending:
    // 1 2 3 7 17 19 25 36 100
    return 0;
}
```
</div>
   </div>
</div>

<hr style="border: none; border-top: 1.5px solid red;">

- Alice severity 3
- Bob severity 9
- Cindy severity 9
- David severity 5
- Eva severity 1

### Example code

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <vector>
#include <string>
using namespace std;

struct Patient {
    string name;
    int severity;   // higher = more urgent
    int arrivalId;  // smaller = arrived earlier
};

// Return true if x should be ABOVE y in a max-heap
bool higherPriority(const Patient &x, const Patient &y) {
    if (x.severity != y.severity) {
        return x.severity > y.severity;          // bigger severity first
    }
    return x.arrivalId < y.arrivalId;            // earlier arrival first
}

class PatientMaxHeap {
private:
    vector<Patient> a; // heap array

    int parent(int i) { return (i - 1) / 2; }
    int left(int i)   { return 2 * i + 1; }
    int right(int i)  { return 2 * i + 2; }

    void swapPatients(int i, int j) {
        Patient temp = a[i];
        a[i] = a[j];
        a[j] = temp;
    }

    // Fix heap upward after insert
    void reheapUp(int i) {
        while (i > 0) {
            int p = parent(i);
            if (higherPriority(a[i], a[p])) {
                swapPatients(i, p);
                i = p;
            } else {
                break;
            }
        }
    }

    // Fix heap downward after remove-root
    void reheapDown(int i) {
        int n = (int)a.size();

        while (true) {
            int L = left(i);
            int R = right(i);

            if (L >= n) break; // no children => leaf

            // choose child with higher priority
            int bestChild = L;
            if (R < n && higherPriority(a[R], a[L])) {
                bestChild = R;
            }

            // if child outranks parent, swap
            if (higherPriority(a[bestChild], a[i])) {
                swapPatients(bestChild, i);
                i = bestChild;
            } else {
                break;
            }
        }
    }

public:
    bool empty() const { return a.empty(); }

    void push(const Patient &p) {
        a.push_back(p);
        reheapUp((int)a.size() - 1);
    }

    Patient top() const {
        return a[0]; // assume not empty
    }

    Patient pop() {
        // remove and return highest priority
        Patient result = a[0];

        int lastIndex = (int)a.size() - 1;
        a[0] = a[lastIndex];
        a.pop_back();

        if (!a.empty()) reheapDown(0);
        return result;
    }
};

int main() {
    PatientMaxHeap pq;

    int arrival = 0;

    // arrivals (in order)
    pq.push({"Alice", 3, arrival++});
    pq.push({"Bob", 9, arrival++});
    pq.push({"Cindy", 9, arrival++});
    pq.push({"David", 5, arrival++});
    pq.push({"Eva", 1, arrival++});

    cout << "Treatment order:\n";
    while (!pq.empty()) {
        Patient p = pq.pop();
        cout << p.name
             << " (severity " << p.severity
             << ", arrival " << p.arrivalId << ")\n";
    }

    return 0;
}


```

<div id="shadebox">

### Example code

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <vector>
#include <string>
using namespace std;

struct Task {
    string title;
    int priority;  // higher = more important
    int taskId;    // smaller = earlier arrival
};

// Return true if x should be ABOVE y in the max-heap
bool higherPriority(const Task &x, const Task &y) {
    if (x.priority != y.priority) {
        return x.priority > y.priority;
    }
    return x.taskId < y.taskId; // earlier first if tie
}

class TaskMaxHeap {
private:
    vector<Task> a;
    int nextId;

    int parent(int i) { return (i - 1) / 2; }
    int left(int i)   { return 2 * i + 1; }
    int right(int i)  { return 2 * i + 2; }

    void swapTasks(int i, int j) {
        Task temp = a[i];
        a[i] = a[j];
        a[j] = temp;
    }

    void reheapUp(int i) {
        while (i > 0) {
            int p = parent(i);
            if (higherPriority(a[i], a[p])) {
                swapTasks(i, p);
                i = p;
            } else {
                break;
            }
        }
    }

    void reheapDown(int i) {
        int n = (int)a.size();

        while (true) {
            int L = left(i);
            int R = right(i);

            if (L >= n) break; // leaf

            // choose better child
            int best = L;
            if (R < n && higherPriority(a[R], a[L])) {
                best = R;
            }

            // if child outranks parent, swap
            if (higherPriority(a[best], a[i])) {
                swapTasks(best, i);
                i = best;
            } else {
                break;
            }
        }
    }

public:
    TaskMaxHeap() : nextId(0) {}

    bool isEmpty() const {
        return a.empty();
    }

    void addTask(const string &title, int priority) {
        Task t;
        t.title = title;
        t.priority = priority;
        t.taskId = nextId++;

        a.push_back(t);
        reheapUp((int)a.size() - 1);
    }

    Task peekNext() const {
        return a[0]; // assume not empty
    }

    Task runNext() {
        Task result = a[0];

        int last = (int)a.size() - 1;
        a[0] = a[last];
        a.pop_back();

        if (!a.empty()) reheapDown(0);
        return result;
    }
};

int main() {
    TaskMaxHeap scheduler;

    scheduler.addTask("Email students", 4);
    scheduler.addTask("Fix server bug", 10);
    scheduler.addTask("Grade homework", 7);
    scheduler.addTask("Team meeting", 7);
    scheduler.addTask("Backup files", 2);

    cout << "Execution order:\n";
    while (!scheduler.isEmpty()) {
        Task t = scheduler.runNext();
        cout << "- " << t.title
             << " (priority " << t.priority
             << ", id " << t.taskId << ")\n";
    }

    return 0;
}
