<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Selection Sort</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">
  
```
void selectionSort(int a[], int n) {
    for (int current = 0; current < n - 1; current++) {

        // find index of smallest from current..n-1
        int minIndex = current;
        for (int i = current + 1; i < n; i++) {
            if (a[i] < a[minIndex]) {
                minIndex = i;
            }
        }

        // swap into position current
        swapInt(a[current], a[minIndex]);
    }
}

```
</div>
   </div>
</div>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">How many comparisons?</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
 
- In pass 1: compare ~ ($N-1$) times
- pass 2: compare ~ ($N-2$) times
- …
- last pass: compare 1 time

- Total comparisons:

$$
(N-1) + (N-2) + ... + 1 = N(N-1)/2
$$
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Concrete numbers (feel the growth)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
 
Using $N(N-1)/2$:

- $N=10$ → 45

- $N=20$ → 190

- $N=100$ → 4,950

- $N=1,000$ → 499,500

- $N=10,000$ → 49,995,000
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Big-O</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Selection sort comparisons scale like:

~ $n^2/2$

So it’s $\mathcal{O}(n^2)$.

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Bubble Sort</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
 
Bubble Sort + “Short Bubble” + code
   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Bubble Sort (cont.)</div>
  <div class="definition-pro-Y-shadebox">
  
We repeatedly “bubble” the smallest value upward (toward the front) by swapping out-of-order neighbors.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">BubbleUp: one pass</div>
  <div class="definition-pro-Y-shadebox">
  
One pass compares neighbor pairs and swaps if needed.

We’ll do it from the end going backward:

- compare $a[i]$ and $a[i-1]$

- if $a[i] < a[i-1]$ → swap
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">BubbleUp code</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">

 
```
void bubbleUp(int a[], int startIndex, int endIndex) {
    for (int i = endIndex; i > startIndex; i--) {
        if (a[i] < a[i - 1]) {
            swapInt(a[i], a[i - 1]);
        }
    }
}
```
</div>
   </div>

</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Bubble sort using BubbleUp</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">
 
```
void bubbleSort(int a[], int n) {
    for (int current = 0; current < n - 1; current++) {
        bubbleUp(a, current, n - 1);
    }
}
```

</div>

   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Bubble sort trace</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Start: [36, 24, 10, 6, 12]

- After 1st bubbleUp (current=0):
- Smallest (6) moves to front
- Result: [6, 36, 24, 10, 12]
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Completed code for Bubble algorithm</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">

 
```
#include <iostream>
using namespace std;

void swapInt(int &x, int &y) {
    int temp = x;
    x = y;
    y = temp;
}

void bubbleSort(int a[], int n) {
    for (int startIndex = 0; startIndex < n - 1; startIndex++) {
        for (int i = n - 1; i > startIndex; i--) {
            if (a[i] < a[i - 1]) {
                swapInt(a[i], a[i - 1]);
            }
        }
    }
}

int main() {
    int a[] = {10, 3, 11, 5, 1};
    int n = 5;

    bubbleSort(a, n);

    for (int i = 0; i < n; i++) {
        cout << a[i] << " ";
    }

    return 0;
}
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">print each pass</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">

 
```
void bubbleSortShow(int a[], int n) {
    for (int current = 0; current < n - 1; current++) {
        bubbleUp(a, current, n - 1);
        cout << "After pass " << current + 1 << ": ";
        printArray(a, n);
    }
}
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Bubble sort comparisons</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Bubble sort also does about:

$$
(n-1) + (n-2) + ... + 1 = n(n-1)/2
$$

So bubble sort is also $\mathcal{O}(n^2)$.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Bubble sort</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
- Bubble sort may do many swaps (data movement), especially on messy / reverse-ordered data.

- Selection sort does fewer swaps (usually one swap per pass).
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Bubble sort (cont.)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
- If the array becomes sorted early, we can <spanRED>stop</spanRED> early instead of doing all passes.

- We use a boolean flag like sorted
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Bubble: bubbleUp that reports swaps</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">

 
```
void bubbleUp2(int a[], int startIndex, int endIndex, bool &sorted) {
    sorted = true; // assume sorted unless we make a swap

    for (int i = endIndex; i > startIndex; i--) {
        if (a[i] < a[i - 1]) {
            swapInt(a[i], a[i - 1]);
            sorted = false; // we had to fix something
        }
    }
}
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Bubble sort</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">
  
```
void shortBubble(int a[], int n) {
    bool sorted = false;
    int current = 0;

    while (current < n - 1 && !sorted) {
        bubbleUp2(a, current, n - 1, sorted);
        current++;
    }
}
````
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Bubble sort</div>
  <div class="definition-pro-Y-shadebox">
  
- If array is already sorted, it can stop quickly

- In that best case, it becomes close to $\mathcal{O}(n)$ comparisons
(one pass, no swaps)

Worst case is still $\mathcal{O}(n^2)$.
   </div>
</div>

  <div class="definition-pro-Y-title">Practice</div>

</div>

</div>

<section data-markdown id="ch3" class="center"><textarea data-template>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Insertion Sort</div>
  <div class="definition-pro-Y-shadebox">
  
Insertion Sort + code + when it’s fast  
   </div>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Insertion Sort</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Insertion sort in one sentence

- We grow a sorted part by taking the next item and inserting it into the correct position.

<hr style="border: none; border-top: 2px dashed orange;">

Think “sorting cards in your hand”

- You keep your hand sorted. You take one new card and slide it into the right spot.


   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Insertion sort</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">
  
```
void insertionSort(int a[], int n) {
    for (int i = 1; i < n; i++) {
        int key = a[i];
        int j = i - 1;

        while (j >= 0 && a[j] > key) {
            a[j + 1] = a[j]; // shift right
            j--;
        }
        a[j + 1] = key;
    }
}

```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Insertion sort trace</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
 
Start: [5, 1, 4, 2]

- i=1, key=1:
- shift 5 → [5, 5, 4, 2]
- place 1 → [1, 5, 4, 2]

- i=2, key=4:
- shift 5 → [1, 5, 5, 2]
- place 4 → [1, 4, 5, 2]
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Insertion sort trace (cont.)</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
 
- i=3, key=2:
- shift 5 → [1, 4, 5, 5]
- shift 4 → [1, 4, 4, 5]
- place 2 → [1, 2, 4, 5] ✅
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Insertion sort</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
If data is already sorted or almost sorted

- → only a few shifts happen

- → can feel close to $\mathcal{O}(n)$

Worst case (reverse sorted) is still $\mathcal{O}(n^2)$.
   </div>
</div>

</textarea></section>

</section>

<section>
<section data-markdown id="ch4" class="center"><textarea data-template>

<p class="definition-rainbow-title">$\mathcal{O}(n \log n)$ idea + Merge Sort</p>

</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Why need faster sorts?</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
$\mathcal{O}(n ^2)$ becomes huge as $N$ grows.

If N doubles:

- $\mathcal{O}(n ^2)$ roughly becomes 4× the work

- $\mathcal{O}(n \log n)$ becomes a bit more than 2×
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Divide and Conquer</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
If we can:

- split into two halves

- sort each half

- merge them efficiently

We can get $\mathcal{O}(n \log n)$ behavior.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Merge</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Example:

- Left = [6, 10, 24]
- Right = [12, 36]

Merge → [6, 10, 12, 24, 36]
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Minimal merge function</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
<div  style="font-size: 1.6em; line-height: 1.5;">

 
```
void mergeTwoSorted(const int left[], int nL,
                    const int right[], int nR,
                    int out[]) {
    int i = 0, j = 0, k = 0;

    while (i < nL && j < nR) {
        if (left[i] <= right[j]) out[k++] = left[i++];
        else                     out[k++] = right[j++];
    }

    while (i < nL) out[k++] = left[i++];
    while (j < nR) out[k++] = right[j++];
}
```
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Merge sort (recursive) idea</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
 
- Cut the array into halves

- Sort left half

- Sort right half

- Merge

That repeated “cutting” creates $log n$ levels,
and each level merges in about $n$ work.

So total $\approx n \log n$.
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Quick comparison</div>
  <div class="definition-pro-Y-shadebox">
  
- Selection sort: simple, few swaps, always ~$n^2$ comparisons

- Bubble sort: simple, can do many swaps, still ~$n^2$

- Short bubble: can stop early on almost-sorted arrays

- Insertion sort: often great for small / nearly sorted data

- Merge sort: better for large n ($\mathcal{O}(n \log n)$), needs extra memory
   </div>
</div>

</textarea></section>

</section>

#include <iostream>
using namespace std;

void printArray(const int a[], int n) {
    cout << "[";
    for (int i = 0; i < n; i++) {
        cout << a[i];
        if (i != n - 1) cout << ", ";
    }
    cout << "]\n";
}

void swapInt(int &x, int &y) {
    int temp = x;
    x = y;
    y = temp;
}

/* -------------------- Selection Sort (show each pass) -------------------- */
void selectionSortShow(int a[], int n) {
    for (int current = 0; current < n - 1; current++) {
        int minIndex = current;
        for (int i = current + 1; i < n; i++) {
            if (a[i] < a[minIndex]) minIndex = i;
        }
        swapInt(a[current], a[minIndex]);

        cout << "Selection pass " << current + 1 << ": ";
        printArray(a, n);
    }
}

/* -------------------- Bubble Sort (bubbleUp style) -------------------- */
void bubbleUp(int a[], int startIndex, int endIndex) {
    for (int i = endIndex; i > startIndex; i--) {
        if (a[i] < a[i - 1]) {
            swapInt(a[i], a[i - 1]);
        }
    }
}

void bubbleSortShow(int a[], int n) {
    for (int current = 0; current < n - 1; current++) {
        bubbleUp(a, current, n - 1);

        cout << "Bubble pass " << current + 1 << ": ";
        printArray(a, n);
    }
}

/* -------------------- Short Bubble Sort -------------------- */
void bubbleUp2(int a[], int startIndex, int endIndex, bool &sorted) {
    sorted = true; // assume sorted unless a swap happens
    for (int i = endIndex; i > startIndex; i--) {
        if (a[i] < a[i - 1]) {
            swapInt(a[i], a[i - 1]);
            sorted = false;
        }
    }
}

void shortBubbleShow(int a[], int n) {
    bool sorted = false;
    int current = 0;

    while (current < n - 1 && !sorted) {
        bubbleUp2(a, current, n - 1, sorted);

        cout << "ShortBubble pass " << current + 1 << ": ";
        printArray(a, n);

        current++;
    }
}

/* -------------------- Insertion Sort (show each step) -------------------- */
void insertionSortShow(int a[], int n) {
    for (int i = 1; i < n; i++) {
        int key = a[i];
        int j = i - 1;

        while (j >= 0 && a[j] > key) {
            a[j + 1] = a[j];
            j--;
        }
        a[j + 1] = key;

        cout << "Insertion step i=" << i << ": ";
        printArray(a, n);
    }
}

/* -------------------- Stats after sorting -------------------- */
double medianOfSorted(const int a[], int n) {
    if (n % 2 == 1) {
        return a[n / 2];
    } else {
        return (a[n / 2 - 1] + a[n / 2]) / 2.0;
    }
}

int main() {

    } else if (choice == 2) {

    cout << "Max = " << scores[n - 1] << "\n";
    cout << "Median = " << medianOfSorted(scores, n) << "\n";

    return 0;
}

    x = y;

bool isSorted(const int a[], int n) {
    for (int i = 1; i < n; i++) {

void selectionSort(int a[], int n) {
    for (int current = 0; current < n - 1; current++) {
        int minIndex = current;
        for (int i = current + 1; i < n; i++) {
            if (a[i] < a[minIndex]) minIndex = i;
        }
        swapInt(a[current], a[minIndex]);
    }
}

/* -------------------- Insertion Sort -------------------- */
void insertionSort(int a[], int n) {
    for (int i = 1; i < n; i++) {
        int key = a[i];
        int j = i - 1;

        while (j >= 0 && a[j] > key) {
            a[j + 1] = a[j];
            j--;
        }
        a[j + 1] = key;
    }
}

/* -------------------- Short Bubble Sort -------------------- */
void bubbleUp2(int a[], int startIndex, int endIndex, bool &sorted) {
    sorted = true;
    for (int i = endIndex; i > startIndex; i--) {
        if (a[i] < a[i - 1]) {
            swapInt(a[i], a[i - 1]);
            sorted = false;
        }
    }
}

void shortBubble(int a[], int n) {
    bool sorted = false;
    int current = 0;

    while (current < n - 1 && !sorted) {
        bubbleUp2(a, current, n - 1, sorted);
        current++;

    }

    for (int i = 0; i < n; i++) {

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">* Quick Sort</div>
  <div class="definition-pro-Y-shadebox">
<div style="width: 800px;"></div>
  
Quick Sort works like this:

- Pick one number as the pivot
- Put smaller numbers on the left
- Put bigger numbers on the right
- Do the same thing again for the left and right parts

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">* Quick Sort</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>


```
#include <iostream>
using namespace std;

// Function to swap two numbers
void swapValues(int &a, int &b)
{
    int temp = a;
    a = b;
    b = temp;
}

// Partition function
int partition(int arr[], int low, int high)
{
    int pivot = arr[high];   // choose the last element as pivot
    int i = low - 1;         // index of smaller element

    for (int j = low; j < high; j++)
    {
        if (arr[j] < pivot)
        {
            i++;
            swapValues(arr[i], arr[j]);
        }
    }

    swapValues(arr[i + 1], arr[high]);
    return i + 1;
}

// Quick sort function
void quickSort(int arr[], int low, int high)
{
    if (low < high)
    {
        int pivotIndex = partition(arr, low, high);

        quickSort(arr, low, pivotIndex - 1);     // sort left part
        quickSort(arr, pivotIndex + 1, high);    // sort right part
    }
}

// Function to print the array
void printArray(int arr[], int size)
{
    for (int i = 0; i < size; i++)
    {
        cout << arr[i] << " ";
    }
    cout << endl;
}

int main()
{
    int arr[] = {8, 4, 7, 3, 9, 2, 6, 5};
    int size = sizeof(arr) / sizeof(arr[0]);

    cout << "Original array: ";
    printArray(arr, size);

    quickSort(arr, 0, size - 1);

    cout << "Sorted array: ";
    printArray(arr, size);

    return 0;
}

```


   </div>
</div>



<div class="definition-container">
  <div class="definition-title">* Quick Sort</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

- partition() finds the correct place for the pivot
- quickSort() keeps dividing the array into smaller parts
- swapValues() exchanges two numbers

<hr>

For Quick Sort, the time complexity is:

- Best case: $\mathcal{O}(n \log n)$
- Average case: $\mathcal{O}(n \log n)$
- Worst case: $\mathcal{O}(n^2)$
