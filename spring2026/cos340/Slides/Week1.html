What is SE? Process + life-cycle + quality goals

> Building a House
   </div>

<div class="question-container">
  <div class="question-title">Building a House</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

Software Engineering — The Discipline

Think of software engineering like <spanGREEN>house engineering</spanGREEN>.

It is:

- Planning carefully

- Using proper methods and rules

- Making sure the final result is safe, reliable, and usable

👉 Just like a house is <spanRED>not</spanRED> built randomly, software is <spanRED>not</spanRED> written randomly.
   </div>
</div>




<div class="question-container">
  <div class="question-title">Building a House</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

- <spanBYMix>Requirements</spanBYMix>: The owner says: “I want 3 bedrooms, 2 bathrooms, and a kitchen.”

- <spanBYMix>Design</spanBYMix>: The architect draws floor plans and layouts.

- <spanBYMix>Implementation</spanBYMix>: Workers build the house using bricks and tools.

- <spanBYMix>Testing / Inspection</spanBYMix>: Inspectors check electricity, water, and structure.

- <spanBYMix>Maintenance</spanBYMix>: Later repairs, painting, or upgrades.

👉 These steps together form the <spanGREEN>process</spanGREEN>.
   </div>
</div>




<div class="question-container">
  <div class="question-title">Building a House</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

Mapping to Software

```
| House Example     | Software Example          |
| ----------------- | ------------------------- |
| Decide room needs | Decide software features  |
| Draw house plan   | Design software structure |
| Build the house   | Write code                |
| Inspect the house | Test software             |
| Repair later      | Maintain software         |

```
   </div>
</div>



<div class="question-container">
  <div class="question-title">Summary</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

- Software engineering is the <spanGREEN>disciplined way of building software, and the software process is the step-by-step path followed to do it.</spanGREEN>
   </div>
</div>




<div class="definition-container">
  <div class="definition-title">What is software engineering?</div>
  <div class="definition-shadebox">

Software engineering is the discipline devoted to:

- **design**
- **production**
- **maintenance**

etc., of software systems **on time**, **within budget**, and with acceptable **quality**.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Software process</div>
  <div class="definition-shadebox">

A **software process** is a *standard, integrated set of tools & techniques* that helps teams:

- build software consistently
- coordinate work
- manage complexity and change

Think: “how we work” (not just “what we code”).
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Why not <spanGREEN>“just start coding”?</spanGREEN></div>
  <div class="definition-shadebox">

Because you will likely hit:

- unclear requirements
- surprises in edge cases
- changes mid-way
- hard-to-fix bugs late in the project

**Process** reduces rework by catching problems early.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Note</div>
  <div class="definition-shadebox">

- Example of an edge-case surprise: Parking garage payment system

- The system was designed so drivers pay before leaving. It worked perfectly in normal tests.

- But after deployment, a rare case appeared:

	- A car entered just before midnight

	- Stayed overnight

	- Tried to exit early morning
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Note</div>
  <div class="definition-shadebox">

> The system calculated negative parking time because the date rolled over, so the gate would not open

   </div>
</div>




<div class="definition-container">
  <div class="definition-title">Note</div>
  <div class="definition-shadebox">

This edge case wasn’t in the original requirements, but once discovered:

- Multiple cars were stuck

- Staff had to manually open the gate

- Engineers rushed an emergency fix
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Note</div>
  <div class="definition-shadebox">

If the team had used early reviews, edge-case testing (time boundaries, date changes), or a pilot test, this problem would have been caught before deployment, saving rework and stress.

<hr>

> Edge cases are “rare but real” situations that break systems in unexpected ways—process helps catch them early.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Typical life-cycle activities</div>
  <div class="definition-shadebox">

1. Problem analysis  
2. Requirements elicitation  
3. Requirements specification (functional + non-functional)  
4. <spanGREEN>High-level</spanGREEN> design  
5. <spanGREEN>Low-level</spanGREEN> design  
6. Implementation  
7. Testing & verification  
8. Delivery  
9. Operation  
10. Maintenance  
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Note</div>
  <div class="definition-shadebox">

High-level design includes:

- Number of floors (1-story or 2-story)

- Rooms (bedrooms, kitchen, bathrooms, garage)

- Where rooms are located (layout)

- How electricity, water, and heating generally flow

- Major materials (wood frame, concrete, brick)
   </div>
</div>

- You’re deciding the structure, not the details.



<div class="definition-container">
  <div class="definition-title">Note</div>
  <div class="definition-shadebox">

Same house example:

- Low-level design includes:

- Exact electrical wiring paths

- Number and location of outlets

- Pipe diameters for water

- Specific door sizes

- Exact materials and measurements

   </div>
</div>

- This is detailed enough that builders can directly construct from it.

  <div class="definition-title">Note</div>
  <div class="definition-shadebox">

   </div>
</div>

<div class="definition-container">
  <div class="definition-title">Waterfall (when it fits)</div>
  <div class="definition-shadebox">

Waterfall can work when:

- requirements are **well understood**
- requirements are **unlikely to change**
- the environment is **stable**

But many real projects need iteration.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Spiral (risk-driven iteration)</div>
  <div class="definition-shadebox">

Spiral repeats cycles like:

- set objectives
- identify alternatives & constraints
- **assess risks**
- develop + validate
- plan next iteration

Good when risks are high and requirements evolve.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Which model fits better?</div>
  <div class="definition-shadebox">

- A simple “submit grades” internal tool with stable rules  
- A student mobile app where features change after user feedback  
   </div>
</div>



> # What is Quality software?




<div class="definition-container">
  <div class="definition-title">Four quality goals</div>
  <div class="definition-shadebox">

<spanBYMix>Quality</spanBYMix> software:

- **Works**
- Is **modifiable**
- Is **reusable**
- Is completed **on time** and **within budget**

We’ll connect each goal to C++.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Works?</div>
  <div class="definition-shadebox">

To say “it works,” we must know:

- What should it do? (**requirements / spec**)
- What counts as correct output?
- What errors should be handled?

If you can’t define “correct,” you can’t test.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Works?</div>
  <div class="definition-shadebox">

Requirements vs Specification

- **Requirements**: what the user needs (often informal)
- **Specification**: *<spanGREEN>precise</spanGREEN>* description of what the system must do

A program can pass tests and still be useless if the **spec** is wrong.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Works?</div>
  <div class="definition-shadebox">

- Example: requirement → specification

**Requirement (informal):**  
“Compute the average of three quiz scores.”

<hr>

**Specification (precise):**
- <spanBYMix>Inputs</spanBYMix>: three integers `q1, q2, q3` in `[0,100]`
- <spanGREEN>Output</spanGREEN>: average as `double` with 2 decimal places
- <spanBYMix>Errors</spanBYMix>: if any score is out of range, print error message and stop
- <spanGREEN>Assumptions</spanGREEN>: user enters integers
- <spanBYMix>Tests</spanBYMix>: (100,100,100) → 100.00; (0,50,100) → 50.00; (-1,...) → error
   </div>
</div>



> # Please implement this Specification by C++




<div class="definition-container">
  <div class="definition-title">Works?</div>
  <div class="definition-shadebox">

- C++ example: put the spec in comments

```cpp
/*
  average3
  Inputs: q1, q2, q3 are integers in [0,100]
  Output: returns the average as a double
  Error: if any input is out of range, throws runtime_error
*/
double average3(int q1, int q2, int q3) {
    if (q1 < 0 || q1 > 100 || q2 < 0 || q2 > 100 || q3 < 0 || q3 > 100) {
        throw std::runtime_error("Score out of range");
    }
    return (q1 + q2 + q3) / 3.0;
}
```
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Modifiable</div>
  <div class="definition-shadebox">

Software changes because:

- requirements evolve
- bugs are found
- new features are added
- environment changes (OS, libraries, etc.)

<hr>

To modify safely, code must be:

- **readable**
- **well-designed** (good structure)
- **well-documented**
   </div>
</div>



> # Writing everything in main: good or bad?



<div class="definition-container">
  <div class="definition-title">Modifiable</div>
  <div class="definition-shadebox">

- C++ example: “modifiable” = small focused functions

<spanRED>Bad</spanRED> (everything in `main`): hard to change.

Good (decompose):

```cpp
int readScore() { int s; std::cin >> s; return s; }

double computeAverage(int a, int b, int c) {
    return (a + b + c) / 3.0;
}

void printAverage(double avg) {
    std::cout << "Average: " << avg << "\n";
}
```

Now, changing input rules or output format is <spanBYMix>localized</spanBYMix>.

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Reusable</div>
  <div class="definition-shadebox">

Reuse saves time and reduces bugs (if reused code is tested).

- functions (reusable behaviors)
- classes (reusable “things” with data + behavior)
- libraries (e.g., STL)

**OO thinking:** the unit of reuse is often a **class**.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Reusable</div>
  <div class="definition-shadebox">

C++ Standard Template Library (STL), are collections of pre-written code (templates, classes, functions) for common tasks, providing ready-made tools for data structures (vectors, lists) and algorithms (sorting, searching) to simplify development and promote reusable, efficient code.
   </div>
</div>




<div class="definition-container">
  <div class="definition-title">Reusable</div>
  <div class="definition-shadebox">

- Reusable C++ example: a helper function

```cpp
void printLine(char ch, int n) {
    for (int i = 0; i < n; i++) std::cout << ch;
    std::cout << "\n";
}
```

You can <spanBYMix>reuse</spanBYMix> it in <spanGREEN>many</spanGREEN> console apps to format output.

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">On time / within budget</div>
  <div class="definition-shadebox">

- Deadlines are real.

Quality is not only correctness—also **predictability** and **planning**.

A simple beginner rule:

- write a small plan
- build in small steps
- test often

   </div>
</div>

</textarea></section>

</section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>


<div class="question-container">
  <div class="question-title">An example of From Specification to Design</div>
  <div class="question-shadebox">
<div style="width: 950px;"></div>

<div id="roundbox">
Classroom Attendance App
</div>


Specification (What the system should do)

Imagine a teacher says:

> “I want a simple app to take attendance for my class.”

   </div>
</div>




<div class="question-container">
  <div class="question-title">Specification (What the system should do)</div>
  <div class="question-shadebox">
<div style="width: 950px;"></div>

After talking more, the specification becomes:

- The teacher can see a list of students

- The teacher can mark each student as Present or Absent

- The app should save attendance for each day

- The teacher can view attendance later

👉 Specification focuses on <spanBYMix>WHAT</spanBYMix>, not HOW
   </div>
</div>




<div class="question-container">
  <div class="question-title">Design (How the system will be built)</div>
  <div class="question-shadebox">
<div style="width: 950px;"></div>

Design decisions:

- Screens

	- <spanBYMix>Screen 1</spanBYMix>: Student list with checkboxes

	- <spanBYMix>Screen 2</spanBYMix>: Attendance history by date

- Data structure

	- Student: ID, Name

	- Attendance: StudentID, Date, Status

   </div>
</div>




<div class="question-container">
  <div class="question-title">Design (cont.)</div>
  <div class="question-shadebox">
<div style="width: 950px;"></div>

- Buttons

	- “Save Attendance”

	- “View Records”

- Storage

	- Use a simple database or local file to store attendance

👉 Design focuses on HOW the system works internally
   </div>
</div>




<div class="question-container">
  <div class="question-title">Comparison</div>
  <div class="question-shadebox">

```

| Step          | Question Answered       |
| ------------- | ----------------------- |
| Specification | What should the app do? |
| Design        | How will we build it?   |

```
   </div>
</div>




<div class="question-container">
  <div class="question-title">Summary</div>
  <div class="question-shadebox">

- Specification says “The app must take attendance.”
- Design says “Here is the screen layout, data, and logic to make it happen.”
   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">From Specification to Design</div>
  <div class="definition-pro-Y-shadebox">
  
Specification → Design (abstraction, info hiding, decomposition, OO, UML/CRC) 
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Note</div>
  <div class="definition-pro-Y-shadebox">

Class-Responsibility-Collaborator, a low-tech, hands-on brainstorming technique using index cards (Class, Responsibilities, Collaborators) to model system interactions, explore object behaviors, and identify design flaws, working alongside concepts like abstraction, information hiding, and decomposition. 
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">A practical “spec checklist”</div>
  <div class="definition-shadebox">

Before you design, write:

- Problem definition (in your own words)
- Inputs (type, range, format)
- Outputs (format, units, precision)
- Processing requirements (what must be computed)
- Error conditions (what can go wrong?)
- Assumptions (what you are assuming is true)
- Sample I/O + expected results
- Initial test ideas
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Test cases</div>
  <div class="definition-shadebox">

Pick one:

- “Simple ATM balance check”
- “Grade calculator”
- “Temperature converter”

Write **3 test cases** (input → expected output).  
(We’ll reuse them later for testing.)
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Program design</div>
  <div class="definition-shadebox">

Program design: from “what” to “how”

- Specification tells **what** to do.  
- Design decides **how** to do it.

We’ll use four core ideas:

- Abstraction
- Information hiding (encapsulation)
- Stepwise refinement
- Visual tools (CRC / UML)
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">What is abstraction?</div>
  <div class="definition-shadebox">

- An **abstraction** is a model that keeps only the important details for a purpose.

- Different people need different abstractions of the “same thing.”
   </div>
</div>



> # Give an example of abstraction in real life.



<div class="definition-container">
  <div class="definition-title">What is abstraction?</div>
  <div class="definition-shadebox">

Start a car, we will not care about how the engine ignites the fuel, how sensors communicate with the ECU (Electronic Control Unit), or how electricity flows through the wiring.

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">What is abstraction?</div>
  <div class="definition-shadebox">


When you use an ATM, you don’t care how the bank’s servers verify your account, encrypt your PIN, or communicate across networks. You only care that you insert the card, enter the PIN, and get cash.

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">What is abstraction?</div>
  <div class="definition-shadebox">

Abstraction lets you focus on what to do, not how it works internally.

   </div>
</div>



- An abstraction includes the essential details relative to the perspective of the viewer
<img src="images/fig2_abstraction.png" width="800" />




<div class="definition-container">
  <div class="definition-title">Abstraction in code</div>
  <div class="definition-shadebox">

When you call:

```cpp
std::cout << "Hello\n";
```

You **don’t** think about:

- device drivers
- CPU instructions
- OS system calls

That complexity is hidden behind an abstraction.

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">abstraction - BankAccount</div>
  <div class="definition-shadebox">

We only expose what users need:

- deposit
- withdraw
- get balance

```cpp
class BankAccount {
public:
    void deposit(int cents);
    bool withdraw(int cents); // returns true if successful
    int getBalance() const;

private:
    int balanceCents;  // hidden detail
};
```

Users don’t need to know how we store cents.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Information hiding (encapsulation)</div>
  <div class="definition-shadebox">

**Hide details likely to change** behind a stable interface.

<b>Goal</b>: changing internal details should not force changes everywhere else.

This supports:

- modifiability
- reusability
- fewer bugs
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Cohesion & coupling</div>
  <div class="definition-shadebox">

- **High cohesion**: a module does *one clear job*
- **Loose coupling**: modules depend on each other as little as possible

A good module can be described in **one sentence**.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">C++ example: bad coupling</div>
  <div class="definition-shadebox">

If we expose internal details:

```cpp
struct BankAccountBad {
    int balanceCents; // public (bad)
};
```

Then other code might do:

```cpp
acc.balanceCents -= 50; // everywhere
```

If we later change representation, everything breaks.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">C++ example</div>
  <div class="definition-shadebox">

C++ example: info hiding done right

```cpp
class BankAccount {
public:
    BankAccount() : balanceCents(0) {}

    void deposit(int cents) { balanceCents += cents; }

    bool withdraw(int cents) {
        if (cents > balanceCents) return false;
        balanceCents -= cents;
        return true;
    }

    int getBalance() const { return balanceCents; }

private:
    int balanceCents;
};
```

Only methods touch internal details.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Stepwise refinement</div>
  <div class="definition-shadebox">

Start with a big task, then <spanBYMix>refine into smaller tasks, until each is easy to code</spanBYMix>.

Common styles:

- **top-down design** (functional decomposition)
- bottom-up
- OO “round-trip” design (revisit design as you learn more)

   </div>
</div>



A portion of a functional design for baking a cake

<img src="images/fig4_cake_topdown.png" width="650" />



<div class="definition-container">
  <div class="definition-title">Example</div>
  <div class="definition-shadebox">

-  Example (non-code): make a cake (functional decomposition)

	- Big task → smaller tasks → code-sized tasks.

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">C++ example</div>
  <div class="definition-shadebox">

- C++ example: refine “grade calculator”

**Level 0:**  
- Read scores  
- Compute average  
- Print letter grade  

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">C++ example</div>
  <div class="definition-shadebox">

- C++ example: refine “grade calculator”

**Level 1:**  
- `readScores()`  
- `computeAverage()`  
- `letterGrade()`  
- `printReport()`  

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">C++ skeleton (top-down)</div>
  <div class="definition-shadebox">

```cpp
int main() {
    int a, b, c;
    readScores(a, b, c);
    double avg = computeAverage(a, b, c);
    char letter = letterGrade(avg);
    printReport(avg, letter);
}
```

Each helper is small and testable.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Exercise</div>
  <div class="definition-shadebox">

Design (no coding yet):

- Pick a tiny program idea (converter, calculator, menu app)
- Write **Level 0** and **Level 1** stepwise refinement
   </div>
</div>



> Two design approaches: Top-down vs OO



<div class="definition-container">
  <div class="definition-title">Top-down design</div>
  <div class="definition-shadebox">

- Top-down design: procedural view

Focus on transforming input → output.

- break into functional modules
- hierarchy of tasks

Good for “do this, then that” workflows.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Object-oriented design</div>
  <div class="definition-shadebox">

- Object-oriented design: OO view

Focus on **objects** and their responsibilities.

- find nouns (things)
- find verbs (actions)
- decide which class does what
- objects collaborate

<hr>

A Note:  
- underline verbs → procedural tasks  
- circle nouns → OO candidates
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">OO example</div>
  <div class="definition-shadebox">

- OO example: “Fraction” as an object

A fraction has:

- data: numerator, denominator
- behaviors: isZero, getNumerator, reduce, etc.

This becomes a reusable type.

   </div>
</div>



> Visual tools: UML & CRC

- Use CRC (Class-Responsibility-Collaborator) early (brainstorming).  
- Use UML to document the final class structure.



<div class="definition-container">
  <div class="definition-title">CRC example (Fraction)</div>
  <div class="definition-shadebox">

**Class:** Fraction  
**Responsibilities (verbs):**
- initialize
- get numerator/denominator
- check if zero
- convert to proper (optional)

**Collaborators:**
- maybe “Math” helper (gcd)
   </div>
</div>

</textarea></section>

</section>

</textarea></section>

<div class="question-container">
  <div class="question-title">An example</div>
  <div class="question-shadebox">

> Buying a <spanBYMix>Calculator</spanBYMix> for a Student
   </div>
</div>




> # What is Verification? What is Testing?




<div class="question-container">
  <div class="question-title">Verification — “Did we build the right thing?”</div>
  <div class="question-shadebox">
<div style="width: 950px;"></div>

Before buying, the teacher checks the requirements:

<spanBYMix>Requirements</spanBYMix> (Specification):

- Must add, subtract, multiply, divide

   </div>
</div>





<div class="question-container">

  <div class="question-shadebox">
<div style="width: 950px;"></div>

Verification activity:

👉 Running the product to see results

   </div>
</div>




<div class="question-container">
  <div class="question-title">Comparison</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

```
| Concept      | Question Answered                | Example                   |
| ------------ | -------------------------------- | ------------------------- |
| Verification | Are we building the right thing? | Check calculator features |

```
   </div>
</div>




<div class="question-container">
  <div class="question-title">Summary</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

- Verification = Check the plan

- Testing = Try it out
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Verification & Testing</div>
  <div class="definition-pro-Y-shadebox">
  
Verification & Testing (errors, assertions, reviews, <spanGREEN>black/white-box</spanGREEN>, test plans, drivers) 
   </div>
</div>



> # What are the differences between Testing and Debugging?



<div class="definition-container">
  <div class="definition-title">Testing vs Debugging</div>
  <div class="definition-shadebox">

- **Testing**: run the program with chosen data to *discover* errors
- **Debugging**: find and fix the cause of a known error

After changes, repeat tests (**regression testing**).
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Verification vs Validation</div>
  <div class="definition-shadebox">

- **Verification**: “Are we building it right?” (meets spec)
- **Validation**: “Are we building the right thing?” (solves real need)

You can verify a wrong spec and still fail users (<spanRED>Why?</spanRED>)
   </div>
</div>




<div class="question-container">
  <div class="question-title">Verification vs Validation</div>
  <div class="question-shadebox">

- Verification only checks whether you built the system according to the specification — not whether the specification itself actually solves the user’s real problem.

<hr>

- Specification (wrong spec): “Build a door that opens only after entering a 12-character password.”

   </div>
</div>




<div class="question-container">
  <div class="question-title">Verification vs Validation</div>
  <div class="question-shadebox">
  
Verification:

- Door accepts exactly 12 characters ✔️

- Rejects anything else ✔️

- Locks and unlocks correctly ✔️

The system is verified — it perfectly follows the spec.

   </div>
</div>




<div class="question-container">
  <div class="question-title">Verification vs Validation</div>
  <div class="question-shadebox">


But users fail:

- People forget long passwords

- Emergencies make typing impossible

- Kids or elderly users can’t use it

So even though the system is correct, it is useless or frustrating.
   </div>
</div>




<div class="question-container">
  <div class="question-title">Verification vs Validation</div>
  <div class="question-shadebox">

- Verification: Did we build it right?

- Validation: Did we build the right thing?

   </div>
</div>




<div class="definition-container">
  <div class="definition-title">Types of errors</div>
  <div class="definition-shadebox">

- 1)Compile-time errors (syntax)

Example: missing semicolon

```cpp
int x = 5
std::cout << x;
```

The compiler stops you early (good!).

Goal: get to “compiles cleanly” quickly.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Types of errors</div>
  <div class="definition-shadebox">

- 2)Run-time errors (crash / failure)

Example: divide by zero

```cpp
int a = 10;
int b = 0;
int c = a / b; // undefined behavior / crash
```

Prevent with checks.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Types of errors</div>
  <div class="definition-shadebox">

- 3)Logic errors (wrong results)

Example: `=` vs `==`

```cpp
int count = 0;
if (count = 10) {  // assigns 10, condition is true
    std::cout << "Always prints!\n";
}
```

This compiles, runs, but is wrong.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Robustness</div>
  <div class="definition-shadebox">

A robust program:

- detects bad input / unusual situations
- stays in control
- either recovers or fails gracefully (with a clear message)

A program should <spanBYMix>not</spanBYMix> “just crash” if <spanGREEN>it can detect the problem</spanGREEN>.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">C++ stream failure</div>
  <div class="definition-shadebox">

```cpp
int x;
std::cin >> x;

if (!std::cin) {
    std::cout << "Invalid input (expected an integer).\n";
    return 1;
}
```

If a user types letters, `cin` enters a fail state.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Exception handling</div>
  <div class="definition-shadebox">

Division by zero is a logic error

We detect it, then throw an exception

The catch block handles the problem safely
   </div>
</div>




<div class="definition-container">
  <div class="definition-title">Exception handling</div>
  <div class="definition-shadebox">


```

#include <iostream>
#include <stdexcept>  // for std::runtime_error

int divide(int a, int b)
{
    if (b == 0) {
        throw std::runtime_error("Division by zero is not allowed");
    }
    return a / b;
}

int main()
{
    try {
        int x = 10;
        int y = 0;

        int result = divide(x, y);
        std::cout << "Result: " << result << std::endl;
    }
    catch (const std::runtime_error& e) {
        std::cout << "Error: " << e.what() << std::endl;
    }

    return 0;
}

```

   </div>
</div>




<div class="definition-container">
  <div class="definition-title">Note</div>
  <div class="definition-shadebox">

```
int x = 1 / 0;  // Undefined behavior (no exception!)
```
   </div>
</div>

- C++ does not automatically throw for 1 / 0

- This causes undefined behavior or a crash

- You must check and throw yourself




<div id="roundbox">

Exceptions are used when a function cannot complete its task correctly, such as dividing by zero. We detect the error, throw an exception, and let the caller decide how to handle it.

<hr>

Users cause bad inputs. Programmers cause crashes. It’s caused by the user’s input, but it is still sometimes the programmer’s responsibility.
</div>



<div id="roundbox">

The user provides the bad input, but handling it correctly is the programmer’s responsibility. If the program crashes, that is a programming error.
</div>

<hr>

- Triggered by user

- Handled by programmer

- Exceptions represent failure of a function’s contract, not blame




<div class="definition-container">
  <div class="definition-title">File open check</div>
  <div class="definition-shadebox">

```cpp
#include <fstream>

std::ifstream in("data.txt");
if (!in) {
    std::cout << "Could not open data.txt\n";
    return 1;
}
```

Never assume the file exists.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Assertions</div>
  <div class="definition-shadebox">

An **assertion** is a statement that should be true at a point in the program.

Example reasoning:

```cpp
sum = part + 1;
// Assert: sum > part  (if no overflow)
```

This supports “designing for correctness.”
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Preconditions</div>
  <div class="definition-shadebox">

A **precondition** must be true *before* a function runs.

If it’s false, the function’s promise is not guaranteed.

Example precondition for division:

- divisor ≠ 0
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Postconditions</div>
  <div class="definition-shadebox">

A **postcondition** must be true *after* the function finishes (if preconditions held).

Example postcondition for safe division:

- if divisor ≠ 0 then result = dividend / divisor
   </div>
</div>




<div class="definition-container">
  <div class="definition-title">C++ example: precondition with assert</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

```cpp
#include <cassert>
#include <vector>

int getLastAndRemove(std::vector<int>& v) {
    assert(!v.empty()); // precondition: v is not empty
    int last = v.back();
    v.pop_back();
    return last;        // postcondition: size is decreased by 1
}
```
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Deskchecking (paper execution)</div>
  <div class="definition-shadebox">

Before running code:

- trace it by hand on paper
- write key variable values step by step
- look for common mistakes (loops, initialization, conditions)

This is cheap and catches many logic errors early.

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Example</div>
  <div class="definition-shadebox">

```cpp
int sum = 0;
for (int i = 1; i <= 4; i++) {
    sum = sum + i;
}
std::cout << sum << "\n";
```

Create a table:

| i | sum before | sum after |
|---|------------|----------|
| 1 | 0 | 1 |
| 2 | 1 | 3 |
| 3 | 3 | 6 |
| 4 | 6 | 10 |

Expected output: `10`.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Walkthroughs & inspections</div>
  <div class="definition-shadebox">

- **Walkthrough**: team manually simulates logic and checks design vs requirements
- **Inspection**: line-by-line reading; peers point out defects

Key idea: “egoless programming” — you’re reviewing the code, not the person.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Unit testing</div>
  <div class="definition-shadebox">

Test one function or class *by itself*.

You choose test cases to cover:

- normal cases
- boundary cases
- error cases
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Two testing views</div>
  <div class="definition-shadebox">

- **<spanGREEN>Black-box</spanGREEN> (data coverage)**: design tests from spec (inputs/outputs)
- **<spanGREEN>White-box</spanGREEN> (code coverage)**: design tests from code paths/branches

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Functional domain</div>
  <div class="definition-shadebox">

- Functional domain = all valid inputs.

	- Some domains are small (<spanBYMix>test all</spanBYMix>).  
	- Some are huge (<spanBYMix>test representative</spanBYMix> + <spanBYMix>boundaries</spanBYMix>).

<hr>
 
Example:

- `PrintBoolean(bool)` has 2 inputs → exhaustive possible  
- `PrintInteger(int)` has billions → need strategy

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Branch & path idea</div>
  <div class="definition-shadebox">

- **Statement coverage**: every statement runs at least once  
- **Branch coverage**: every branch (true/false) runs at least once  
- **Path coverage**: every path runs (often impossible for large code)
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Function to test (spec-first)</div>
  <div class="definition-shadebox">

```cpp
/*
  Divide
  Inputs: dividend, divisor
  Outputs:
    - sets error = true if divisor == 0
    - otherwise sets error = false and result = dividend / divisor
*/
void Divide(int dividend, int divisor, bool& error, float& result);
```

We can design tests from spec (black-box) and from code (white-box).
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Minimal black-box test cases</div>
  <div class="definition-shadebox">

- 1.divisor = 0 (error case)
- 2.divisor ≠ 0 (normal case)

Example table:

| dividend | divisor | expected error | expected result |
|---------:|--------:|:--------------:|:---------------:|
| 8 | 0 | true | undefined |
| 8 | 2 | false | 4.0 |
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">What is a test driver?</div>
  <div class="definition-shadebox">

A **test driver** is a small program that calls a function/class with test inputs and checks results.

The driver is “temporary scaffolding” used to test components.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Simple driver (prints results)</div>
  <div class="definition-shadebox">

```cpp
#include <iostream>

void Divide(int dividend, int divisor, bool& error, float& result) {
    if (divisor == 0) { error = true; return; }
    error = false;
    result = static_cast<float>(dividend) / divisor;
}

int main() {
    bool error;
    float result;

    Divide(8, 0, error, result);
    std::cout << "Test 1 (8/0): error=" << error << "\n";

    Divide(8, 2, error, result);
    std::cout << "Test 2 (8/2): error=" << error << " result=" << result << "\n";
}
```

- Note: print expected vs actual.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Better driver (checks automatically)</div>
  <div class="definition-shadebox">

```cpp
#include <iostream>

void assertEqual(bool actual, bool expected, const char* name) {
    if (actual == expected) std::cout << "[PASS] " << name << "\n";
    else std::cout << "[FAIL] " << name << "\n";
}
```

Then add checks for each test.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Integration testing</div>
  <div class="definition-shadebox">

After unit tests, combine modules and test interactions.

Two common strategies:

- **Top-down integration**: start from the top; use **stubs** for missing lower modules
- **Bottom-up integration**: start from the bottom; use **drivers** to call lower modules
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Stubs vs Drivers</div>
  <div class="definition-shadebox">

- **Stub**: fake “lower-level” function used during top-down integration  
- **Driver**: program that calls a module during bottom-up integration  
   </div>
</div>




<div class="definition-container">
  <div class="definition-title">Test architecture idea</div>
  <div class="definition-shadebox">

Driver reads commands from a file:

- easy to add/modify tests
- repeatable
- produces output file for checking
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Minimal file-driven idea</div>
  <div class="definition-shadebox">

Input file (`tests.txt`):

```
DIVIDE 8 0
DIVIDE 8 2
QUIT
```

Driver reads a command and executes.
   </div>
</div>




<div class="definition-container">
  <div class="definition-title">C++ skeleton: command-driven driver</div>
  <div class="definition-shadebox">

```cpp
#include <iostream>
#include <fstream>
#include <string>

int main() {
    std::ifstream in("tests.txt");
    if (!in) { std::cout << "Missing tests.txt\n"; return 1; }

    std::string cmd;
    while (in >> cmd) {
        if (cmd == "QUIT") break;

        if (cmd == "DIVIDE") {
            int a, b; in >> a >> b;
            // call your function here
            std::cout << "DIVIDE " << a << " " << b << "\n";
        }
    }
}
```

Start simple: print what you read, then connect to real functions.
   </div>
</div>




<div class="definition-container">
  <div class="definition-title">Why Fraction</div>
  <div class="definition-shadebox">

- small data: numerator + denominator
- clear behaviors: initialize, get, isZero
- easy to test with a driver

Goal: learn *design + testing* together.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Minimal Fraction class</div>
  <div class="definition-shadebox">

```cpp
class Fraction {
public:
    void init(int n, int d) { num = n; denom = d; }
    int getNum() const { return num; }
    int getDenom() const { return denom; }
    bool isZero() const { return num == 0; }

private:
    int num;
    int denom;
};
```

(Then add error checks: denom ≠ 0.)
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Mini-lab</div>
  <div class="definition-shadebox">

Tasks:

- Enforce denom ≠ 0 in `init` (use `throw`)
- Add `double toDouble() const`
- Write **3 black-box test cases** for `toDouble()`

Example tests:
- 1/2 → 0.5
- 2/1 → 2.0
- 0/5 → 0.0
   </div>
</div>




<div class="definition-container">
  <div class="definition-title">Mini-lab</div>
  <div class="definition-shadebox">

An Answer:

```
#include <iostream>
#include <stdexcept>

class Fraction {
private:
    int numer;
    int denom;

public:
    // Constructor
    Fraction(int n, int d) : numer(n), denom(d)
    {
        if (denom == 0) {
            throw std::invalid_argument("Denominator cannot be zero");
        }
    }

    // Convert fraction to double
    double toDouble() const
    {
        return static_cast<double>(numer) / denom;
    }
};

```
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Mini-lab</div>
  <div class="definition-shadebox">

Test Driver:

```
int main()
{
    try {
        // Test case 1
        Fraction f1(1, 2);
        std::cout << "1/2 = " << f1.toDouble() << std::endl;

        // Test case 2
        Fraction f2(2, 1);

<div id="answer-q4" class="answer-box">
<b>Answer:</b><div style="max-width:900px;margin:0 auto;border:1px solid rgba(255,255,255,0.15);border-radius:14px;background:rgba(255,255,255,0.06);box-shadow:0 10px 30px rgba(0,0,0,0.35);overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:#e8eef7;">

  <div style="padding:16px 18px;background:rgba(0,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.12);font-size:18px;font-weight:700;">

  <div style="height:360px;overflow-y:auto;padding:16px 18px;line-height:1.5;background:rgba(0,0,0,0.12);">
    
Fundamental activities + life cycle models in the modern SE process

1)Fundamental (life-cycle) activities described in the chapter include:

Problem analysis (understand the problem)

Requirements elicitation (determine exactly what the program/system must do)

Requirements specification (write what the program must do, including constraints)

High-level and low-level design (“big picture” → detailed design)

Implementation (coding)

Testing & verification (detect/fix errors; demonstrate correctness)

Delivery (release to customer/user)

Operation (actual use)

Maintenance (fix errors + add/modify functionality)


2)Life-cycle models highlighted:

Waterfall model: stages flow in sequence; each stage produces documented output feeding the next stage (useful when requirements are well understood and unlikely to change).

Spiral model: iterative, risk-driven cycles that repeat key activities (objectives, risk assessment, development/validation) as the product evolves.

The Topic also frames a software process as an integrated set of SE tools/techniques used by an organization to create systems, helping manage size/complexity and coordinate development.

Which core principles and design tools help engineers manage complex software system development? <button type="button" class="reveal-btn" data-answer="answer-q5">Show Answer</button>
<div id="answer-q5" class="answer-box">
<b>Answer:</b><div style="max-width:900px;margin:0 auto;border:1px solid rgba(255,255,255,0.15);border-radius:14px;background:rgba(255,255,255,0.06);box-shadow:0 10px 30px rgba(0,0,0,0.35);overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:#e8eef7;">

  <div style="padding:16px 18px;background:rgba(0,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.12);font-size:18px;font-weight:700;">
     Core principles + design tools for managing complexity
  </div>

  <div style="height:360px;overflow-y:auto;padding:16px 18px;line-height:1.5;background:rgba(0,0,0,0.12);">
    
1)Core principles (how engineers “tame” complexity)

Abstraction: model a complex system by keeping only the essential details needed for a particular viewpoint/purpose.

Information hiding (encapsulation idea): decompose into modules, and keep lower-level details hidden so higher-level design does not depend on details most likely to change. 

Modules with strong cohesion + loose coupling: a module should have a clear single purpose, “stick together well,” and hide internal decisions so other modules don’t depend on them. 

Stepwise refinement: conquer complexity by refining a solution progressively (e.g., top-down, bottom-up, functional decomposition). 

2) Design tools (how engineers represent and plan designs)

Top-down design and object-oriented design are explicitly listed as key methodologies in the “toolbox” discussion. 

CRC cards (Class–Responsibility–Collaboration) and UML are called out as tools/methods for describing and communicating designs.

  <div style="height:360px;overflow-y:auto;padding:16px 18px;line-height:1.5;background:rgba(0,0,0,0.12);">
    
1)How “high quality” is defined in this topic

The topi defines quality software as meeting these goals:

It works

It can be modified without excessive time/effort

It is reusable

It is completed on time and within budget

It also connects “works” to having clear requirements and a usable software specification (a detailed description of function/inputs/processing/outputs/special requirements that provides what’s needed to design and implement).

2)How developers achieve high quality throughout the life cycle

A. Start quality early with requirements + specifications

The chapter emphasizes writing a detailed specification (expected inputs/outputs, processing requirements, error conditions, assumptions, and sample I/O) so you can design and code correctly “from the start.” 

B. Use design principles that support change + reuse

Apply abstraction, information hiding, good module structure, and stepwise refinement so the system stays understandable and easier to modify/reuse over time. 

C. Build quality into the process with verification/testing practices

The chapter’s stated learning goals include practices that support quality across development: identifying error sources, specifying preconditions/postconditions, doing deskchecking, walkthroughs/inspections, and applying testing ideas (e.g., black-box and white-box testing, test drivers, integration strategies). 

D. Treat quality as continuous across phases (not only “at the end”)

The life-cycle activities explicitly include testing & verification, plus operation and maintenance, reflecting that quality continues after delivery as changes and fixes happen.
