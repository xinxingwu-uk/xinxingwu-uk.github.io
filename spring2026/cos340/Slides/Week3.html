<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Lists + ADT idea</div>
  <div class="definition-pro-Y-shadebox">
  <div style="width: 800px;"></div>

What is a List?

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

ADT views, unsorted vs sorted, keys

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

An Abstract Data Type (ADT) is a mathematical model for a data type that defines a set of values and a set of operations on those values. It is "abstract" because it is independent of any specific implementation in a programming language.

<hr>

The primary characteristic of an ADT is that its behavior is defined by its specification rather than its implementation. Users interact with the ADT only through its defined operations, without needing to know the underlying code or data structures used to store the data.
   </div>
</div>



<div class="question-container">
  <div class="question-title">Real life lists</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

- grocery items
- to-do items
- contacts
- playlist songs

**Programming lists do the <spanRED>same</spanRED> thing:** store many related items in <spanBYMix>one structure</spanBYMix>.
   </div>
</div>



<div class="question-container">
  <div class="question-title">What is a “List”</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

A **List** is a collection of elements arranged in a **linear** order.

- “linear”: you can talk about **next** and **previous**
- There is a **first** element and a **last** element
   </div>
</div>



<div class="question-container">
  <div class="question-title">Predecessor / Successor</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

In a list:

- Every element (except the first) has a **predecessor** (the one before it)
- Every element (except the last) has a **successor** (the one after it)

<hr style="border: none; border-top: 2px dashed green;">

Example:
`A  ->  B  ->  C`

- predecessor of `B` is `A`
- successor of `B` is `C`
   </div>
</div>



<div class="question-container">
  <div class="question-title">Length (size) of a list</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

**Length** = number of items currently stored.

<hr style="border:0;height:6px;border-radius:999px;background:linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:300% 100%;animation:rainbowLine 4s linear infinite;"><style>@keyframes rainbowLine{0%{background-position:0% 50%}100%{background-position:300% 50%}}</style>

- length can change over time:
  - you can <spanBYMix>insert</spanBYMix> items
  - you can <spanGREEN>delete</spanGREEN> items
   </div>
</div>



<div class="question-container">
  <div class="question-title">Example</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

Length = number of items currently in the backpack

- If you have 3 books and 1 laptop → length = 4

<div><hr class="wind-belt"><style>.wind-belt{border:0;height:14px;margin:18px 0;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.45),rgba(255,255,255,0) 45%),linear-gradient(90deg,#ff3b3b,#ffb13b,#fff23b,#3bff8f,#3bc8ff,#8a3bff,#ff3b3b);background-size:100% 100%,300% 100%;background-position:center,0% 50%;box-shadow:0 10px 20px rgba(0,0,0,.10),inset 0 2px 4px rgba(255,255,255,.35),inset 0 -2px 5px rgba(0,0,0,.18);display:block;transform-origin:10% 50%;animation:beltWave 2.8s ease-in-out infinite,rainbowSlide 5s linear infinite;}@keyframes beltWave{0%{transform:translateY(0px) rotate(-1.8deg) skewX(-3deg);filter:brightness(1);}25%{transform:translateY(2px) rotate(1.8deg) skewX(3deg);}50%{transform:translateY(0px) rotate(-1.2deg) skewX(-2deg);filter:brightness(1.06);}75%{transform:translateY(-2px) rotate(1.2deg) skewX(2deg);}100%{transform:translateY(0px) rotate(-1.8deg) skewX(-3deg);filter:brightness(1);}}@keyframes rainbowSlide{0%{background-position:center,0% 50%;}100%{background-position:center,300% 50%;}}</style></div>


Length changes over time:

- Insert items: You put in a water bottle → length becomes 5

- Delete items: You take out a book → length becomes 4


So the length is not fixed — it always reflects how many items are inside right now.
   </div>
</div>



<div class="question-container">
  <div class="question-title">Example</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

A to-do list

- Length = number of tasks on your list

- Add a task → length increases

- Complete/delete a task → length decreases

Exactly like an array or list in programming.

   </div>
</div>




<p class='titlep'>&nbsp;</p>

> Can we change the length of an array in C++?



<div class="question-container">
  <div class="question-title">Array in C++</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

A built-in C++ array like int a[10]; has a fixed size. You cannot change its length after it’s created.

   </div>
</div>



<div class="question-container">
  <div class="question-title">Array in C++</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

```
#include <iostream>
using namespace std;

int main() {
    int a[5] = {10, 20, 30, 40, 50};

    cout << "First element: " << a[0] << endl;
    cout << "Third element: " << a[2] << endl;

    return 0;
}

```
   </div>
</div>



<div class="question-container">
  <div class="question-title">Array alternatives in C++</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

- Use std::vector (recommended): it can grow/shrink.

```
#include <vector>
using namespace std;

int main() {
    vector<int> v = {1,2,3};
    v.push_back(4);   // grows
    v.pop_back();     // shrinks
    v.resize(10);     // change size to 10
}

```
   </div>
</div>



<div class="question-container">
  <div class="question-title">Array alternatives in C++</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

```
#include <vector>
#include<iostream>
using namespace std;

int main() {
    vector<int> v = { 1,2,3 };
    v.push_back(4);   // grows
    v.pop_back();     // shrinks
    v.resize(10);     // change size to 10

    for (int v_i: v) {
        std::cout << v_i << std::endl;
    }
}

```
   </div>
</div>



<div class="question-container">
  <div class="question-title">Array alternatives in C++</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

- Use dynamic memory (new[]) (older style): you can’t truly “resize” either—you must allocate a new bigger array and copy.

```
int* a = new int[3]{1,2,3};
int* b = new int[5];

for (int i = 0; i < 3; i++) b[i] = a[i];

delete[] a;  // free old
a = b;       // now "a" points to bigger array

```
   </div>
</div>



<div class="question-container">
  <div class="question-title">Unsorted Examples</div>

<div style="width: 800px;"></div>

<div class="question-container">

- A to-do list you jot quickly: you write tasks as they come to mind, not by priority.

<div class="question-container">
  <div class="question-title">Unsorted vs Sorted</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

- Unsorted list
	- items have **no required order**
	- you can put items anywhere (often “just put at the end”)

<hr style="border: none; border-top: 2px dashed green;">

- Sorted list
	- items must follow an order rule (e.g., smallest → largest)

<div class="question-container">
  <div class="question-title">Why build an ADT?</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

Because we want:

- a clean interface (<spanBYMix>what it can do</spanBYMix>)

- hidden details (<spanGREEN>how it is stored</spanGREEN>)

<hr style="border: none; border-top: 2px dashed green;">


This makes code easier to:

- reuse

- change

- test

- understand

   </div>
</div>



<div class="question-container">
  <div class="question-title">ADT = Abstract Data Type</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

An ADT describes:

- What operations exist

- What each operation should do

- (Often) rules like preconditions/postconditions

It does <spanRED>not</spanRED> require a specific storage method.
   </div>
</div>



<div class="question-container">
  <div class="question-title">3 perspectives</div>
  <div class="question-shadebox">
<div style="width: 800px;"></div>

We can view an ADT in 3 ways:

- Logical view (abstract)

- Implementation view (how stored in memory)

- Application view (how we use it in real tasks)
   </div>
</div>

  <div class="question-shadebox">

- What is the structure?

- What should they do?

Example: “A list stores items and supports insert/delete/find.”

</div>

<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Unsorted List ADT specification</div>
  <div class="definition-pro-Y-shadebox">
  
ADT specification (operations + pre/postconditions)  
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Design an Unsorted List ADT</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

We want a list that:

- holds items of some type ItemType

- has a maximum capacity MAX_ITEMS

- can:

	- become empty

	- insert

	- delete

	- search/get

	- tell length / full

	- allow iteration through all items
   </div>
</div>




<div class="definition-container">
  <div class="definition-title">Operation categories</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

We often group operations as:

- Constructors: create an instance

- Transformers: change the structure

- Observers: ask questions (don’t change it)

- Iterators: help you process all items one-by-one
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Which are transformers?</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Transformers change the list:

- MakeEmpty()

- PutItem(item)

- DeleteItem(item) (by key)
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Which are observers?</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Observers ask about the list:

- IsFull()

- GetLength()

- GetItem(item, found)

   </div>
</div>



<div class="definition-container">
  <div class="definition-title">iterator-support operations</div>
  <div class="definition-shadebox">

Which are iterator-support operations?

To loop through the list:

- ResetList()

- GetNextItem()
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">item parameter</div>
  <div class="definition-shadebox">

Why do we need an “item parameter” in GetItem/DeleteItem?

Because we search by key, and the caller provides an item containing that key.

Example:

- caller sets item.id = 7

- list searches for an item with id == 7
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Generic idea</div>
  <div class="definition-shadebox">

Treats list items as a general ItemType.

To compare items by key, we need a comparison function.

We’ll use a member function:

- CompareTo(other) → returns LESS / GREATER / EQUAL
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">enum</div>
  <div class="definition-shadebox">

Simple enum for comparison result

```
enum RelationType { LESS, GREATER, EQUAL };
```
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">CompareTo</div>
  <div class="definition-shadebox">

```
struct ItemType {
    int id;
    std::string name;

    RelationType CompareTo(const ItemType& other) const {
        if (id < other.id) return LESS;
        if (id > other.id) return GREATER;
        return EQUAL;
    }
};

```
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Why not just use < and == ?</div>
  <div class="definition-shadebox">

You can for basic types.

But for general “records” (struct/class), the ADT needs a consistent way to compare keys.

CompareTo makes that rule explicit.
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">MAX_ITEMS (capacity)</div>
  <div class="definition-shadebox">

We usually keep a constant maximum size for an array-based list.

Example:

```
const int MAX_ITEMS = 100;

```

Meaning:

- this list can store at most 100 items
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">contracts</div>
  <div class="definition-shadebox">

ADT specification includes “contracts”

For each operation, we often write:

- Precondition: what must be true before calling

- Postcondition: what will be true after it finishes

This helps:

- avoid misuse

- guide testing

- guide implementation
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Example contract: IsFull</div>
  <div class="definition-shadebox">

- Function: checks if list is full
- Precondition: list has been initialized
- Postcondition: returns true if no more space
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Example contract: PutItem</div>
  <div class="definition-shadebox">

Function: inserts an item
Preconditions (typical):

- list initialized

- list is not full

- item is not already in list (depending on design choice)

Postcondition:

- item is in the list
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Example contract: GetItem</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Function: search by key and return the matching item
Preconditions (typical):

- list initialized

- key field is initialized in the parameter item

Postconditions:

- if found, returns the actual stored item copy and sets found=true

- if not found, sets found=false and list unchanged
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Example contract: DeleteItem</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Function: remove an item by key
Preconditions (typical):

- list initialized

- key in parameter item initialized

- (often) an item with that key exists

Postcondition:

- no item remains with that key
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">Iterator concept</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

Instead of giving you the whole list at once, iterator-style gives:

- Reset to “start”

- Then each call gives “next item”

This supports writing loops like:

```
list.ResetList();
for (int i = 0; i < list.GetLength(); i++) {
    ItemType x = list.GetNextItem();
    // use x
}

```
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">current position</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

To do iteration, the list stores a “current position” internally.

- ResetList() sets it to the beginning

- GetNextItem() moves forward and returns an item
   </div>
</div>



<div class="definition-com-container">
  <div class="definition-com-title">Question</div>
  <div class="definition-com-shadebox">
<div style="width: 800px;"></div>

Which operation should change length?

- A) GetLength()
- B) PutItem(item)
- C) IsFull()
- D) GetItem(item, found)  <button type="button" class="reveal-btn" data-answer="answer-q4">Show Answer</button>
<div id="answer-q4" class="answer-box">
<b>Answer:</b>B) PutItem(item)
</div>

   </div>
</div>

</textarea></section>

</section>

<div class="definition-container">
  <div class="definition-title">Implementation</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

We store list elements in an array (Implementation strategy: array-based):

- info[MAX_ITEMS]

- length tells how many are currently used

- currentPos supports iteration
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">unused space</div>
  <div class="definition-shadebox">
<div style="width: 800px;"></div>

If length = 4, items are stored in:

- info[0], info[1], info[2], info[3]

The rest (info[4]...) are “unused space”.
   </div>
</div>



<div id="shadebox">

### Example code - Class skeleton

<hr style="border: none; border-top: 1.5px solid cyan;">

```
class UnsortedList {
private:
    ItemType info[MAX_ITEMS];
    int length;
    int currentPos;

public:
    UnsortedList();              // constructor
    void MakeEmpty();
    bool IsFull() const;
    int GetLength() const;

    void PutItem(const ItemType& item);
    void GetItem(ItemType& item, bool& found) const;
    void DeleteItem(const ItemType& item);

    void ResetList();
    ItemType GetNextItem();
};

```
</div>




<div class="definition-container">
  <div class="definition-title">Constructor (start empty)</div>
  <div class="definition-shadebox">
<div  style="font-size: 1.6em; line-height: 1.5;">


```
UnsortedList::UnsortedList() {
    length = 0;
    currentPos = -1;   // means “before the first element”
}

```
</div>
   </div>
</div>

- Beginner note: we use -1 so the first GetNextItem() moves to index 0.



<div class="definition-container">
  <div class="definition-title">MakeEmpty()</div>
  <div class="definition-shadebox">
<div  style="font-size: 1.6em; line-height: 1.5;">

```
void UnsortedList::MakeEmpty() {
    length = 0;
    currentPos = -1;
}

```
   </div>
   </div>
</div>

- We don’t need to erase the array.
- We just say: “there are 0 valid items now.”



<div class="definition-container">
  <div class="definition-title">IsFull()</div>
  <div class="definition-shadebox">
<div  style="font-size: 1.6em; line-height: 1.5;">

```
bool UnsortedList::IsFull() const {
    return (length == MAX_ITEMS);
}

```
   </div>
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">GetLength()</div>
  <div class="definition-shadebox">
<div  style="font-size: 1.6em; line-height: 1.5;">

```
int UnsortedList::GetLength() const {
    return length;
}

```
   </div>
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">PutItem - insert at end</div>
  <div class="definition-shadebox">
<div  style="font-size: 1.6em; line-height: 1.5;">

```
void UnsortedList::PutItem(const ItemType& item) {
    info[length] = item;  // place at the first unused slot
    length++;             // list grows by 1
}

```
   </div>
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">GetItem (linear search)</div>
  <div class="definition-shadebox">

We scan from 0 to length-1.

<div  style="font-size: 1.6em; line-height: 1.5;">

```
void UnsortedList::GetItem(ItemType& item, bool& found) const {
    found = false;

    for (int i = 0; i < length; i++) {
        if (info[i].CompareTo(item) == EQUAL) {
            item = info[i];      // return the stored item (copy)
            found = true;
            return;
        }
    }
}

```
   </div>
   </div>
</div>



<div class="question-container">
  <div class="question-title">DeleteItem</div>
  <div class="question-shadebox">
Because the list is unsorted, we don’t care about order.

Trick:

- find index of item to delete

- move last item into that index

- reduce length by 1
   </div>
</div>



<div class="definition-container">
  <div class="definition-title">DeleteItem</div>
  <div class="definition-shadebox">

```
void UnsortedList::DeleteItem(const ItemType& item) {
    int location = 0;

    while (location < length) {
        if (info[location].CompareTo(item) == EQUAL) {
            // overwrite with last element
            info[location] = info[length - 1];
            length--;
            return;
        }
        location++;
    }
}

```
   </div>
</div>

- Precondition (typical): item exists. (If not, the function does nothing here.)



<div class="definition-container">
  <div class="definition-title">ResetList()</div>
  <div class="definition-shadebox">

```
void UnsortedList::ResetList() {
    currentPos = -1;
}

```
   </div>
</div>

- This does not remove all elements. It only resets an internal position/index, not the list itself.



<div class="definition-container">
  <div class="definition-title">GetNextItem()</div>
  <div class="definition-shadebox">
<div  style="font-size: 1.6em; line-height: 1.5;">

```
ItemType UnsortedList::GetNextItem() {
    currentPos++;
    return info[currentPos];
}

```
   </div>
   </div>
</div>

- Preconditions: list initialized; currentPos is not already at the end



<div class="definition-container">
  <div class="definition-title">Printing the list</div>
  <div class="definition-shadebox">

Printing the list - Use iterator operations:

<div  style="font-size: 1.6em; line-height: 1.5;">

```
void PrintList(UnsortedList& list) {
    list.ResetList();
    int n = list.GetLength();

    for (int i = 0; i < n; i++) {
        ItemType x = list.GetNextItem();
        std::cout << x.id << " - " << x.name << "\n";
    }
}

```
   </div>
   </div>
</div>

#include <fstream>

void CreateListFromFile(const std::string& filename, UnsortedList& list) {
    std::ifstream fin(filename);
    list.MakeEmpty();

    ItemType item;
    while (fin >> item.id >> item.name) {
        if (list.IsFull()) break;
        list.PutItem(item);
    }
}

<div id="shadebox">

### Example code

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <fstream>
#include <string>
using namespace std;

const int MAX_ITEMS = 100;
enum RelationType { LESS, GREATER, EQUAL };

struct ItemType {
    int id;
    string name;

    RelationType CompareTo(const ItemType& other) const {
        if (id < other.id) return LESS;
        if (id > other.id) return GREATER;
        return EQUAL;
    }
};

class UnsortedList {
private:
    ItemType info[MAX_ITEMS];
    int length;
    int currentPos;

public:
    UnsortedList() {
        length = 0;
        currentPos = -1;
    }

    void MakeEmpty() {
        length = 0;
        currentPos = -1;
    }

    bool IsFull() const {
        return (length == MAX_ITEMS);
    }

    int GetLength() const {
        return length;
    }

    void PutItem(const ItemType& item) {
        info[length] = item;
        length++;
    }

    void GetItem(ItemType& item, bool& found) const {
        found = false;
        for (int i = 0; i < length; i++) {
            if (info[i].CompareTo(item) == EQUAL) {
                item = info[i];
                found = true;
                return;
            }
        }
    }

    void DeleteItem(const ItemType& item) {
        int location = 0;
        while (location < length) {
            if (info[location].CompareTo(item) == EQUAL) {
                info[location] = info[length - 1];
                length--;
                return;
            }
            location++;
        }
    }

    void ResetList() {
        currentPos = -1;
    }

    ItemType GetNextItem() {
        currentPos++;
        return info[currentPos];
    }
};

void PrintList(UnsortedList& list) {
    list.ResetList();
    int n = list.GetLength();
    for (int i = 0; i < n; i++) {
        ItemType x = list.GetNextItem();
        cout << x.id << " - " << x.name << "\n";
    }
}

int main() {
    UnsortedList list;

    // Insert items
    list.PutItem({2, "Bob"});
    list.PutItem({1, "Alice"});
    list.PutItem({3, "Cindy"});

    cout << "Initial list:\n";
    PrintList(list);

    // Search item by key
    ItemType query;
    query.id = 1;  // key we want
    bool found;
    list.GetItem(query, found);

    if (found) cout << "\nFound: " << query.id << " " << query.name << "\n";
    else cout << "\nNot found.\n";

    // Delete item by key
    ItemType del;
    del.id = 2;
    list.DeleteItem(del);

    cout << "\nAfter deleting id=2:\n";
    PrintList(list);

    return 0;
}

```

</div>

<div class="definition-container">
  <div class="definition-title">Big-O</div>
  <div class="definition-shadebox">

Array-based unsorted list:

PutItem: $\mathcal{O}(1)$ (insert at end)

GetItem: $\mathcal{O}(n)$ (linear search)

DeleteItem: $\mathcal{O}(n)$ (find) + $\mathcal{O}(1)$ (swap) → $\mathcal{O}(n)$)

IsFull, GetLength: $\mathcal{O}(1)$

iterating all items: $\mathcal{O}(n)$
   </div>
</div>

#include <iostream>
#include <fstream>
#include <string>
using namespace std;

const int MAX_ITEMS = 100;

enum RelationType { LESS, GREATER, EQUAL };

struct Student {
    int id;         // key
    string name;

    RelationType CompareTo(const Student& other) const {
        if (id < other.id) return LESS;
        if (id > other.id) return GREATER;
        return EQUAL;
    }
};

class UnsortedList {
private:
    Student info[MAX_ITEMS];
    int length;
    int currentPos;

public:
    UnsortedList() {
        length = 0;
        currentPos = -1;
    }

    void MakeEmpty() {
        length = 0;
        currentPos = -1;
    }

    bool IsFull() const {
        return length == MAX_ITEMS;
    }

    int GetLength() const {
        return length;
    }

    void PutItem(const Student& item) {
        info[length] = item;
        length++;
    }

    void GetItem(Student& item, bool& found) const {
        found = false;
        for (int i = 0; i < length; i++) {
            if (info[i].CompareTo(item) == EQUAL) {
                item = info[i];
                found = true;
                return;
            }
        }
    }

    void DeleteItem(const Student& item) {
        int location = 0;
        while (location < length) {
            if (info[location].CompareTo(item) == EQUAL) {
                info[location] = info[length - 1]; // swap-with-last trick
                length--;
                return;
            }
            location++;
        }
    }

    void ResetList() {
        currentPos = -1;
    }

    Student GetNextItem() {
        currentPos++;
        return info[currentPos];
    }
};

void PrintRoster(UnsortedList& roster) {
    int n = roster.GetLength();
    if (n == 0) {
        cout << "(Roster is empty)\n";
        return;
    }

    roster.ResetList();
    for (int i = 0; i < n; i++) {
        Student s = roster.GetNextItem();
        cout << s.id << " - " << s.name << "\n";
    }
}

bool ExistsById(UnsortedList& roster, int id) {
    Student query;
    query.id = id;
    bool found;
    roster.GetItem(query, found);
    return found;
}

void AddStudent(UnsortedList& roster) {
    if (roster.IsFull()) {
        cout << "Cannot add: roster is FULL.\n";
        return;
    }

    Student s;
    cout << "Enter id: ";
    cin >> s.id;
    cout << "Enter name (one word): ";
    cin >> s.name;

    if (ExistsById(roster, s.id)) {
        cout << "Cannot add: id already exists.\n";
        return;
    }

    roster.PutItem(s);
    cout << "Added.\n";
}

void FindStudent(UnsortedList& roster) {
    int id;
    cout << "Enter id to find: ";
    cin >> id;

    Student query;
    query.id = id;
    bool found;
    roster.GetItem(query, found);

    if (found) {
        cout << "Found: " << query.id << " - " << query.name << "\n";
    } else {
        cout << "Not found.\n";
    }
}

void DeleteStudent(UnsortedList& roster) {
    int id;
    cout << "Enter id to delete: ";
    cin >> id;

    Student query;
    query.id = id;
    bool found;
    roster.GetItem(query, found);

    if (!found) {
        cout << "Not found. Nothing deleted.\n";
        return;
    }

    roster.DeleteItem(query);
    cout << "Deleted.\n";
}

void SaveToFile(UnsortedList& roster, const string& filename) {
    ofstream fout(filename);
    if (!fout) {
        cout << "Could not open file for writing.\n";
        return;
    }

    int n = roster.GetLength();
    roster.ResetList();
    for (int i = 0; i < n; i++) {
        Student s = roster.GetNextItem();
        fout << s.id << " " << s.name << "\n";
    }

    cout << "Saved to " << filename << "\n";
}

void LoadFromFile(UnsortedList& roster, const string& filename) {
    ifstream fin(filename);
    if (!fin) {
        cout << "Could not open file for reading.\n";
        return;
    }

    roster.MakeEmpty();

    Student s;
    while (fin >> s.id >> s.name) {
        if (roster.IsFull()) {
            cout << "Stopped: roster reached MAX_ITEMS.\n";
            break;
        }
        if (!ExistsById(roster, s.id)) {
            roster.PutItem(s);
        }
    }

    cout << "Loaded from " << filename << "\n";
}

void ShowMenu() {
    cout << "\n--- Student Roster Manager ---\n";
    cout << "1) Add student\n";
    cout << "2) Find student\n";
    cout << "3) Delete student\n";
    cout << "4) Print all\n";
    cout << "5) Load from file\n";
    cout << "6) Save to file\n";
    cout << "0) Exit\n";
    cout << "Choose: ";
}

int main() {
    UnsortedList roster;
    const string filename = "students.txt";

    int choice;
    do {
        ShowMenu();
        cin >> choice;

        if (choice == 1) AddStudent(roster);
        else if (choice == 2) FindStudent(roster);
        else if (choice == 3) DeleteStudent(roster);
        else if (choice == 4) PrintRoster(roster);
        else if (choice == 5) LoadFromFile(roster, filename);
        else if (choice == 6) SaveToFile(roster, filename);
        else if (choice == 0) cout << "Bye!\n";
        else cout << "Invalid choice.\n";

    } while (choice != 0);

    return 0;
}

```
#include <iostream>
#include <string>
using namespace std;

const int MAX_ITEMS = 100;

enum RelationType { LESS, GREATER, EQUAL };

struct Book {
    int id;          // key
    string title;
    int copies;

    RelationType CompareTo(const Book& other) const {
        if (id < other.id) return LESS;
        if (id > other.id) return GREATER;
        return EQUAL;
    }
};

class UnsortedList {
private:
    Book info[MAX_ITEMS];
    int length;
    int currentPos;

public:
    UnsortedList() {
        length = 0;
        currentPos = -1;
    }

    void MakeEmpty() {
        length = 0;
        currentPos = -1;
    }

    bool IsFull() const {
        return (length == MAX_ITEMS);
    }

    int GetLength() const {
        return length;
    }

    void PutItem(const Book& item) {
        info[length] = item;
        length++;
    }

    void GetItem(Book& item, bool& found) const {
        found = false;
        for (int i = 0; i < length; i++) {
            if (info[i].CompareTo(item) == EQUAL) {
                item = info[i];
                found = true;
                return;
            }
        }
    }

    void DeleteItem(const Book& item) {
        int location = 0;
        while (location < length) {
            if (info[location].CompareTo(item) == EQUAL) {
                info[location] = info[length - 1]; // swap with last
                length--;
                return;
            }
            location++;
        }
    }

    void ResetList() {
        currentPos = -1;
    }

    Book GetNextItem() {
        currentPos++;
        return info[currentPos];
    }
};

// Helper: check if a book id exists
bool Exists(UnsortedList& list, int id) {
    Book q;
    q.id = id;
    bool found;
    list.GetItem(q, found);
    return found;
}

void PrintAll(UnsortedList& list) {
    int n = list.GetLength();
    if (n == 0) {
        cout << "(No books)\n";
        return;
    }

    list.ResetList();
    for (int i = 0; i < n; i++) {
        Book b = list.GetNextItem();
        cout << b.id << " - " << b.title << " - copies: " << b.copies << "\n";
    }
}

void AddBook(UnsortedList& list) {
    if (list.IsFull()) {
        cout << "Cannot add: list is FULL.\n";
        return;
    }

    Book b;
    cout << "Enter id: ";
    cin >> b.id;

    if (Exists(list, b.id)) {
        cout << "Cannot add: id already exists.\n";
        return;
    }

    cout << "Enter title (one word): ";
    cin >> b.title;
    cout << "Enter copies: ";
    cin >> b.copies;

    if (b.copies < 0) b.copies = 0;

    list.PutItem(b);
    cout << "Added.\n";
}

void FindBook(UnsortedList& list) {
    int id;
    cout << "Enter id to find: ";
    cin >> id;

    Book q;
    q.id = id;
    bool found;
    list.GetItem(q, found);

    if (found) {
        cout << "Found: " << q.id << " - " << q.title << " - copies: " << q.copies << "\n";
    } else {
        cout << "Not found.\n";
    }
}

// Borrow: copies-- if possible
void BorrowBook(UnsortedList& list) {
    int id;
    cout << "Enter id to borrow: ";
    cin >> id;

    Book q;
    q.id = id;
    bool found;
    list.GetItem(q, found);

    if (!found) {
        cout << "Not found.\n";
        return;
    }

    if (q.copies == 0) {
        cout << "No copies available.\n";
        return;
    }

    // We cannot directly modify inside the list with GetItem alone,
    // so we delete then re-insert the updated item (common beginner workaround).
    list.DeleteItem(q);
    q.copies--;
    list.PutItem(q);

    cout << "Borrowed. Now copies = " << q.copies << "\n";
}

// Return: copies++
void ReturnBook(UnsortedList& list) {
    int id;
    cout << "Enter id to return: ";
    cin >> id;

    Book q;
    q.id = id;
    bool found;
    list.GetItem(q, found);

    if (!found) {
        cout << "Not found.\n";
        return;
    }

    list.DeleteItem(q);
    q.copies++;
    list.PutItem(q);

    cout << "Returned. Now copies = " << q.copies << "\n";
}

void DeleteBook(UnsortedList& list) {
    int id;
    cout << "Enter id to delete: ";
    cin >> id;

    Book q;
    q.id = id;
    bool found;
    list.GetItem(q, found);

    if (!found) {
        cout << "Not found. Nothing deleted.\n";
        return;
    }

    list.DeleteItem(q);
    cout << "Deleted.\n";
}

void ShowMenu() {
    cout << "\n--- Library Book Tracker ---\n";
    cout << "1) Add book\n";
    cout << "2) Find book\n";
    cout << "3) Borrow book\n";
    cout << "4) Return book\n";
    cout << "5) Delete book\n";
    cout << "6) Print all books\n";
    cout << "7) Clear list\n";
    cout << "0) Exit\n";
    cout << "Choose: ";
}

int main() {
    UnsortedList books;
    int choice;

    do {
        ShowMenu();
        cin >> choice;

        if (choice == 1) AddBook(books);
        else if (choice == 2) FindBook(books);
        else if (choice == 3) BorrowBook(books);
        else if (choice == 4) ReturnBook(books);
        else if (choice == 5) DeleteBook(books);
        else if (choice == 6) PrintAll(books);
        else if (choice == 7) { books.MakeEmpty(); cout << "List cleared.\n"; }
        else if (choice == 0) cout << "Bye!\n";
        else cout << "Invalid choice.\n";

    } while (choice != 0);

    return 0;
}
