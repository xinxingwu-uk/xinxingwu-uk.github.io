# <p class="hover-underline-animation">Hash tables and Data structures </p><br>




## Hashing
- A hash table is a <spanBYMix>data structure</spanBYMix> that is used to <spanRED>store keys/value pairs</spanRED>. It uses a <spanGREEN>hash function</spanGREEN> to compute an index into an array in which an element will be inserted or searched. By using a good hash function, hashing can work well.

[Basics of Hash Tables](https://www.hackerearth.com/practice/data-structures/hash-tables/basics-of-hash-tables/tutorial/#:~:text=A%20hash%20table%20is%20a,function%2C%20hashing%20can%20work%20well.)




## Hashing
> Hashing is the process of taking a password as input and somehow converting it to a so-called hash or hash value.





## Hashing
- A Function that translates keys to array indices is known as a hash function. The keys should be evenly distributed across the array via a decent hash function to reduce collisions and ensure quick lookup speeds.

[Hash Table Data Structure](https://www.geeksforgeeks.org/hash-table-data-structure/)

> Leak information

- Information Leakage / Password Hash Disclosure
Password hash disclosure is an information leakage vulnerability, which occurs when an application discloses the hashed form of a password, usually in plain text, making it easier for attackers to brute force guess the plain text password.

[Information Leakage / Password Hash Disclosure](https://turingsecure.com/knowledge-base/issues/password-hash-disclosure/#:~:text=Information%20Leakage%20%2F%20Password%20Hash%20Disclosure&text=Password%20hash%20disclosure%20is%20an,guess%20the%20plain%20text%20password.)





> How do hackers find hashed passwords?

- Once the attacker gains access to the compromised account with the stolen credentials, they may use various techniques to extract password hashes. They may scrape the active memory of the compromised system or explore system files and configuration settings to find valid password hashes.

[Pass-the-hash attacks: Examples and prevention](https://nordvpn.com/blog/pass-the-hash/#:~:text=Once%20the%20attacker%20gains%20access,to%20find%20valid%20password%20hashes.)




## An example

- Programs run in RAM (temporary memory).

- Security tools or attackers can use memory dump tools (such as, Windows Task Manager / Process Explorer, Volatility Framework, etc.) to copy what is in RAM.

- The copied data can then be searched for password hashes or secrets.

- Operating systems may have system calls or debugging tools that allow access to process memory.




> That is why modern systems use encryption and memory protection to reduce this risk.

## RSA

- RSA is a factoring-based algorithm, and computing power grows constantly, and people all over are working on <handwriting>breaking RSA factorization</handwriting>

<hr>

###  The idea of RSA is based on the fact that it is <spanBYMix>difficult to factorize a large integer</spanBYMix>




## RSA

- The public key consists of two numbers where one number is a multiplication of two large prime numbers. 

- Private key is also derived from the same two prime numbers. 

> So if somebody can factorize the large number, the private key is compromised. 




## RSA

> Therefore encryption strength totally lies on the <spanBYMix>key size</spanBYMix> and if we double or triple the key size, the strength of encryption increases exponentially. 

- RSA keys can be typically 1024 or 2048 bits long, but experts believe that 1024-bit keys could be broken in the near future.



> Step 1: Generate the RSA modulus

- Begins with selection of two <spanREd>prime</spanREd> numbers namely $p$ and $q$, and then calculating their product $n$.

$$n=p*q$$

- Where $n$ is called <handwriting>the modulus for encryption and decryption</handwriting>




> Step 2: Derived Number ($e$)

- Choose a number $e$: greater than $1$ and less than $n$, such that $e$ is relatively prime to $(p - 1)(q -1)$ (i.e., $e$ and $(p - 1)(q - 1)$ have <spanBYMix>no common</spanBYMix> factor except 1)

	- Mathematically, choose $e$ such that $1<e<\phi(n)$, $e$ and $\phi(n)$ are coprime, where $\phi(n)=(p-1)(q-1)$.




> Step 3: Public key

- If $n = p*q$, then the public key is $<e, n>$. 

<hr>

<div align="left">

Encryption Formula: A plaintext MSG $m$ is encrypted by public key $<e, n>$.

$$C = m^e {\rm{mod}}\ n$$

- $C$ is ciphertext, $m$ must be less than $n$. A larger message ($>n$) is treated as a concatenation of messages, each of which is encrypted separately.

</div>




> Step 4: Private Key

- Compute a value for $d$ such that $(d * e)\ \rm{mod}\ \phi(n) = 1$. The <spanBYMix>private key</spanBYMix> is <d, n>. 
 
<hr>

<div align="left">

Decryption Formula: A ciphertext message $C$ is decrypted using private key $<d, n>$. To calculate plain text m from the ciphertext $C$ following formula is used to get plain text $m$.

$$m=C^d\ {\rm{mod}}\ n$$

</div>

Select two large prime numbers, $p$, and $q$. $p = 7$, $q = 11$.

$$n=p*q=77$$

</div>





## RSA - example

> Step 2: Derived Number ($e$)

<div align="left">

$$\phi(n)=(p-1)(q-1)=(7-1)(11-1)=60$$


Let us now choose relative prime $e$ of 60 as 7.

</div>




## RSA - example

> Step 3: Public key

<div align="left">

Thus the public key is $<e, n> = (7, 77)$.  A plaintext message $m=9$.

$$C = m^e {\rm{mod}}\ n= 9^7 {\rm{mod}}\ 77=37$$

</div>





## RSA - example

> Step 4: Private Key

$(d * e) \rm{mod}\ \phi(n) = 1$, so $(d * 7) \rm{mod}\ 60 = 1$, which gives $d = 43$. The private key is $<d, n> = (43, 77)$.

<hr>

<div align="left">

$$m=C^d {\rm{mod}}n=37^{43} {\rm{mod}}\ 77$$

So, we get $m=9$.

In this example, Plain text = 9 and the ciphertext = 37.

import random
import math

# A set will be the collection of prime numbers,
# where we can select random primes p and q
prime = set()

public_key = None
private_key = None
n = None

# We will run the function only once to fill the set of
# prime numbers
def primefiller():
	# Method used to fill the primes set is Sieve of
	# Eratosthenes (a method to collect prime numbers)
	seive = [True] * 250
	seive[0] = False
	seive[1] = False
	for i in range(2, 250):
		for j in range(i * 2, 250, i):
			seive[j] = False

	# Filling the prime numbers
	for i in range(len(seive)):
		if seive[i]:
			prime.add(i)


# Picking a random prime number and erasing that prime
# number from list because p!=q
def pickrandomprime():
	global prime
	k = random.randint(0, len(prime) - 1)
	it = iter(prime)
	for _ in range(k):
		next(it)

	ret = next(it)
	prime.remove(ret)
	return ret


def setkeys():
	global public_key, private_key, n
	prime1 = pickrandomprime() # First prime number
	prime2 = pickrandomprime() # Second prime number

	n = prime1 * prime2
	fi = (prime1 - 1) * (prime2 - 1)

	e = 2
	while True:
		if math.gcd(e, fi) == 1:
			break
		e += 1

	# d = (k*Φ(n) + 1) / e for some integer k
	public_key = e

	d = 2
	while True:
		if (d * e) % fi == 1:
			break
		d += 1

	private_key = d


# To encrypt the given number
def encrypt(message):
	global public_key, n
	e = public_key
	encrypted_text = 1
	while e > 0:
		encrypted_text *= message
		encrypted_text %= n
		e -= 1
	return encrypted_text


# To decrypt the given number
def decrypt(encrypted_text):
	global private_key, n
	d = private_key
	decrypted = 1
	while d > 0:
		decrypted *= encrypted_text
		decrypted %= n
		d -= 1
	return decrypted


# First converting each character to its ASCII value and
# then encoding it then decoding the number to get the
# ASCII and converting it to character
def encoder(message):
	encoded = []
	# Calling the encrypting function in encoding function
	for letter in message:
		encoded.append(encrypt(ord(letter)))
	return encoded


def decoder(encoded):
	s = ''
	# Calling the decrypting function decoding function
	for num in encoded:
		s += chr(decrypt(num))
	return s


if __name__ == '__main__':
	primefiller()
	setkeys()
	message = "Test Message"
	# Uncomment below for manual input

	print("Initial message:")

	print("\n\nThe encoded message(encrypted by public key)\n")
	print(''.join(str(p) for p in coded))
	print("\n\nThe decoded message(decrypted by public key)\n")
	print(''.join(str(p) for p in decoder(coded)))

<section data-markdown id="Encryption" class="center"><textarea data-template>
# Encryption in Transit
</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

# Hash data, Encrypt data, Decrypt data. 👍





<p class='titlep'>&nbsp;</p>

## <p class="hover-underline-animation">So how can we use these building blocks to solve problems? - Encryption in transit</p>




## Encryption in Transit

- Data be encrypted whenever it's traveling from point A to point B.  Whether that point B is Amazon.com, Gmail.com, WhatsApp, or any other service that we're communicating with.





## Encryption in Transit

- We ideally want no one in between us-- some machine in the middle, to be able to get at that same data.

<img src="./images/et1.png" alt="drawing" width="600"/>





## Encryption in Transit

- Security does not really work through transitivity

- A third party like Gmail. Eve is Gmail.

	- Alice has a secure connection to Gmail 

	- Bob has a secure connection to Gmail

- But that does not mean necessarily that Alice has a secure connection to Bob.





## Encryption in Transit

- The data is only encrypted while in transit from A to E and from B to E

- That doesn't mean that Eve, or Gmail in this story, can't be reading all of Alice's and Bob's emails.

- There's nothing technically probably stopping them from reading anything and everything.





## Encryption in Transit

- But technically speaking, just because Alice has a secure connection to Gmail and Bob has a secure connection to Gmail, that doesn't mean that their communications will be encrypted entirely between A and B. <div class="popup" onclick="myFunction13()"><p class="blink" style="font-size:24px;"><spanBYMix>Example</spanBYMix></p>
  <span class="popuptext" id="myPopup13" STYLE="font-size:22px">Zoom, when it comes to video conferencing, you might have an encrypted connection to Zoom, I might have an encrypted connection to Zoom. That does not necessarily mean that Zoom couldn't listen and watch everything that we're saying while video conferencing. So encryption in transit is good in that it at least keeps random people out of the picture because they don't have access to these encrypted channels.
  </span>
</div>




<p class='titlep'>&nbsp;</p>

# <p class="hover-underline-animation">What is a stronger alternative?</p>





<p class='titlep'>&nbsp;</p>

# <p class="hover-underline-animation">An end-to-end encryption</p>





## Encryption in Transit


- End-to-end encryption (E2EE) is a type of messaging that keeps messages private from everyone, including the messaging service. When E2EE is used, a message only appears in decrypted form for the person sending the message and the person receiving the message.

[What is end-to-end encryption (E2EE)?](https://www.cloudflare.com/learning/privacy/what-is-end-to-end-encryption/#:~:text=End%2Dto%2Dend%20encryption%20(E2EE)%20is%20a%20type,the%20person%20receiving%20the%20message.)





## Encryption in Transit

- This is a stronger guarantee whereby you can trust that Alice's connection to Bob is secure

	- Machines in the middle,

	- Companies in the middle, 

	- Eavesdroppers in the middle




## Encryption in Transit

- If you use encryption properly end-to-end, you can ensure that the only thing Eve or Google or Zoom can see is just your ciphertext.

- End-to-end encryption isn't necessarily in most company's best interest.





<p class='titlep'>&nbsp;</p>

# <p class="hover-underline-animation">Why?</p>





## Encryption in Transit

- Companies like Gmail tend to presumably mine our data, whether it's for advertising purposes or otherwise.

- Sometimes in companies' interest to have access to your data to keep it secure on their servers.





## Encryption in Transit

- iMessage and FaceTime for Apple users and WhatsApp internationally is known in particular for offering end-to-end encryption. If implemented truthfully and technically correctly, should guarantee that even though your messages might be going through WhatsApp servers, no employee at WhatsApp can actually see your messages because it's encrypted all the way from A to B

## Encryption at Rest

- Some operating systems nowadays support <spanBYMix>full-disk encryption</spanBYMix>

- Full-disk encryption (FDE) is a security method for protecting sensitive data at the hardware level by encrypting all data on a disk drive. FDE automatically encrypts data and operating systems (OSes) to prevent unauthorized access.

- The disks are only readable with the appropriate encryption key.




## Encryption at Rest

- If you enable a feature called full-disk encryption, which is actually a specific incarnation of an idea known as encryption at rest.




## Encryption at Rest

- Encryption in transit refers to your data going back and forth from point A to point B. Encryption at rest means it's just sitting there on your device, in your pocket, or on your lap or on your desktop, ...

- Only when you log in with your password or maybe your fingerprint or your face should that data be decrypted automatically, ...




<p class='titlep'>&nbsp;</p>

## <p class="hover-underline-animation">Advantages?</p>




## Encryption at Rest

- If your device gets stolen, not going to be able to get any of your data.

- They can maybe delete all of your data and they can and sell your computer, they can use your computer, but they probably, if you're practicing best practices, don't have access to the data that's on the system.

- It's completely encrypted at rest and they don't know your password, they don't have your fingerprint, they don't have your face, they should not be able to decrypt that data.





## Encryption at Rest

- Microsoft includes a full disk encryption feature built into Windows called BitLocker. Windows 10 Enterprise

<img src="./images/fulldisk1.png" alt="drawing" width="700"/>



## Encryption at Rest

- BitLocker is a full-disk encryption feature in certain Windows versions (Pro, Enterprise, Education) that protects your data by encrypting the entire hard drive or removable media, preventing unauthorized access if your device is lost or stolen. 

<hr>

- It uses a Trusted Platform Module (TPM) to manage encryption keys, ensuring only authorized users can unlock the drive upon system boot. If the system can't authenticate, a unique recovery key is needed to access the data.

import pennylane as qml
from jax import numpy as np
import jax

# Initialize the 'lightning.qubit' device provided by PennyLane.
dev1 = qml.device("lightning.qubit", wires=1)
# Notes: This creates a quantum simulator device called "lightning.qubit" (a fast C++ backend for simulating qubits). wires=1 means we are simulating one qubit.


# Convert it into a QNode running on device dev1 by applying the qnode()
@qml.qnode(dev1)

# Define the quantum function that will be evaluated in the QNode. A QNode is a quantum function wrapped so it can run on a chosen device.
def circuit(params):
    qml.RX(params[0], wires=0)
    qml.RY(params[1], wires=0)
    return qml.expval(qml.PauliZ(0))
# Note: So the circuit applies two rotations and then asks: what is the average Z measurement outcome?


#circuit() quantum function is now a QNode, which will run on device dev1 every time it is evaluated. 
#To evaluate, call the function with some appropriate numerical inputs. Runs the quantum circuit with those angles.
params = np.array([0.54, 0.12])
print(circuit(params))
