import time
import itertools
from multiprocessing import Pool, cpu_count

def generate_combinations():
    combinations = itertools.product(range(10), repeat=4)
    return combinations

def print_combination(combination):
    password_str = ''.join(map(str, combination))
    print(password_str)

if __name__ == "__main__":
    start = time.time()
    
    combinations = generate_combinations()
    
    pool = Pool(cpu_count())
    pool.map(print_combination, combinations)
    pool.close()
    pool.join()
    
    end = time.time()
    print("The execution time :",(end-start) * 10**3, "ms")


```

## <p class="hover-underline-animation"> Any better ideas?</p><br>



> Change passwprds frequently

- Change passwprds every month, three months, ...

- You might exert the minimal amount of energy to change the password so that you meet the company's requirements so that it is not too hard for you to remember what the new password is. 

- If the information of your past passwords leaks out ... More vulnerable to brute force attacks

- Keep forgetting passwords ... What my next password is




<img src="./images/bruteforce1.gif" alt="drawing" height="600"/>




> Rate-limiting mechanism

- Limits the numer of failed authentication attempts that can be made.

- It turns out you can lock yourself out of your own phone.

- Apple and Google and others, is that if after 10 times you still haven't inputted your password correctly, it's probably a higher probability that you are not you

- It increases the cost of this attack: slowing down

## <p class="hover-underline-animation">What are some other defenses to make things better?</p><br>




## Single Sign On (SSO)

- SSO is an authentication scheme that allows a user to log in with a single ID to any of several related, yet independent, software systems.

	<div class="popup" onclick="myFunction4()"><p class="blink" style="font-size:24px;"><spanBYMix>Example</spanBYMix></p>
  <span class="popuptext" id="myPopup4" STYLE="font-size:25px">SSO refers to an ability to sign up for, to log in to one's website using an account that you already have on another website.
  </span>
</div>




<p class='titlep'>&nbsp;</p>
<p class='titlep'>&nbsp;</p>

## <p class="hover-underline-animation">What is actually happening here?</p><br>





## Single Sign On (SSO)

- When you click Log in with <spanRED>Google</spanRED>, Log in with <spanRED>Facebook</spanRED>, you should see the Google login screen or the Facebook login screen
respectively.

- You should literally be redirected in your browser to <spanRED>google.com</spanRED> or <spanRED>facebook.com</spanRED> or one of their international domain names instead.





## Single Sign On (SSO)

- Example: <spanRED>Liscio</spanRED> offers one-click login (Single Sign-On) with Google and Office 365.
	<img src="./images/sso1.gif" alt="drawing" height="320"/>





## Single Sign On (SSO)

- You'll type in your same username and password as usual for Google or Facebook. But that password is not given to this new website or this third-party website

- Using a technique known as cryptography and encryption essentially.





## Single Sign On (SSO)

- The username with which you log in is sent back to this third-party website, but not your password, just a confirmation that yes, you successfully logged into Google or Facebook.

- Using single sign on benefits not only you potentially but also the website or application by making it easier for you to register and/or log in subsequently as well.





## Single Sign On (SSO)

- Without an SSO solution, the website maintains a database of login credentials – usernames and passwords. 
	<img src="./images/sso2.png" alt="drawing" height="280"/>

<div class="popup" onclick="myFunction5()"><p class="blink" style="font-size:24px;"><spanBYMix>Example</spanBYMix></p>
  <span class="popuptext" id="myPopup5" STYLE="font-size:25px">Each time the user logs in to the website, it checks the user’s credentials against its database and authenticates the user. Logging in to your Google account once will allow you to access Google applications such as Google Docs, Gmail, and Google Drive.
  </span>
</div>




> How does SSO Login work?

- Step 1(a). The user enters login credentials on the website and the website checks to see if the user has already been authenticated by SSO solution. 
<img src="./images/sso3.png" alt="drawing" height="360"/>




> How does SSO Login work?

- Step 1(b). If so, the SSO solution would give the user access to the website. Otherwise, it presents the user with the SSO solution for login.
<img src="./images/sso3.png" alt="drawing" height="360"/>





> How does SSO Login work?

- Step 2. The user enters a username and password on the SSO solution.
<img src="./images/sso3.png" alt="drawing" height="360"/>





> How does SSO Login work?

- Step 3. The user’s login credentials are sent to the SSO solution.
<img src="./images/sso3.png" alt="drawing" height="360"/>




> How does SSO Login work?

- Step 4 (a). The SSO solution seeks authentication from the identity provider, such as an Active Directory, to verify the user’s identity. 
<img src="./images/sso3.png" alt="drawing" height="360"/>





> How does SSO Login work?

- Step 4 (b). Once the user’s identity is verified, the identity provider sends a verification to the SSO solution.
<img src="./images/sso3.png" alt="drawing" height="360"/>





> How does SSO Login work?

- Step 5. The authentication information is passed from the SSO solution to the website where the user will be granted access to the website.
<img src="./images/sso3.png" alt="drawing" height="360"/>





> How does SSO Login work?

- Step 6 (a). The website passes authentication data in the form of tokens.
<img src="./images/sso3.png" alt="drawing" height="360"/>




> How does SSO Login work?

- Step 6 (b). As a form of verification that the user is authenticated as the user navigates to a different application or web page.
<img src="./images/sso3.png" alt="drawing" height="360"/>




## Single Sign On (SSO)

- With the SSO solution, the website does not store login credentials in its database. Instead, SSO makes use of a shared cluster of authentication servers where users are only required to enter their login credentials once for authentication. With this feature of one login and multiple access, it is crucial to protect login credentials in SSO systems.

	[What Is single sign-on (SSO)?](https://www.okta.com/blog/2021/02/single-sign-on-sso/)

## Single Sign On (SSO)

- Integrate SSO with other strong authentication means such as smart tokens or one-time passwords to achieve multi-factor authentication.
