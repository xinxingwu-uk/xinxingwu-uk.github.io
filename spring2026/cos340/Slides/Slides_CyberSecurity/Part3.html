# Wi-Fi
</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

## Wi-Fi

- Securing systems: networked or even inter-networked 

- Encryption: accounts, data, systems.



## Wi-Fi

- Switch = connects devices inside the same network (LAN).

- Router = connects different networks together (LAN ↔ WAN/Internet).



## Wi-Fi

- Wi-Fi is connected via wireless technology to the internet and beyond.

	- So probably by now you've realized that when you're on Wi-Fi, you have to first choose your network.




## Wi-Fi

- And you might choose your network from a dropdown menu on your computer or the like, or it might auto select it.

<img src="./images/sys1.gif" alt="drawing" width="400"/>





## Wi-Fi

- Your device  wirelessly.

	- So you have an encrypted connection between that wireless device, often called an access point.




## Wi-Fi

- An access point is a wireless network device that acts as a portal for devices to connect to a local area network. Access points are used for extending the wireless coverage of an existing network and for increasing the number of users that can connect to it.

- An access point is a wireless network device that acts as a portal for devices to connect to a local area network.




## Wi-Fi

- Wireless routers can function as access points, but not all access points can work as routers.



## Wi-Fi

- A typical wireless router combines three functions: router, switch, and wireless access point (AP).
Many home routers can be configured to work only as an AP if you disable their routing/DHCP functions.



## Wi-Fi

- Stand-Alone Access Points (Not Routers)

	- A wireless access point only provides Wi-Fi connectivity to a wired network. It does not perform routing or run a DHCP server, so it cannot replace a router on its own.



<p class='titlep'>&nbsp;</p>

## <p class="hover-underline-animation">What is the actual technology that's being used to secure Wi-Fi networks nowadays?</p>




## Wi-Fi

- Wi-Fi Protected Access, or WPA.

- WPA is a security standard for computing devices equipped with wireless internet connections. WPA was developed by the Wi-Fi Alliance to provide more sophisticated data encryption and better user authentication than Wired Equivalent Privacy (WEP), the original Wi-Fi security standard.




## Wi-Fi

Wi-Fi Protected Access and using a secure Wi-Fi network is only technically encrypting your traffic between you and device

</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

<p class='titlep'>&nbsp;</p>

## Packet Sniffing

- A packet is the a virtual envelope of sorts that you might use when sending data on the internet.

	- From Alice to Bob

		- Inside of this packet is the actual message that Alice is sending to Bob

	- Bob is hopefully sending back to Alice




## Packet Sniffing

> Packet sniffing is a method of detecting and assessing packet data sent over a network. It can be used by administrators for network monitoring and security. However, packet sniffing tools can also be used by hackers to spy or steal confidential data.

- Continue the story ...

Secure Sockets Layer (SSL) certificates, sometimes called digital certificates, are used to establish an encrypted connection between a browser or user’s computer and a server or website.<br>
SSL is standard technology for securing an internet connection by encrypting data sent between a website and a browser (or between two servers). It prevents hackers from seeing or stealing any information transferred, including personal or financial data. </span></div>

	- TLS is essentially the new and improved version of SSL, modern browsers should now be using.

##  Tor

- Tor—short for the Onion Routing project—is an open-source privacy network that enables anonymous web browsing. The worldwide Tor computer network uses secure, encrypted protocols to ensure that users' online privacy is protected. Tor users' digital data and communications are shielded using a layered approach that resembles the nested layers of an onion.

##  Tor

##  Tor network

- Tor is a network of virtual tunnels that allows you to improve your privacy and security on the Internet. Tor works by sending your traffic through three random servers (also known as relays) in the Tor network. The last relay in the circuit (the "exit relay") then sends the traffic out onto the public Internet.
