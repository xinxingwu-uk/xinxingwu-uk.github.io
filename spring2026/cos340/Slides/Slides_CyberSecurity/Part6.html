<section data-markdown data-separator="^\n\n\n"><textarea data-template>

## The Future of Cyber Security

- AI as the Future of Cyber Security

	- AI will power the future of cybersecurity<br>
	<div class="popup" onclick="myFunction23()"><p class="blink" style="font-size:28px;"><spanRED>Examples</spanBYMix></p><span class="popuptext" id="myPopup23" STYLE="font-size:20px">Example 1: Automated Threat Detection and Response: AI-driven solutions like IBM's Watson for Cyber Security analyze vast amounts of data to identify and respond to threats in real-time, significantly reducing the time it takes to detect and mitigate cyber incidents.<br> Example 2: Behavioral Analysis: AI can learn and recognize the normal behavior of users and systems within a network. For instance, Darktrace uses machine learning to detect deviations from normal behavior that could indicate a security breach, such as an employee accessing sensitive data at unusual hours.</span></div> 
	- Human limitations in handling massive data volumes necessitate AI assistance<br>
	<div class="popup" onclick="myFunction24()"><p class="blink" style="font-size:28px;"><spanRED>Examples</spanBYMix></p><span class="popuptext" id="myPopup24" STYLE="font-size:25px">Example 1: Big Data Analysis: AI systems can process and analyze massive amounts of security data far more efficiently than humans. For example, Splunk uses AI to sift through logs and identify patterns and anomalies that might signify a security threat, which would be overwhelming for human analysts to handle manually.<br> Example 2: Predictive Analytics: AI can predict potential security threats by analyzing historical data and identifying patterns that precede attacks. Microsoft Defender ATP uses AI to forecast potential vulnerabilities and proactively defend against them, helping organizations stay ahead of cybercriminals.</span></div> 
	- Majority of cyber attacks originate from email phishing schemes<div class="popup" onclick="myFunction25()"><p class="blink" style="font-size:28px;"><spanRED>Examples</spanBYMix></p><span class="popuptext" id="myPopup25" STYLE="font-size:25px">Example 1: AI-Powered Email Filtering: Tools like Google’s Gmail use AI to filter out phishing emails by recognizing suspicious patterns and behaviors in email content and sender information, blocking millions of malicious emails daily before they reach users' inboxes.<br> Example 2: Phishing Detection and Response: AI can analyze email metadata, content, and user behavior to detect and respond to phishing attempts. For example, Barracuda Sentinel uses AI to identify spear-phishing attacks and provide real-time alerts and automatic remediation, protecting organizations from sophisticated phishing schemes.</span></div> 




## Impact of Cyber Attacks
- Consequences of Cyber Attacks
	- Cyber warfare can cripple critical infrastructures like hospitals, water supplies, power grids, and financial systems<div class="popup" onclick="myFunction26()"><p class="blink" style="font-size:28px;"><spanRED> Example</spanBYMix></p><span class="popuptext" id="myPopup26" STYLE="font-size:25px">Healthcare: In 2017, the WannaCry ransomware attack affected healthcare systems worldwide, including the UK's National Health Service (NHS). Hospitals were forced to cancel appointments and surgeries, and patients were turned away as systems were locked by the ransomware.</span></div> 
	- Ensuring security at machine scale is essential due to the high potential impact of breaches<div class="popup" onclick="myFunction27()"><p class="blink" style="font-size:28px;"><spanRED> Example</spanBYMix></p><span class="popuptext" id="myPopup27" STYLE="font-size:25px"> Financial Systems: The 2016 Bangladesh Bank heist involved cyber criminals using the SWIFT payment system to transfer $81 million from the central bank's account. The attack exploited vulnerabilities in the bank's security systems, underscoring the need for robust defenses in financial institutions.</span></div> 





## Defenders vs. Attackers

- Tipping the Scale Towards Defenders
	- Historically, attackers have had the advantage, needing only to be right once<div class="popup" onclick="myFunction28()"><p class="blink" style="font-size:28px;"><spanRED>Examples</spanBYMix></p><span class="popuptext" id="myPopup28" STYLE="font-size:20px">Example 1: Data Breaches: In the 2014 Sony Pictures hack, attackers breached the company's network and stole sensitive data, including unreleased films and employee information. Despite numerous security measures, the attackers succeeded with a single breach.<br> Example 2: Ransomware Attacks: In 2017, the WannaCry ransomware attack exploited a vulnerability in Microsoft Windows. The attackers needed only to exploit this single vulnerability to infect and lock down systems across 150 countries.</span></div>

## <p class="hover-underline-animation">How can we effectively translate the concepts we have just seen into mathematical formulas that can be used in our algorithms?</p>




> How to detect spam with Perceptrons

- Linear algebra - the equation that represents the function used to determine the score to be associated with every single email message is

## <p class="hover-underline-animation">This identifies a straight line in the Cartesian plane; therefore, the classifier used by our spam filter to classify emails is called a linear classifier.</p>




> How to detect spam with Perceptrons

- Generalized our linear classifier to an unspecified number of variables

$$y=\sum w_i x_i=w^T x$$




> Identify an appropriate threshold value that correctly splits spam messages from ham messages: if the score associated with a single email message is equal to or higher than the threshold value, the message email will be classified as spam (and we will assign it the value +1); otherwise, it will be classified as ham (to which we will assign the value -1).



<p class='titlep'>&nbsp;</p>

# <p class="hover-underline-animation">How to formalize it by math</p>



> How to detect spam with Perceptrons

- $\theta$ represents the threshold value:

	- $w^T x\geqslant \theta\rightarrow f(y)=+1$
	- $w^T x\leqslant\theta\rightarrow f(y)=-1$

- $x_i$ is by definition prefixed, it is the value of the corresponding weights that helps to determine if the Perceptron has to activate itself or not.




<p class='titlep'>&nbsp;</p>

## <p class="hover-underline-animation">How are weights updated in practice, thus determining the Perceptron learning process?</p>




- The Perceptron learning process can be synthesized in the following three phases

	- Initializing the weights to a predefined value (usually equal to 0)

	- Calculating the output value, $y_i$, for each corresponding training sample, $x_i$

	- Updating the weights on the basis of the distance between the expected output value (that is, $y$ associated with the original class label of the corresponding input data, $x_i$ ) and the predicted value ($y_i$ estimated by the Perceptron)





- The individual weights are updated according to the following formula:

$$w_i=w_i+\Delta w_i$$

$\Delta w_i$ - the deviation between the expected $y$ and the predicted value $y_i$:
$$\Delta w_i =\lambda(y-y_i)x_i$$

$\lambda\in[0.0,1.0]$ is a constant and represents the learning rate assigned to the Perceptron at the initialization phase.

# <p class="hover-underline-animation">Limitations of Perceptrons?</p>




> Being essentially a binary linear classifier, the Perceptron is able to offer accurate results only if the analyzed data can be linearly separable; that is, it is possible to identify a straight line (or a hyperplane, in case of multidimensional data) that completely bisects the data in the Cartesian plane.




> How to detect spam with Perceptrons

<p class='titlep'>&nbsp;</p>

## <p class="hover-underline-animation">The analyzed data was not linearly separable?</p>




> Linear vs Non-linear problems

<img src="./images/paper19.png" alt="drawing" width="800"/>




> How to detect spam with Perceptrons

- The Perceptron learning algorithm would oscillate indefinitely around the data, looking for a possible vector of weights that can linearly separate the data




> How to detect spam with Perceptrons

<img src="./images/paper24.png" alt="drawing" width="600"/>





> How to detect spam with Perceptrons

- Therefore, the convergence of the Perceptron is only possible in the presence of linearly separable data, and in the case of a small learning rate. If the classes of data are not linearly separable, it is of great importance to set a maximum number of iterations (corresponding to the ```max_iter``` parameter) in order to prevent the algorithm from oscillating indefinitely in search of an (nonexistent) optimal solution.





<p class='titlep'>&nbsp;</p>

# <p class="hover-underline-animation">Overcome?</p>





<p class='titlep'>&nbsp;</p>

## <p class="hover-underline-animation">A wider margin of data separation between them</p>





> Spam detection with support vector machines (SVMs)

- SVMs are supervised algorithms, the identified hyperplane is not limited to the linear model

<img src="./images/paper25.png" alt="drawing" width="750"/>





> Spam detection with support vector machines (SVMs)

- The SVM can be considered as an extension of the Perceptron

- In the case of the Perceptron, our goal was to minimize classification errors, in the case of SVM, our goal instead is to maximize the margin, that is, the distance between the hyperplane and
the training data closest to the hyperplane (<spanRED>the nearest training data is thus known as a support vector</spanRED>)




<p class='titlep'>&nbsp;</p>

## <p class="hover-underline-animation">Why choose the hyperplane that maximizes the margin in the first place?</p>




> SVM optimization strategy

- Wider margins correspond to fewer classification errors, while with narrower margins we risk incurring the phenomenon known as overfitting 

- We can translate the SVM optimization strategy in mathematical terms

$$y=\sum w_i x_i+\beta\geqslant\mu,$$

where $\beta$ - bias, $\mu$ - margin.



> SVM optimization strategy

- We add the value of the $\beta$ bias, which allows us to obtain a value greater than or equal to zero

- The value calculated in this way is compared with the margin $\mu$ in order to ensure that the distance between each sample and the separating hyperplane we identified (thus constituting our decision boundary) is greater or at most equal to our margin

- Developed from statistical analysis, regression models have quickly spread in ML and in AI in general.

> Linear regression models

- The linear regression model is characterized by the fact that the data is represented as sums of features, leading to a straight line in the Cartesian plane.

- In formal terms, linear regression can be described by the following formula:

$$y=wX+\beta$$




> Linear regression models

$$y=wX+\beta$$

- $y$ - the predicted values, which are the result of the linear combination of the single features (represented by the $X$ matrix) to which a weight vector is applied (represented by the w vector), and by the addition of a constant ($\beta$), which represents the default predicted value when all features assume the value of zero (or simply are missing).



> Linear regression models

- A perceptron is a basic artificial neuron that can only output a binary value (0 or 1) due to its step function activation, while linear regression is a statistical model that predicts a continuous numerical value by finding a linear relationship between input variables.

# <p class="hover-underline-animation">Limitations?</p>




> Linear regression models

- The linear regression model can only be used to manage quantitative data, whereas in the case where the predictive analysis used categorical data, we have to resort to the logistic regression model. 

- The major limitation of linear regression is that the model assumes that features are mostly unrelated; that is, they do not influence each other.

### <p class="hover-underline-animation">When the data being analyzed exhibits complex relationships, the linear regression model leads us to systematically distorted predictions.</p>





> Linear regression models

- In case we wanted to use linear regression to classify the samples within two classes (as is the case in spam detection) whose labels are represented by numerical values (for
example, -1 for spam, and +1 for ham), the linear regression model will try to identify the result that is closest to the target value (that is, linear regression has the purpose of minimizing forecasting errors). 



> Linear regression models

- The negative side effect of this behavior is that it leads to greater classification errors. With respect to the Perceptron, linear regression does not give us good results in terms of classification accuracy, precisely because linear regression works better with continuous intervals of values, rather than with classes of discrete values (as is the case in classification).




> Logistic regression

- Most useful for the purposes of classification, consists of estimating the probability of the samples belonging to individual classes. This is the strategy adopted by logistic regression (which, in spite of the name, constitutes a classification algorithm, rather than a regression model).




> Logistic regression

- The mathematical formulation of logistic regression

$$P(y=c|x)=\frac{e^z}{1+e^z}$$

where $z=\sum w_i x_i$. P(y=c|x) measures the conditional probability that a given sample falls into the class, given the $x_i$ features




> Logistic regression

- A perceptron is a basic linear classifier that outputs a binary prediction (yes/no) based on a simple threshold function, while logistic regression is a statistical model that predicts the probability of a binary outcome, providing a more nuanced output between 0 and 1 using a sigmoid function; essentially, a perceptron can be seen as a simplified version of logistic regression with a more rigid decision boundary.

> Decision trees

- Decision trees use binary trees to analyze and process data, thus succeeding in formulating predictions concerning both values expressed in numerical and categorical form, accepting both numerical values and qualitative information as input data.




> Decision trees - Strategy

- Step1: Dividing the original dataset into two child subsets, after having verified a binary condition, following the first subdivision, we will have two child subsets as a result, in which the binary condition is verified or falsified.



> Decision trees - Strategy

- Step2: The child subsets will be further subdivided on the basis of further conditions; at each step, the condition that provides the best bipartition of the original subset is
chosen (for this purpose, appropriate metrics are used to measure the quality of the subdivision).




> Decision trees - Strategy

- Step3: The division proceeds in a recursive manner. It is therefore necessary to define a stopping condition (such as the achievement of a maximum depth).

- Step4: At each iteration, the algorithm generates a tree structure in which the child nodes represent the choices taken at each step, with each leaf contributing to the overall classification of the input data.

> Spam detection with Naive Bayes

- Naive Bayes is the fact that it requires little starting data to begin classifying input data; moreover, the information that progressively adds up contributes to dynamically updating the previous estimates, incrementally improving the forecasting model (unlike, as we saw in the previous paragraph, the algorithm based on decision trees).



> Spam detection with Naive Bayes

- The spam detection algorithms based on Naive Bayes can exploit the emails already present in the inbox, constantly updating the probability estimations on the base of new email messages that are progressively added to those already existing.




> Spam detection with Naive Bayes


- The constant process of updating the probability estimates is based on

$$p(A|E)=\frac{P(A)P(E|A)}{P(E)}$$

- The relationship between the probability of the occurrence of an event, $A$, conditioned to the evidence, $E$.




> Spam detection with Naive Bayes

> Spam detection with Naive Bayes

- An important feature of the Bayes rule probability update is that the probability $P(A|E)$ (the posterior probability), as a result of the updating process, becomes the new prior probability, thus contributing to dynamically updating the existing probability estimates

- In most cases, it is a reasonable condition that leads to good forecasts, while at the same time simplifying the application of the Bayes rule, especially in the presence of several competing events, thus reducing the calculations to a simple multiplication of the probabilities associated with each event.

## Introduction

- Cyberspace's attack surface grows exponentially, and it is therefore essential to resort to automated tools for the effective detection of network anomalies associated with
unprecedented cybersecurity threats.

	- Network anomaly detection techniques
	- How to classify network attacks
	- Detecting botnet topology
	- Different ML algorithms for botnet detection




## Introduction

- Anomaly detection has always been a research area of cybersecurity, particularly in the field of network security protection. However, anomaly detection is not limited to identifying and preventing network attacks, but can also be adopted in other areas, such as fraud detection and in the identification of possible compromises of user profiles.



> Network anomaly detection techniques

- 1.Signature-based detection

	- This gets combined with an alert system to be launched whenever a correspondence with archived signatures is detected in the network traffic. The analogies of signature-based detection systems with various antivirus software are obvious. The knowledge base of the signatures must be constantly updated to detect new types of attacks.



> Network anomaly detection techniques

- 2.Anomaly detection

	- An attempt is made to identify network traffic behavior that can be defined as normal, in order to detect differences in behavior that deviate from normality as anomalous. This approach makes it possible to detect the new types of attack by analyzing the characteristics of network traffic that could be considered as anomalous.




## <p class="hover-underline-animation">Identify what constitutes abnormal behavior in terms of network traffic</p>




> Network anomaly detection techniques

- In order to detect anomalous traffic: 
	- The number of connections to and from a specific host
	- Unusual remote communication ports or unexpected traffic patterns
	- Unusual traffic peaks occurring at particular times of the day (for example, traffic carrying on during the night)
	- Communication bandwidth heavily occupied by particular hosts within the network




> Intrusion Detection Systems

- Traditionally, intrusion detection activity has been managed through the introduction of
specialized devices, known as Intrusion Detection Systems (IDS). These devices were usually divided into the following two categories:

	- Host-based IDS
	- Network-based IDS



> Intrusion Detection Systems

- With the introduction of Artificial Intelligence (AI) techniques in the field of cybersecurity, a third type of IDS has also been added to the aforementioned two traditional types: Anomaly-driven IDS




> Host Intrusion Detection Systems

- Detect possible intrusions affecting host machines within an organization, especially the machines that are considered critical.
- To this end, HIDS monitors some of the system metrics that are supposed to be significant for identifying possible attacks, such as system information associated with the following system metrics:
	- Number and type of running processes
	



> Host Intrusion Detection Systems

- Number, type, and creation of user accounts
- Kernel modules loading (device drivers included)
- File and directory activity
- Task scheduler activity
- Registry key modification
- Background processes (daemons and services)
- Operating system (OS) modules loaded at startup
- Host network activity




	
> Host Intrusion Detection Systems

- Typically, the identification of the system metrics to be monitored is strictly dependent on the adopted threat model, and in order to collect the information to be monitored, it is possible to use the tools that come installed with the OS of the host machines, or by installing specialized system monitoring tools.




> Network Intrusion Detection Systems

- Identify possible attack patterns by analyzing network traffic; that is, by processing network packets in transit—both incoming and outgoing—and detecting known attacking patterns in the flow of data. Some of the network attacks typically detected by NIDS are as follows:
	- Adware (resulting in unsolicited and malicious advertisements (AD) downloads from remote hosts)




> Network Intrusion Detection Systems
- Identify possible attack patterns by analyzing network traffic; that is, by processing network packets in transit—both incoming and outgoing—and detecting known attacking patterns in the flow of data. Some of the network attacks typically detected by NIDS are as follows:
	- Spyware (sensitive information transmitted toward remote hosts)





> Network Intrusion Detection Systems
- Identify possible attack patterns by analyzing network traffic; that is, by processing network packets in transit—both incoming and outgoing—and detecting known attacking patterns in the flow of data. Some of the network attacks typically detected by NIDS are as follows:
	- Advanced Persistent Threats (APTs) (APT-targeted attacks that leverage specific organization flaws or misconfigured services)





> Network Intrusion Detection Systems
- Identify possible attack patterns by analyzing network traffic; that is, by processing network packets in transit—both incoming and outgoing—and detecting known attacking patterns in the flow of data. Some of the network attacks typically detected by NIDS are as follows:
	- Botnets (a typical Command and Control (C2) attack that leverages organization network resources by transforming hosts into zombie machines, executing remote instructions)




> Network Intrusion Detection Systems

- The implementation of NIDS can leverage network diagnostic tools including sniffers (such as [tcpdump](https://www.tcpdump.org/) and [Wireshark](https://www.wireshark.org/)).
- NIDS can also deploy integrated software solutions, such as Snort, which represents a valid solution for real-time detection of possible network intrusions.




> These triggers are associated with a given threshold, which is a predetermined value that reliably separates the events among them. Obviously, the problem of how to adequately determine this threshold value arises, and whether this value can be validly used in relation to different contexts. 




> Network anomaly detection techniques

- Adopt a dynamic threshold (rather than relying on a hardcoded value) by systematically recalculating its value over time. These improvements can be obtained by resorting to statistical metrics, calculated on a time series (moving averages), for example, or through the re-elaboration of statistical measurements made on the distribution of the data (for example, adopting position measurements such as the median or the interquartile range (IQR)).




> Anomaly-driven IDS

- In the case of solutions based on supervised learning algorithms, we will have to categorize (label) all the data since, by definition, in supervised learning the classes to which sample data belongs are known in advance.
- We could decide to resort to unsupervised learning algorithms, not only to let the algorithm identify unknown classes, but also to reduce the computational overhead.



> The algorithms that exploit the concept of similarity (such as clustering algorithms) are well suited for the implementation of anomaly detection solutions.

- However, it is also necessary in this case to pay particular attention to the type of metrics used to define the concept of similarity that distinguishes the traffic considered as normal from that being considered as anomalous.




> In the implementation of anomaly detection solutions, scoring systems are used for the assessment of traffic: identifying thresholds of values that separate the different types of traffic from each other (normal versus anomalous).




> An anomaly detection system can use—as a scoring metric—the distance existing between the values of the dataset (considered as points of the $n$-dimensional space representing the different features), or evaluate the regularity in the distribution of data, with respect to a distribution considered representative of the phenomenon under investigation.




## <p class="hover-underline-animation">How to collect sufficient and reliable data to perform algorithm analysis and training.</p>




> Network anomaly detection techniques

- Network devices, such as routers or network sensors, using tools such as
	- tcpdump for data collection
	- Services logs and system logs



# <p class="hover-underline-animation">How to classify network attacks</p>





> How to classify network attacks

- The most frequent types of network attacks:
	- Malware-based
	- Zero-day exploits
	- Data exfiltration via network sniffing
	- Saturation of network resources (DoS)
	- Session hijacking
	- Connection spoofing
	- Port scanning




> Anomaly detection strategies

- Concept of anomaly detection refers to a behavior that is different from what was expected; this difference, in technical terms, translates into
outlier detection.





> Anomaly detection strategies

- Analyzing a sequence of events within a time series <div class="popup" onclick="myFunction15()"><p class="blink" style="font-size:32px;"><spanBYMix>Details</spanBYMix></p><span class="popuptext" id="myPopup15" STYLE="font-size:25px">The data is collected at regular intervals, evaluating the changes that occur in the series over time. This is a technique widely used in the analysis of financial markets, but it can be also validly used in the cybersecurity context to detect the frequency of characters (or commands) entered by the user in a remote session. Even the simple unnatural increase in the frequency of data entered per unit of time is indicative of an anomaly that can be traced back to the presence of an automated agent (instead of a human user) in the remote endpoint. </span></div> 

- Using supervised learning algorithms <div class="popup" onclick="myFunction16()"><p class="blink" style="font-size:32px;"><spanBYMix>Details</spanBYMix></p><span class="popuptext" id="myPopup16" STYLE="font-size:25px">This approach makes sense when normal and anomalous behaviors can be reliably distinguished from each other, as in the case of credit card fraud, in which it is possible to detect predefined patterns of suspicious behavior, relying on the fact that future fraud attempts are attributable to a predefined scheme. </span></div> 

- Using unsupervised learning algorithms <div class="popup" onclick="myFunction17()"><p class="blink" style="font-size:32px;"><spanBYMix>Details</spanBYMix></p><span class="popuptext" id="myPopup17" STYLE="font-size:25px">In this case, it is not possible to trace the anomalies back to predefined behaviors, as it is not possible to identify a reliable and representative training dataset for supervised learning. This scenario is the one that most commonly describes the reality of cybersecurity, characterized by new forms of attack or exploits of new vulnerabilities (zero-day attacks). Similarly, it is often difficult to trace all the theoretically possible intrusions back to a single predefined scheme. </span></div> 




> Detecting botnet topology

- One of the most common pitfalls in network anomaly detection has to do with the detection of botnets within the corporate network
- What is a <div class="popup" onclick="myFunction18()"><p class="blink" style="font-size:32px;"><spanBYMix>botnet</spanBYMix></p><span class="popuptext" id="myPopup18" STYLE="font-size:25px">Botnets are networks of hijacked computer devices used to carry out various scams and cyberattacks. The term “botnet” is formed from the word’s “robot” and “network.” </span></div>?




> Detecting botnet topology

- In the case of botnets, the attacker's intent is to transform the victim host (by installing malware) into an automated agent that fulfills the orders received by the attacker, through a C2 console that is usually managed by a centralized server.




> Detecting botnet topology

- The victim machine thus becomes part of a vast network of compromised machines (the botnet), contributing toward a common goal with its own computational and network resources:

	- Taking part in email spamming campaigns
	- Performing Distributed Denial of Services (DDoS) toward institutional or
	- private third-party sites




> Detecting botnet topology

- The victim machine thus becomes part of a vast network of compromised machines (the botnet), contributing toward a common goal with its own computational and network resources:

	- Bitcoin and cryptocurrency mining
	- Password cracking
	- Credit card cracking
	- Data leakages and data breaches




> Detecting botnet topology

- For an organization, dealing with a botnet (even unconsciously) represents a serious risk in terms of legal responsibility toward third parties; it is not just a waste of company resources.
> This is why it is important to monitor the company network by trying to promptly identify the presence of hosts that might be part of a botnet.




> The botnet kill chain

- In order to promptly identify the possible presence of a botnet, it may be useful to consider its kill chain (the different phases that 
- Distinguish the following phases:
	- Malicious software installation
	- Joining the botnet via C2
	- Spreading the botnet to other hosts




> Botnet detection

- It is not advisable to exclusively rely on automated tools for network anomaly detection, but it may be more productive to adopt AI algorithms that are able to dynamically learn how to recognize the presence of any anomalies within the network traffic, thus allowing the analyst to perform an in-depth analysis of only really suspicious cases. 

- Different ML algorithms for network anomaly detection - used to identify a botnet.

## Background

- Common knowledge is a form of group knowledge in which “all agents know that all agents know that all agents know that ...”: timestamped or probabilistic common knowledge

- To decide whether an agent is using steganography in a given communication, it is helpful to determine whether the communications are grounded in innocuous knowledge or not




> Steganography

- The goal of steganography is to enable the transmission of a secret payload through a public channel $\Diamond$, from a source to a receiver, such that the transmission remains undetectable to an adversary $E$ able to read the $n$-symbol channel input sequences $X^n, X\in\mathcal{X}$ while maintaining useful transmission rates.




> Steganography

- The mutual information $I$ between the secret payload $m$ and the decoder’s estimate $\hat{m}$ satisfies $I(m;\hat{m})>0$.

- $\mathcal{C}$: covertext distribution - the channel input symbol distribution given innocuous, overt communications.




> Steganography

- Covert communication is the exchange of information or data using a covert channel. 

	- A covert channel is a type of computer attack or threat that enables communication between various objects and processes that were not allowed to communicate because of the system or network's policy.




> Steganography

- In order to use $\Diamond$ for covert communications, the sender and receiver need to establish a subliminal channel $\Diamond′$ within

- A covert message space $\mathcal{M}′$, an encoding function $f_{e}: \mathcal{M}′\times\mathcal{C}\rightarrow \Delta(\mathcal{X}^n)$, and a decoding function $f_{e}^{-1}: \mathcal{X}^n\times\mathcal{C}\rightarrow \Delta(\mathcal{M}′)$




> Steganography
- If the common knowledge $\mathbf{I}$ between sender and receiver explicitly contains unique choices for $\mathcal{M}′$, $f_{e}$, and $f_{e}^{-1}$, then both agents can immediately establish $\Diamond′$




> Focal point (or Schelling point)

In game theory, a focal point (or Schelling point) is a solution that people tend to choose by default in the absence of communication in order to avoid coordination failure. The concept was introduced by the American economist Thomas Schelling in his book The Strategy of Conflict (1960).

[Focal point (game theory)](https://en.wikipedia.org/wiki/Focal_point_(game_theory)#:~:text=In%20game%20theory%2C%20a%20focal,Strategy%20of%20Conflict%20(1960).)

> Incentives for Collusion

- DecAI settings - work alongside one another in order to achieve their individual objectives $J^i$

- Joint strategies available to the agents

	- $\mathbf{f}$ - regular behavior

	- $\mathbf{f}_c$ - collusion

	- $\mathbf{f}_{sc}$ - secret collusion

	- $J^i$ - a primary goal $g^i$ + additional conditions $h^i$





## $J^i=g^i + h^i$

- Agents can achieve their primary goal better if they collude: $ g^i (f_{sc}) = g^i (f_{c}) > g^i (f)$

- Agents are punished if they are caught colluding: $ h^i (f_{sc}) = h^i (f) > h^i (f_{c})$

- Secret collusion is incentivised $ J^i (f_{sc}) > J^i (f) > J^i (f_{c})$
