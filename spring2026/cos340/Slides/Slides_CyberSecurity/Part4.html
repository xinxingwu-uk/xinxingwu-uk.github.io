        const starCount = 2; // Number of stars
        const body = document.body;
        const width = window.innerWidth;

        function createStar() {
            let star = document.createElement('div');
            star.classList.add('star');
            star.textContent = '🛡️';

            // Set random position
            star.style.left = `${Math.random() * width}px`;
            star.style.top = `${Math.random() * height}px`;

            // Set random blink animation duration
            star.style.animation = `blink ${Math.random() * 10 + 3.5}s infinite`;

            body.appendChild(star);

            // Function to randomly reposition the star
            function randomizePosition() {
                star.style.left = `${Math.random() * width}px`;
                star.style.top = `${Math.random() * height}px`;
            }

            // Reposition the star every 1-3 seconds
            setInterval(randomizePosition, Math.random() * 10000 + 5000);
        }

        for (let i = 0; i < starCount; i++) {
            createStar();
        }

## Code Injection

- Code injection is the term used to describe attacks that inject code into an application. That injected code is then interpreted by the application, changing the way a program executes. Code injection attacks typically exploit an application vulnerability that allows the processing of invalid data.

<img src="./images/software3.gif" alt="drawing" width="250"/>





## Code Injection

- Example, A common attack on the web in particular, is what's known as cross-site scripting, or XSS 
- Referring to this potential opportunity for an adversarially to trick one website into executing code that they themselves did not write.

## Types of XSS

- Stored XSS, reflected XSS, and DOM-based XSS:

	- Stored: malicious script is written into the actual code of web application, affecting both the client and server side.<div class="popup" onclick="myFunction6()"><p class="blink" style="font-size:32px;"><spanBYMix>...</spanBYMix></p> <span class="popuptext" id="myPopup6" STYLE="font-size:20px"> It resides permanently in the code of that server or application until it’s eradicated by admins or an automated security solution. Stored XSS is a consistently severe XSS attack because the malicious code always exists in the application. For example, if a threat actor writes a malicious script on a financial services company’s web server on a page where users input their financial data, the threat actor can steal that data every time someone uses the page. Because the malicious code is written in the web server, it affects each instance of the web application’s use. Users don’t know the code on the financial services web page is malicious because it looks legitimate, and they continue using it until it’s exposed.</span></div>
	- Reflected: an attacker injects malicious code into a URL parameters, the response from the web server reflects that.<div class="popup" onclick="myFunction7()"><p class="blink" style="font-size:32px;"><spanBYMix>...</spanBYMix></p> <span class="popuptext" id="myPopup7" STYLE="font-size:20px"> It isn’t stored long-term in the back end of the application or server code. The attack is performed within the bounds of the user’s input, like the URL or request parameters. Reflected XSS can be severe if an attacker uses it to steal session cookies or user credentials. An example of reflected XSS would be a threat actor intercepting a software engineer’s request parameters to access a popular engineering application. The threat actor changes the URL subtly, which means the user goes to a vulnerable web page instead of the legitimate one they expected. From there, the threat actor can take multiple actions to compromise the engineer’s work, like stealing the information they input on the page.</span></div>
	- <div class="popup" onclick="myFunction9()"><p class="blink" style="font-size:32px;"><spanGREEN>DOM</spanGREEN></p> <span class="popuptext" id="myPopup9" STYLE="font-size:20px"> Document object model</span></div>-based: the attacker manipulates the DOM of the user’s browser.<div class="popup" onclick="myFunction8()"><p class="blink" style="font-size:32px;"><spanBYMix>...</spanBYMix></p> <span class="popuptext" id="myPopup8" STYLE="font-size:20px"> The actual code of the web application itself doesn’t change on the server side, but it executes maliciously on the user’s side. DOM-based XSS is particularly hard to detect because the changes occur on the client side within the document object model and may never touch the web server. For example, if an attacker steals pieces of a URL and uses them in a JavaScript function that allows dynamic code execution, that attacker could manipulate the client-side code of a web app. If the attacker chooses to manipulate a customer relationship management (CRM) product’s main page, the actual HTTP response of the page won’t be different, but the client-facing code will be. The threat actor could launch an attack using the URL fragments.</span></div>




## Stored (persistent) XSS

- Malicious input is saved by the app and later served to other users, where it runs in their browsers. The code isn’t in your source files; it’s in user-generated content that the server stores and re-displays.

            const email = document.getElementById('email').value.trim();

            // Simulate server-side validation

                message.classList.remove('success');
            } else {
                responseMessage = 'Form submitted successfully!';

            }

            message.textContent = responseMessage;
            message.style.display = 'block';
        });

## Arbitrary Code Execution

- Arbitrary code execution (ACE) refers to an attacker's ability to run code of their choice on a target machine or process. It allows the attacker to gain unauthorized access or perform actions beyond the intent of the application's creators, potentially leading to data theft, corruption, or system compromise.



## Arbitrary Code Execution

- Remote code execution, the same attack can happen even if the adversary is somewhere else in the world, perhaps connected to you somehow via the internet.




<p class='titlep'>&nbsp;</p>

# <p class="hover-underline-animation">How might these attacks be possible?</p>




## Arbitrary Code Execution

- An adversary tricks your own system into executing code that the adversary wrote is through something generally known as a buffer overflow.

- Buffer overflow (buffer overrun) occurs when the amount of data in the buffer exceeds its storage capacity. That extra data overflows into adjacent memory locations and corrupts or overwrites the data in those locations.




## Arbitrary Code Execution

- A buffer overflow attack typically involves violating programming languages and overwriting the bounds of the buffers they exist on. Most buffer overflows are caused by the combination of manipulating memory and mistaken assumptions around the composition or size of data.





## Arbitrary Code Execution

- Computers typically use this bottom area  of the computer's memory for a so-called stack. Stacking means literally from bottom on up.

<img src="./images/software59.png" alt="drawing" width="200"/>




<p class='titlep'>&nbsp;</p>

> When the computer needs memory, it first uses some memory from the very bottom.

> And then if it needs more, it uses more above that. When it needs more, it uses more above that ... Goes bottom up




<p class='titlep'>&nbsp;</p>

## <p class="hover-underline-animation">Sometimes software doesn't necessarily know in advance or predict correctly in advance how much input</p>





## An Example

- String Manipulation with Python
	- We'll create a Python example that mimics improper data handling, such as a naive approach to processing data that could lead to unintended behavior. This won't be a true buffer overflow but will illustrate potential issues with data handling.

- Creating a Python function that processes strings in a way that might lead to issues if the input is not properly managed.

def process_data(input_string):
    # Define a fixed-size buffer (simulated with a list)
    buffer_size = 10
    buffer = [''] * buffer_size

## An Example

- Fixed-Size Buffer: We simulate a fixed-size buffer with a list buffer that can hold 10 characters.

- Naive Data Filling: The function attempts to fill the buffer with characters from input_string without checking if the length of input_string exceeds the buffer size. If input_string is longer than the buffer, it will result in an IndexError when i exceeds the buffer size.




## An Example

- Output: The program will crash or behave unexpectedly if the input string is longer than the buffer size.





## Improved Version

<div class="wrapper nine">
        <div>
            <h3 class="rotate">
                <span>C</span>
                <span>O</span>
                <span>D</span>
				<span>I</span>

def process_data(input_string):
    # Define a fixed-size buffer
    buffer_size = 10
    buffer = [''] * buffer_size
    
    # Safely handle input to avoid overflow
    for i in range(min(len(input_string), buffer_size)):
        buffer[i] = input_string[i]
    
    # Print the buffer contents
    print(''.join(buffer))

# Test the function
input_string = "This input is too long and will be truncated!"
process_data(input_string)
```



## Improved Version

- Bounds Checking: The min(len(input_string), buffer_size) ensures that we only process as many characters as the buffer can hold, preventing an IndexError.

- Truncation: If the input string is too long, it will be truncated to fit the buffer, avoiding any overflow issues.

## App Stores 

- You could download all of the software

- You use only from an approved app store, be it in the world of iPhones or Android devices, macOS, Windows

- When you install software in your computer ... you should get it only from Microsoft or Google or Apple and not from some random website, and not from some random email




## App Stores 

- Cryptography really is the solution to a lot of the world's current problems when it comes to cybersecurity

	- For instance, when you develop a piece of software, or some company does this for you, and they upload their software to Apple or Google or Microsoft for distribution,




<p class='titlep'>&nbsp;</p>

# <p class="hover-underline-animation">What are those companies doing?</p>




## App Stores 

- Running your software through some special function or algorithm and getting back a hash - a hash is this fixed length representation of your software.

<img src="./images/software71.png" alt="drawing" width="400"/>




## App Stores

- Apple or Microsoft or Google can use their own private key from their own app store to take that hash as input and produce a digital signature

- When you install that software on Mac and PC, or on phones, the devices can ensure that any software you are installing on devices was digitally signed by that app store, by Google or Microsoft or Apple


<img src="./images/software72.png" alt="drawing" width="400"/>




## PDF Digital ID

- Digital IDs are used for certificate security and digital signatures. Digital IDs contain two keys: the public key locks, or encrypts data; the private key unlocks, or decrypts that data. When you sign PDFs, you use the private key to apply your digital signature.




## PDF Digital ID

- A public key is also used to encrypt a message or check the legitimacy of a digital signature. It is accompanied by a corresponding private key, which is known only to its owner. Private keys are used to decrypt messages that were created with the corresponding public key or to create signatures.

- [Manage Digital IDs]()
- [How to Create a Digital Signature for PDF](https://grad.ncsu.edu/wp-content/uploads/2016/07/forms-digital-signature-instructions.pdf)

## Vulnerability Catalogs

- A whole inventory of vulnerabilities that have been detected over the years, Common Vulnerabilities and Exposures, or<div class="popup" onclick="myFunction21()"><p class="blink" style="font-size:32px;"><spanBYMix> CVE</spanBYMix></p> <span class="popuptext" id="myPopup21" STYLE="font-size:20px"> such that a lot of the kinds of attacks we've been talking about today and, more specifically, bugs and flaws in specific software and versions thereof are often assigned a unique identifier, a CVE number that system administrators, companies, and even end users can keep track of to make sure they are always current with the latest threats out there.</span></div>s, https://www.cve.org/

- The mission of the CVE® Program is to identify, define, and catalog publicly disclosed cybersecurity vulnerabilities.





## CVSS

- There is also a Common Vulnerability Scoring System, or CVSS, https://www.first.org/cvss/
it is a standardized way of assigning a score to the severity of a vulnerability.

- You can prioritize things - for instance, given limited resources or time, which of the bugs you should be fixing, which of the software you should be updating, or maybe which of the software you should not be using, at least while it's vulnerable to something that's highly severe.




## EPSS

- There's an Exploit Prediction Scoring System https://www.first.org/epss/ EPSS, which refers to what do people in the real world think the probability is that this particular bug or mistake in software will be exploited is.




## KEV

- There's a Known Exploited Vulnerability catalog, KEV, https://www.cisa.gov/known-exploited-vulnerabilities-catalog which refers to all of these kinds of bugs that are known to have been exploited.
