<section data-markdown data-separator="^\n\n\n"><textarea data-template>

## Course Description 👍

- Cybersecurity is one of the <spanBYMix>most important</spanBYMix> areas of technology management.
- Being able to <ftred>keep an organization's data secure is a top priority for many technology professionals</ftred>.
- Explore concepts implementation, operation, analysis and testing of the security of computer technologies.
- <spanRED>Regular attendance is required</spanRED> for success in this course.




## Course Objectives 🌞
- Understand the ethical and policy context for cybersecurity in today's society
- Understand how to better safeguard one's personal computer
- Understand the basics of advanced topics in cybersecurity including <ftred>encryption, digital forensics, binary exploits, and networks</ftred>
- Understand the <ftred>modern concept</ftred>s in cybersecurity <ftred>attacks</ftred> and <ftred>prevention</ftred>




## Course Information ✔️

- 16 weeks, M/W/F 12:00 PM - 12:50 PM

## Generative AI

- You may use <spanBYMix>generative AI</spanBYMix>, such as ChatGPT, to help you <spanBYMix>study and understand concepts</spanBYMix>
- All the *code* you submit must be your own, and <spanRED>cannot</spanRED> come from a generative AI
  - It turns out that generative AI is not all that useful for most of our assignments
  
- For more details, please see <a href="https://midway.instructure.com/courses/7239/pages/ai-tool-usage?module_item_id=602648">📌 AI Tool Usage</a>




 
## Computer Ethics

- We must teach how attacks on computer systems are carried out in order to teach defenses against them
- Information about the attack <spanRED>must not</spanRED> be used to attack any computer system in any way
- <spanGREEN>Not only on prevention but on detection<spanGREEN>

# Course Content
</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

## Content
- Technical and non-technical
- Secure your accounts, data, systems, and software; Preserve your own privacy
- AI can detect patterns and potential adversaries' behavior that we might not even notice ourselves
- Both high-level and low-level examples of threats and provide you with all you need technically to understand
- How other threats that the world might <spanBYMix>not</spanBYMix> have even seen yet actually work





## Content

- Introdcution (Week 1)

- Account Security (Weeks 1-3)

- Data Security (Weeks 4-6)

- System Security (Weeks 7-9)

- Software Security (Weeks 10-12)

- Preseving Privacy (Weeks 13-14)

- AI and CyberSecurity (Weeks 15-16)
