		function startTime() {
			const today = new Date();
			let h = today.getHours();
			let m = today.getMinutes();
			let s = today.getSeconds();
			m = checkTime(m);
			s = checkTime(s);
			document.getElementById('realtimeclock').innerHTML =  h + ":" + m + ":" + s;
			setTimeout(startTime, 1000);
		}

		function checkTime(i) {
			if (i < 10) {i = "0" + i};  // add zero in front of numbers < 10
			return i;
		}

        bodyDp {
            margin: 0;
            display: flex;
            align-items: left;
            justify-content: left;
            height: 1vh;
        }

        .dancer {
            position: relative;
            width: 50px;
            height: 100px;
            background-color: #ffcc00;
            border-radius: 10px;
            animation: dance 2s infinite;
        }

        .dancer::before, .dancer::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 40px;
            background-color: #ffcc00;
            top: 20px;
            border-radius: 10px;
            animation: armMove 2s infinite;
        }

        .dancer::before {
            left: -20px;
            transform-origin: top right;
        }

        .dancer::after {
            right: -20px;
            transform-origin: top left;
        }

        .head {
            position: absolute;
            top: -20px;
            left: 50%;
            width: 20px;
            height: 20px;
            background-color: #ffcc00;
            border-radius: 50%;
            transform: translateX(-50%);
            animation: headMove 2s infinite;
        }

        .leg-left, .leg-right {
            position: absolute;
            width: 15px;
            height: 50px;
            background-color: #ffcc00;
            top: 100px;
            border-radius: 10px;
            animation: legMove 2s infinite;
        }

        .leg-left {
            left: 5px;
            transform-origin: top center;
        }

        .leg-right {
            right: 5px;
            transform-origin: top center;
        }

        @keyframes dance {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            25% {
                transform: translateY(-20px) rotate(-10deg);
            }
            50% {
                transform: translateY(0) rotate(10deg);
            }
            75% {
                transform: translateY(-20px) rotate(10deg);
            }
            100% {
                transform: translateY(0) rotate(-10deg);
            }
        }

        @keyframes armMove {
            0%, 100% {
                transform: rotate(0deg);
            }
            25% {
                transform: rotate(30deg);
            }
            75% {
                transform: rotate(-30deg);
            }
        }

        @keyframes headMove {
            0%, 100% {
                transform: translateX(-50%) rotate(0deg);
            }
            25% {
                transform: translateX(-50%) rotate(10deg);
            }
            50% {
                transform: translateX(-50%) rotate(-10deg);
