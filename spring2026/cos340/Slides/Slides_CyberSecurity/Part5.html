<section data-markdown data-separator="^\n\n\n"><textarea data-template>

## Logs

- A concern when it comes to your privacy <spanBYMix>beyond</spanBYMix> your own browser.

- Any website you visit is, itself, <spanBYMix>on the server</spanBYMix> side also keeping track of a lot of information - that is, the servers have <spanBYMix>logs</spanBYMix>

- These are <spanBYMix>not</spanBYMix> only for diagnostic purposes, the IT staff can use those logs to reconstruct history and figure it out <spanGREEN>who was doing what and when and how that might explain some problem</spanGREEN>.





## Logs

- This log format, the so-called combined format

## HTTP headers

## HTTP headers

- You may send the referring address, but only send the origin, such as https://www.google.com/.

- no search, path, no ?q=Midway+Univeristy.

<img src="./images/privacy9.png" alt="drawing" width="700"/>





## HTTP headers

- The referrer policy can indicate that you only want the origin to be sent

<img src="./images/privacy10.png" alt="drawing" width="600"/>

- The " origin " policy specifies that only the ASCII serialization of the origin of the request client is sent as referrer information when making both same-origin requests and cross-origin requests from a particular client.




## HTTP headers

- You can actually indicate that no referrer should actually be sent

<img src="./images/privacy11.png" alt="drawing" width="600"/>

- The Referrer-Policy HTTP header controls how much information is sent from a browser to a destination server when a user clicks on a hyperlink.




## HTTP headers

- You can actually indicate that no referrer should actually be sent

<img src="./images/privacy11.png" alt="drawing" width="600"/>

- Noreferrer (rel=“noreferrer”) is a keyword in the “rel” HTML link attribute that instructs the browser not to send any referrer information to the target resource when the user clicks the link on a page.



## HTTP headers

- <b>Context</b>: When a user clicks a link on Page A to go to Page B, the browser usually sends a Referer header to Page B that tells it where the click came from.

- <b>Privacy goal</b>: Don’t leak the full URL of the page the user came from (which can include paths and query strings like ?q=Midway+University).

> Instead, only send the origin—just the scheme + host (+ port), e.g. https://www.google.com/.



## HTTP headers

- “origin” means:

	- Full URL: https://www.google.com/search?q=Midway+University
	- Origin only: https://www.google.com/
	- No path, no /search, no ?q=....



> How to enforce it (two common ways):



## HTTP headers

- HTML meta tag

```
<meta name="referrer" content="origin">
```

<hr>

- HTTP response header

```
Referrer-Policy: origin
```

# Fingerprinting
</textarea></section>

<section data-markdown data-separator="^\n\n\n"><textarea data-template>

## Fingerprinting

- Your browser might be sharing without your realizing that it's making it available.

- Fingerprinting that in the context of the web means to take as input a whole bunch of characteristics of the request from the internet that's coming in and see if you can use those characteristics to create a profile of sorts for the user via which you can uniquely identify that user.




## Fingerprinting

- Another HTTP header that is typically sent by browsers to servers is called <spanRED>user agent</spanRED> - a unique string of text that uniquely identifies typically the browser, the version thereof and the operating system that you're using 

<img src="./images/privacy13.png" alt="drawing" width="900"/>



## Fingerprinting

<img src="./images/privacy12.png" alt="drawing" width="900"/>




## Fingerprinting

- Mozilla/5.0: This part is used for compatibility and historical reasons. It indicates that the browser is compatible with the Mozilla family of browsers (this is standard even if you aren't using Mozilla Firefox).

- Windows NT 10.0; Win64; x64: This specifies your operating system:





## Fingerprinting


- Windows NT 10.0: Means you are using Windows 10.
Win64; x64: Indicates you are on a 64-bit version of Windows.

## Location-Based Services 🌞

## Location-Based Services

- Your AirTag sends out a secure Bluetooth signal that can be detected by nearby devices in the Find My network. These devices send the location of your AirTag to iCloud — then you can go to the Find My app and see it on a map. The whole process is anonymous and encrypted to protect your privacy.

<img src="./images/privacy28.png" alt="drawing" width="400"/>
