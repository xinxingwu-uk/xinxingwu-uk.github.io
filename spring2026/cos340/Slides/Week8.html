## 2 Coding Questions



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Question 1</div>
  <div class="definition-pro-Y-shadebox">
  
Goal: Build a small console program that models a “job center”:

<div id="shadebox-glass" class="shadebox glass">

- Queue = jobs waiting to be processed (FIFO)

- Stack = jobs already processed (LIFO) so we can UNDO the most recent processed job
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Job Center Simulator (cont.)</div>
  <div class="definition-pro-Y-shadebox">
  
Requirements 1: Circular Array Queue of string Operations

<div id="shadebox-glass" class="shadebox glass">

- Enqueue(job)

- Dequeue()

- Front()

- IsEmpty()

- IsFull()

- Size()

- PrintQueue() (show pending jobs in correct order)
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Job Center Simulator (cont.)</div>
  <div class="definition-pro-Y-shadebox">
  
Requirements 2: Array Stack of string Operations

<div id="shadebox-glass" class="shadebox glass">

- Push(job)

- Pop()

- Top()

- IsEmpty()

- IsFull()

- Size()

- PrintStack() (show processed jobs from top to bottom)
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Job Center Simulator (cont.)</div>
  <div class="definition-pro-Y-shadebox">
  
Commands your program must support 

<div id="shadebox-glass" class="shadebox glass">

- ADD jobName: Put a new job into the pending queue.

- PROCESS: Take the next pending job (dequeue) and move it into processed stack (push).

- UNDO: Undo the most recent processed job (pop from stack) and put it back into pending (enqueue).

- NEXT: Print the job at the front of the pending queue.
</div>
   </div>
</div>



<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Job Center Simulator (cont.)</div>
  <div class="definition-pro-Y-shadebox">
  
Commands your program must support (cont.)

<div id="shadebox-glass" class="shadebox glass">

- HISTORY: Print the most recently processed job (top of stack).

- STATUS: Print counts of pending and processed.

- LIST: Print pending queue and processed stack.

- END: Exit.
</div>
   </div>
</div>




<div class="definition-pro-Y-container">
  <div class="definition-pro-Y-title">Job Center Simulator (cont.)</div>
  <div class="definition-pro-Y-shadebox">
  
Error handling (required)

<div id="shadebox-glass" class="shadebox glass">

- If PROCESS or NEXT when queue is empty → show an underflow error message.

- If UNDO or HISTORY when stack is empty → show an underflow error message.

- If ADD when queue is full → overflow message.

- If PROCESS when stack is full → overflow message.
</div>

Assumption: jobName has no spaces (e.g., ADD HW1).
   </div>
</div>



<div id="shadebox">

### A Solution (Reference Answer)

<hr style="border: none; border-top: 1.5px solid cyan;">

```
#include <iostream>
#include <string>
#include <stdexcept>
#include <sstream>
using namespace std;

/* =======================
   Exceptions
   ======================= */
class QueueFull : public runtime_error {
public:
    QueueFull() : runtime_error("Queue overflow: pending queue is full") {}
};

class QueueEmpty : public runtime_error {
public:
    QueueEmpty() : runtime_error("Queue underflow: no pending jobs") {}
};

class StackFull : public runtime_error {
public:
    StackFull() : runtime_error("Stack overflow: processed stack is full") {}
};

class StackEmpty : public runtime_error {
public:
    StackEmpty() : runtime_error("Stack underflow: no processed jobs") {}
};

/* =======================
   Circular Array Queue<string>
   ======================= */
class StringQueue {
private:
    static const int MAX = 10; // small for practice; you may increase
    string items[MAX];
    int front;
    int rear;
    int count;

public:
    StringQueue() {
        front = 0;
        rear = -1;
        count = 0;
    }

    bool IsEmpty() const { return count == 0; }
    bool IsFull()  const { return count == MAX; }
    int  Size()    const { return count; }

    void Enqueue(const string& job) {
        if (IsFull()) throw QueueFull();
        rear = (rear + 1) % MAX;
        items[rear] = job;
        count++;
    }

    void Dequeue() {
        if (IsEmpty()) throw QueueEmpty();
        front = (front + 1) % MAX;
        count--;
    }

    string Front() const {
        if (IsEmpty()) throw QueueEmpty();
        return items[front];
    }

    void PrintQueue() const {
        cout << "Pending (front -> rear): ";
        if (IsEmpty()) {
            cout << "[empty]\n";
            return;
        }

        cout << "[";
        for (int i = 0; i < count; i++) {
            int idx = (front + i) % MAX;
            cout << items[idx];
            if (i != count - 1) cout << ", ";
        }
        cout << "]\n";
    }
};

/* =======================
   Array Stack<string>
   ======================= */
class StringStack {
private:
    static const int MAX = 10; // small for practice; you may increase
    string items[MAX];
    int top; // -1 means empty

public:
    StringStack() {
        top = -1;
    }

    bool IsEmpty() const { return top == -1; }
    bool IsFull()  const { return top == MAX - 1; }
    int  Size()    const { return top + 1; }

    void Push(const string& job) {
        if (IsFull()) throw StackFull();
        items[++top] = job;
    }

    void Pop() {
        if (IsEmpty()) throw StackEmpty();
        top--;
    }

    string Top() const {
        if (IsEmpty()) throw StackEmpty();
        return items[top];
    }

    void PrintStack() const {
        cout << "Processed (top -> bottom): ";
        if (IsEmpty()) {
            cout << "[empty]\n";
            return;
        }

        cout << "[";
        for (int i = top; i >= 0; i--) {
            cout << items[i];
            if (i != 0) cout << ", ";
        }
        cout << "]\n";
    }
};

/* =======================
   Main Program
   ======================= */
int main() {
    StringQueue pending;
    StringStack processed;

    cout << "=== Job Center Simulator (Queue + Stack) ===\n";
    cout << "Commands:\n";
    cout << "  ADD jobName\n";
    cout << "  PROCESS\n";
    cout << "  UNDO\n";
    cout << "  NEXT\n";
    cout << "  HISTORY\n";
    cout << "  STATUS\n";
    cout << "  LIST\n";
    cout << "  END\n\n";

    string line;
    while (true) {
        cout << "> ";
        getline(cin, line);

        if (line.empty()) continue;

        stringstream ss(line);
        string cmd;
        ss >> cmd;

        try {
            if (cmd == "END") {
                cout << "Goodbye.\n";
                break;
            } else if (cmd == "ADD") {
                string job;
                ss >> job;
                if (job.empty()) {
                    cout << "Error: ADD requires a job name (example: ADD HW1)\n";
                } else {
                    pending.Enqueue(job);
                    cout << "Added job: " << job << "\n";
                }
            } else if (cmd == "PROCESS") {
                // move from queue -> stack
                string job = pending.Front();
                pending.Dequeue();
                processed.Push(job);
                cout << "Processed job: " << job << "\n";
            } else if (cmd == "UNDO") {
                // move from stack -> queue (goes to rear)
                string job = processed.Top();
                processed.Pop();
                pending.Enqueue(job);
                cout << "Undo: returned job to pending: " << job << "\n";
            } else if (cmd == "NEXT") {
                cout << "Next pending job: " << pending.Front() << "\n";
            } else if (cmd == "HISTORY") {
                cout << "Most recent processed job: " << processed.Top() << "\n";
            } else if (cmd == "STATUS") {
                cout << "Pending count: " << pending.Size()
                     << " | Processed count: " << processed.Size() << "\n";
            } else if (cmd == "LIST") {
                pending.PrintQueue();
                processed.PrintStack();
            } else {
                cout << "Unknown command: " << cmd << "\n";
            }
        } catch (const exception& e) {
            cout << "Error: " << e.what() << "\n";
        }
    }

    return 0;
}

#include <iostream>
#include <string>
using namespace std;

const int MAX_ITEMS = 100;

enum RelationType { LESS, GREATER, EQUAL };

struct Book {
    int id;          // key
    string title;
    int copies;

    RelationType CompareTo(const Book& other) const {
        if (id < other.id) return LESS;
        if (id > other.id) return GREATER;
        return EQUAL;
    }
};

class UnsortedList {
private:
    Book info[MAX_ITEMS];
    int length;
    int currentPos;

public:
    UnsortedList() {
        length = 0;
        currentPos = -1;
    }

    void MakeEmpty() {
        length = 0;
        currentPos = -1;
    }

    bool IsFull() const {
        return (length == MAX_ITEMS);
    }

    int GetLength() const {
        return length;
    }

    void PutItem(const Book& item) {
        info[length] = item;
        length++;
    }

    void GetItem(Book& item, bool& found) const {
        found = false;
        for (int i = 0; i < length; i++) {
            if (info[i].CompareTo(item) == EQUAL) {
                item = info[i];
                found = true;
                return;
            }
        }
    }

    void DeleteItem(const Book& item) {
        int location = 0;
        while (location < length) {
            if (info[location].CompareTo(item) == EQUAL) {
                info[location] = info[length - 1]; // swap with last
                length--;
                return;
            }
            location++;
        }
    }

    void ResetList() {
        currentPos = -1;
    }

    Book GetNextItem() {
        currentPos++;
        return info[currentPos];
    }
};

// Helper: check if a book id exists
bool Exists(UnsortedList& list, int id) {
    Book q;
    q.id = id;
    bool found;
    list.GetItem(q, found);
    return found;
}

void PrintAll(UnsortedList& list) {
    int n = list.GetLength();
    if (n == 0) {
        cout << "(No books)\n";
        return;
    }

    list.ResetList();
    for (int i = 0; i < n; i++) {
        Book b = list.GetNextItem();
        cout << b.id << " - " << b.title << " - copies: " << b.copies << "\n";
    }
}

void AddBook(UnsortedList& list) {
    if (list.IsFull()) {
        cout << "Cannot add: list is FULL.\n";
        return;
    }

    Book b;
    cout << "Enter id: ";
    cin >> b.id;

    if (Exists(list, b.id)) {
        cout << "Cannot add: id already exists.\n";
        return;
    }

    cout << "Enter title (one word): ";
    cin >> b.title;
    cout << "Enter copies: ";
    cin >> b.copies;

    if (b.copies < 0) b.copies = 0;

    list.PutItem(b);
    cout << "Added.\n";
}

void FindBook(UnsortedList& list) {
    int id;
    cout << "Enter id to find: ";
    cin >> id;

    Book q;
    q.id = id;
    bool found;
    list.GetItem(q, found);

    if (found) {
        cout << "Found: " << q.id << " - " << q.title << " - copies: " << q.copies << "\n";
    } else {
        cout << "Not found.\n";
    }
}

// Borrow: copies-- if possible
void BorrowBook(UnsortedList& list) {
    int id;
    cout << "Enter id to borrow: ";
    cin >> id;

    Book q;
    q.id = id;
    bool found;
    list.GetItem(q, found);

    if (!found) {
        cout << "Not found.\n";
        return;
    }

    if (q.copies == 0) {
        cout << "No copies available.\n";
        return;
    }

    // We cannot directly modify inside the list with GetItem alone,
    // so we delete then re-insert the updated item (common beginner workaround).
    list.DeleteItem(q);
    q.copies--;
    list.PutItem(q);

    cout << "Borrowed. Now copies = " << q.copies << "\n";
}

// Return: copies++
void ReturnBook(UnsortedList& list) {
    int id;
    cout << "Enter id to return: ";
    cin >> id;

    Book q;
    q.id = id;
    bool found;
    list.GetItem(q, found);

    if (!found) {
        cout << "Not found.\n";
        return;
    }

    list.DeleteItem(q);
    q.copies++;
    list.PutItem(q);

    cout << "Returned. Now copies = " << q.copies << "\n";
}

void DeleteBook(UnsortedList& list) {
    int id;
    cout << "Enter id to delete: ";
    cin >> id;

    Book q;
    q.id = id;
    bool found;
    list.GetItem(q, found);

    if (!found) {
        cout << "Not found. Nothing deleted.\n";
        return;
    }

    list.DeleteItem(q);
    cout << "Deleted.\n";
}

void ShowMenu() {
    cout << "\n--- Library Book Tracker ---\n";
    cout << "1) Add book\n";
    cout << "2) Find book\n";
    cout << "3) Borrow book\n";
    cout << "4) Return book\n";
    cout << "5) Delete book\n";
    cout << "6) Print all books\n";
    cout << "7) Clear list\n";
    cout << "0) Exit\n";
    cout << "Choose: ";
}

int main() {
    UnsortedList books;
    int choice;

    do {
        ShowMenu();
        cin >> choice;

        if (choice == 1) AddBook(books);
        else if (choice == 2) FindBook(books);
        else if (choice == 3) BorrowBook(books);
        else if (choice == 4) ReturnBook(books);
        else if (choice == 5) DeleteBook(books);
        else if (choice == 6) PrintAll(books);
        else if (choice == 7) { books.MakeEmpty(); cout << "List cleared.\n"; }
        else if (choice == 0) cout << "Bye!\n";
        else cout << "Invalid choice.\n";

    } while (choice != 0);

    return 0;
}
